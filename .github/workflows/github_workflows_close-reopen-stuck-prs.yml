name: Stuck PRs Email Report (Debugging jq Errors)

on:
  workflow_dispatch:

jobs:
  debug-jq:
    runs-on: ubuntu-latest
    env:
      ORG_NAME: vitechsystems
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq gh

      - name: Get all repos in org
        env:
          GH_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          gh repo list "$ORG_NAME" --limit 5 --json name -q '.[] | .name' > repos.txt
          echo "Repositories collected for org $ORG_NAME:"
          cat repos.txt

      - name: Debug PR listing and jq input
        env:
          GH_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
          ORG_NAME: ${{ env.ORG_NAME }}
        run: |
          while read repo; do
            echo "==== Checking repository: $repo ===="
            prs=$(gh pr list --repo "$ORG_NAME/$repo" --state open --json number,createdAt,title 2>&1)
            echo "---- Raw gh pr list output ----"
            echo "$prs"
            if [ -z "$prs" ] || ! echo "$prs" | jq empty > /dev/null 2>&1; then
              echo "::error:: Not valid JSON from gh pr list for $repo"
              continue
            fi
            echo "---- Valid JSON, output of jq -c '.[] // empty' ----"
            echo "$prs" | jq -c '.[] // empty'
            echo "-------------------------------"
          done < repos.txt
