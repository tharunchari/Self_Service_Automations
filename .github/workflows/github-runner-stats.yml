name: Fetch GitHub Billing Usage

on:
  workflow_dispatch:
  #schedule:
   # - cron: '0 0 * * *'  # Runs daily at midnight

jobs:
  fetch-usage:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Process Usage for Multiple Organizations
        run: |
          total_usage=0

          for ORG in vitechsystems VitechInfra; do
            echo "Fetching usage for organization: $ORG"

            response=$(curl -L \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.PROD_FINE_GRAINED_PAT }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/organizations/$ORG/settings/billing/usage")

            echo "$response" > "$ORG-usage.json"

            org_total=$(jq '[.usageItems[].quantity] | add' "$ORG-usage.json")
            echo "Total Usage for $ORG: $org_total minutes"

            total_usage=$((total_usage + org_total))
          done

          echo "Grand Total Usage: $total_usage minutes"
          echo "TOTAL_USAGE=$total_usage" >> $GITHUB_ENV

      - name: Print Grand Total Usage
        run: |
         echo "Total minutes used across organizations: ${{ env.TOTAL_USAGE }}"
