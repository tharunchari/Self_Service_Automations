name: Fetch GitHub Billing Usage

on:
  workflow_dispatch:
  #schedule:
    #- cron: '0 0 * * *'  # Runs daily at midnight

jobs:
  fetch-usage:
    runs-on: ubuntu-latest
    steps:
      - name: Make API Request
        run: |
          response=$(curl -L \ 
            -H "Accept: application/vnd.github+json" \ 
            -H "Authorization: Bearer ${{ secrets.PROD_FINE_GRAINED_PAT }}" \ 
            -H "X-GitHub-Api-Version: 2022-11-28" \ 
            https://api.github.com/organizations/vitechsystems/settings/billing/usage)
          echo "$response" > usage.json

      - name: Process JSON and Calculate Total
        run: |
          total=$(jq '[.usageItems[].quantity] | add' usage.json)
          echo "Total Usage: $total minutes"
          echo "TOTAL_USAGE=$total" >> $GITHUB_ENV

      - name: Print Total Usage
        run: |
          echo "Total minutes used across repositories: ${{ env.TOTAL_USAGE }}"
