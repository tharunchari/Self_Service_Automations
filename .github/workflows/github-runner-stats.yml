name: Fetch and Notify GitHub Runner Usage

on:
  #schedule:
   # - cron: '0 0 1 * *'  # Runs on the 1st of every month
  workflow_dispatch:    # Allows manual trigger

jobs:
  fetch-usage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Fetch and Process Runner Usage Data (GraphQL)
        run: |
          echo "Fetching GitHub Actions runner usage for the previous month (via GraphQL)..."

          QUERY='{\"query\":\"query { organization(login: \\\"vitechsystems\\\") { actionsUsage(period: PREVIOUS_MONTH) { totalMinutesUsed totalPaidMinutesUsed minutesUsedBreakdown { UBUNTU MACOS WINDOWS total } } } }\"}'

          RESPONSE=$(curl -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer ${{ secrets.PROD_FINE_GRAINED_PAT }}" \
            -H "Content-Type: application/json" \
            --data "$QUERY")

          echo "Full API Response:"
          echo "$RESPONSE" | jq .
          echo "$RESPONSE" > runner_usage.json

          SELF_HOSTED_MINUTES=$(echo "$RESPONSE" | jq '.data.organization.actionsUsage.totalMinutesUsed // 0')
          HOSTED_MINUTES=$(echo "$RESPONSE" | jq '.data.organization.actionsUsage.totalPaidMinutesUsed // 0')

          echo "GitHub Actions Usage Summary (Previous Month):"
          echo "--------------------------------------"
          echo "Self-hosted Runner Minutes: $SELF_HOSTED_MINUTES"
          echo "GitHub-hosted Runner Minutes: $HOSTED_MINUTES"

          # Set output variables
          echo "SELF_HOSTED_MINUTES=$SELF_HOSTED_MINUTES" >> $GITHUB_ENV
          echo "HOSTED_MINUTES=$HOSTED_MINUTES" >> $GITHUB_ENV
