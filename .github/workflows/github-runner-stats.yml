name: Fetch Metrics Usage

on:
 # schedule:
   # - cron: '0 0 1 * *' # Runs at midnight on the first day of each month
  workflow_dispatch: # Allows manual trigger

jobs:
  fetch-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Get Organization Usage
        run: |
          echo "Fetching Organization Usage..."
          curl -H "Authorization: Bearer ${{ secrets.INFRA_FINE_GRAINED_PAT }}" \
               -H "Accept: application/vnd.github.v3+json" \
               "https://api.github.com/orgs/VitechInfra/actions/usage"

      - name: Get Runner Groups
        run: |
          echo "Fetching Runner Groups..."
          curl -H "Authorization: Bearer ${{ secrets.INFRA_FINE_GRAINED_PAT }}" \
               -H "Accept: application/vnd.github.v3+json" \
               "https://api.github.com/orgs/VitechInfra/actions/runner-groups"
