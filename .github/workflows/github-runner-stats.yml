name: Fetch GitHub Billing Usage

on:
  workflow_dispatch:
  #schedule:
   # - cron: '0 0 * * *'  # Runs daily at midnight

jobs:
  fetch-usage:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Process Usage for Multiple Organizations
        run: |
          total_usage=0

          declare -A ORG_PAT=(
            [vitechsystems]="${{ secrets.PROD_FINE_GRAINED_PAT }}"
            [VitechInfra]="${{ secrets.INFRA_FINE_GRAINED_PAT }}"
          )

          for ORG in vitechsystems VitechInfra; do
            echo "Fetching usage for organization: $ORG"

            response=$(curl -L \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${ORG_PAT[$ORG]}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/organizations/$ORG/settings/billing/usage?days=30")

            echo "$response" > "$ORG-usage.json"

            org_total=$(jq '[.usageItems[].quantity] | add | floor' "$ORG-usage.json")
            echo "Total Usage for $ORG: $org_total minutes"

            echo "${ORG^^}_USAGE=$org_total" >> $GITHUB_ENV  # Store separately

            total_usage=$((total_usage + org_total))
          done

          echo "Grand Total Usage: $total_usage minutes"
          echo "TOTAL_USAGE=$total_usage" >> $GITHUB_ENV

      - name: Print Individual and Grand Total Usage
        run: |
          echo "Total minutes used in vitechsystems: ${{ env.VITECHSYSTEMS_USAGE }}"
          echo "Total minutes used in VitechInfra: ${{ env.VITECHINFRA_USAGE }}"
          echo "Grand total minutes used: ${{ env.TOTAL_USAGE }}"
