name: Fetch Metrics Usage

on:
 # schedule:
   # - cron: '0 0 1 * *' # Runs at midnight on the first day of each month
  workflow_dispatch: # Allows manual trigger

jobs:
  fetch-metrics:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v2

    - name: Get Usage Metrics
      run: |
        curl -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
             -H "Accept: application/vnd.github.v3+json" \
             "https://api.github.com/orgs/VitechInfra/actions/usage"
      
    - name: Save Metrics to File
      run: |
        curl -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
             -H "Accept: application/vnd.github.v3+json" \
             "https://api.github.com/orgs/VitechInfra/actions/usage" \
             -o metrics-usage.json

    - name: Upload Usage Report
      uses: actions/upload-artifact@v4
      with:
        name: metrics-usage
        path: metrics-usage.json
