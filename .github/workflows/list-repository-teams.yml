name: List Teams with Access to Internal-Tools Repository

on:
  workflow_dispatch:  # allows manual run
  schedule:
    - cron: '0 10 * * 1'  # Every Monday at 10:00 AM UTC

jobs:
  list-teams:
    runs-on: ubuntu-latest
    steps:
      - name: List Teams with Access
        env:
          GH_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          echo "🔍 Fetching teams with access to $REPO_OWNER/$REPO_NAME"
          echo "=============================================="
          echo ""

          # Fetch teams with access to this repository
          TEAMS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/teams")

          # Save to file
          echo "Repository: $REPO_OWNER/$REPO_NAME" > teams-access.txt
          DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          echo "Date: $DATE" >> teams-access.txt
          echo "==============================================" \
            >> teams-access.txt
          echo "" >> teams-access.txt

          # Check if the API call was successful
          if echo "$TEAMS" | jq -e 'type=="array"' >/dev/null 2>&1; then
            TEAM_COUNT=$(echo "$TEAMS" | jq 'length')

            if [ "$TEAM_COUNT" -eq 0 ]; then
              echo "No teams have access to this repository." \
                | tee -a teams-access.txt
            else
              echo "Teams with access ($TEAM_COUNT total):" \
                | tee -a teams-access.txt
              echo "" | tee -a teams-access.txt

              # Format and display team information
              echo "$TEAMS" | jq -r '
                .[] |
                "Team: \(.name)\n" +
                "  Slug: \(.slug)\n" +
                "  Permission: \(
                  if .permission == "pull" then "read"
                  elif .permission == "push" then "write"
                  elif .permission == "admin" then "admin"
                  elif .permission == "maintain" then "maintain"
                  elif .permission == "triage" then "triage"
                  else .permission
                  end
                )\n" +
                "  Privacy: \(.privacy)\n" +
                "  Description: \(.description // "N/A")\n"
              ' | tee -a teams-access.txt
            fi
          else
            echo "Error: Unable to fetch teams. API response:" \
              | tee -a teams-access.txt
            echo "$TEAMS" | jq '.' | tee -a teams-access.txt
          fi

          echo "" | tee -a teams-access.txt
          echo "==============================================" \
            >> teams-access.txt
          RUN_URL="https://github.com/${{ github.repository }}"
          RUN_URL="$RUN_URL/actions/runs/${{ github.run_id }}"
          echo "🔗 Workflow run: $RUN_URL" | tee -a teams-access.txt

      - name: Upload Teams Access Report
        uses: actions/upload-artifact@v4
        with:
          name: teams-access-report
          path: teams-access.txt
          retention-days: 30
