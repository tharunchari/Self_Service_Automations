name: Scan All Secret Scanning Alerts Org-wide

on:
  workflow_dispatch:

jobs:
  scan-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: Get all repos in org
        env:
          GH_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          gh repo list vitechsystems --limit 1000 --json name -q '.[] | .name' > repos.txt

      - name: Check secret scanning alerts for all repos
        env:
          GH_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          echo "repo,alert_number,secret_type,state,created_at,resolved_at,resolved_by,secret,locations,branch" > secret_alerts.csv
          while read repo; do
            echo "Checking $repo"
            # Use 'set +e' to allow the loop to continue on error
            set +e
            response=$(gh api "/repos/vitechsystems/$repo/secret-scanning/alerts?per_page=100" 2>&1)
            status=$?
            set -e
            if [[ $status -ne 0 ]]; then
              # If the error was due to secret scanning being disabled (HTTP 404), skip this repo
              if echo "$response" | grep -q '404'; then
                echo "Secret scanning is disabled for $repo, skipping."
                continue
              else
                echo "Error checking $repo: $response"
                continue
              fi
            fi
            # If we get here, secret scanning is enabled and response contains alerts (could be empty)
            echo "$response" | jq -r --arg repo "$repo" '
              .[] | [
                $repo,
                .number,
                .secret_type,
                .state,
                .created_at,
                (.resolved_at // ""),
                (.resolved_by.login // ""),
                (.secret // ""),
                ([.locations[]?.details | select(.ref) | .ref] | join(";"))
              ] | @csv
            ' >> secret_alerts.csv
          done < repos.txt

      - name: Upload alerts as artifact
        uses: actions/upload-artifact@v4
        with:
          name: secret-alerts-org-wide
          path: secret_alerts.csv
