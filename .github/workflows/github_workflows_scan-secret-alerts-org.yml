name: Scan All Secret Scanning Alerts Org-wide

on:
  workflow_dispatch:

jobs:
  scan-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: Get all repos in org
        env:
          GH_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          gh repo list vitechsystems --limit 1000 --json name -q '.[] | .name' > repos.txt

      - name: Check secret scanning alerts for all repos (with locations and branches)
        env:
          GH_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          echo "repo,alert_number,secret_type,state,created_at,resolved_at,resolved_by,secret,locations,branches" > secret_alerts.csv
          while read repo; do
            echo "Checking $repo"
            set +e
            alerts=$(gh api "/repos/vitechsystems/$repo/secret-scanning/alerts?per_page=100")
            status=$?
            set -e
            if [[ $status -ne 0 ]]; then
              if echo "$alerts" | grep -q '404'; then
                echo "Secret scanning is disabled for $repo, skipping."
                continue
              else
                echo "Error checking $repo: $alerts"
                continue
              fi
            fi
            for number in $(echo "$alerts" | jq -r '.[].number'); do
              alert=$(gh api "/repos/vitechsystems/$repo/secret-scanning/alerts/$number")
              secret_type=$(echo "$alert" | jq -r '.secret_type')
              state=$(echo "$alert" | jq -r '.state')
              created_at=$(echo "$alert" | jq -r '.created_at')
              resolved_at=$(echo "$alert" | jq -r '.resolved_at // ""')
              resolved_by=$(echo "$alert" | jq -r '.resolved_by.login // ""')
              secret=$(echo "$alert" | jq -r '.secret // ""')
              locations=$(echo "$alert" | jq -r '[.locations[]?.details.path // empty] | join(";")')
              branches=$(echo "$alert" | jq -r '[.locations[]?.details.ref // empty] | join(";")')
              echo "\"$repo\",\"$number\",\"$secret_type\",\"$state\",\"$created_at\",\"$resolved_at\",\"$resolved_by\",\"$secret\",\"$locations\",\"$branches\"" >> secret_alerts.csv
            done
          done < repos.txt

      - name: Upload alerts as artifact
        uses: actions/upload-artifact@v4
        with:
          name: secret-alerts-org-wide
          path: secret_alerts.csv
