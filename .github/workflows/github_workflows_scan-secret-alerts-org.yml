name: Open and Close Secret Scanning Alerts with Audit and Error Tolerance

on:
  workflow_dispatch:
    inputs:
      org:
        description: "Select the organization"
        required: true
        default: "vitechsystems"
        type: choice
        options:
          - vitechsystems
          - VitechQA
          - VitechInfra

jobs:
  secrets-audit-and-close:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: Set variables for selected org
        id: setvars
        run: |
          if [ "${{ github.event.inputs.org }}" = "vitechsystems" ]; then
            echo "ORG=vitechsystems" >> $GITHUB_OUTPUT
            echo "TOKEN=${{ secrets.PROD_FINE_GRAINED_PAT }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.org }}" = "VitechQA" ]; then
            echo "ORG=VitechQA" >> $GITHUB_OUTPUT
            echo "TOKEN=${{ secrets.QA_FINE_GRAINED_PAT }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.org }}" = "VitechInfra" ]; then
            echo "ORG=VitechInfra" >> $GITHUB_OUTPUT
            echo "TOKEN=${{ secrets.INFRA_FINE_GRAINED_PAT }}" >> $GITHUB_OUTPUT
          fi

      - name: Get all repos in org
        env:
          GH_TOKEN: ${{ steps.setvars.outputs.TOKEN }}
        run: |
          gh repo list ${{ steps.setvars.outputs.ORG }} --limit 1000 --json name -q '.[] | .name' > repos.txt

      - name: Gather all open secret scanning alerts (before closing)
        env:
          GH_TOKEN: ${{ steps.setvars.outputs.TOKEN }}
        run: |
          ORG="${{ steps.setvars.outputs.ORG }}"
          echo "repo,alert_number,secret_type,state,created_at,secret" > open_leaks_${ORG}.csv
          while read repo; do
            echo "Checking $repo"
            set +e
            alerts=$(gh api "/repos/${ORG}/$repo/secret-scanning/alerts?per_page=100")
            status=$?
            set -e
            if [[ $status -ne 0 ]]; then
              if echo "$alerts" | grep -q '404'; then
                echo "Secret scanning is disabled for $repo, skipping."
                continue
              else
                echo "Error checking $repo: $alerts"
                continue
              fi
            fi
            echo "$alerts" | jq -r --arg repo "$repo" '.[] | select(.state == "open") | [$repo, .number, .secret_type, .state, .created_at, (.secret // "")] | @csv' >> open_leaks_${ORG}.csv
          done < repos.txt

      - name: Close open secret scanning alerts and record closure (errors never stop script)
        env:
          GH_TOKEN: ${{ steps.setvars.outputs.TOKEN }}
        run: |
          ORG="${{ steps.setvars.outputs.ORG }}"
          echo "repo,alert_number,secret_type,state_before,state_after,closed_at,error" > closed_leaks_${ORG}.csv
          while read repo; do
            echo "Checking $repo"
            set +e
            alerts=$(gh api "/repos/${ORG}/$repo/secret-scanning/alerts?per_page=100")
            status=$?
            set -e
            if [[ $status -ne 0 ]]; then
              if echo "$alerts" | grep -q '404'; then
                echo "Secret scanning is disabled for $repo, skipping."
                continue
              else
                echo "Error checking $repo: $alerts"
                continue
              fi
            fi
            for number in $(echo "$alerts" | jq -r '.[] | select(.state == "open") | .number'); do
              alert=$(gh api "/repos/${ORG}/$repo/secret-scanning/alerts/$number")
              secret_type=$(echo "$alert" | jq -r '.secret_type')
              state_before=$(echo "$alert" | jq -r '.state')
              # Try to resolve and handle errors gracefully
              set +e
              response=$(gh api --method PATCH -H "Accept: application/vnd.github+json" \
                -f state=resolved -f resolution=revoked \
                "/repos/${ORG}/$repo/secret-scanning/alerts/$number" 2>&1)
              status=$?
              set -e
              if [[ $status -ne 0 ]]; then
                echo "Failed to resolve alert $number in $repo: $response"
                # Write as error to CSV
                echo "\"$repo\",\"$number\",\"$secret_type\",\"$state_before\",\"\",\"\",\"$(echo "$response" | head -c 200 | tr '\n' ' ')\"" >> closed_leaks_${ORG}.csv
                continue
              fi
              state_after=$(echo "$response" | jq -r '.state')
              closed_at=$(echo "$response" | jq -r '.resolved_at // ""')
              echo "\"$repo\",\"$number\",\"$secret_type\",\"$state_before\",\"$state_after\",\"$closed_at\",\"\"" >> closed_leaks_${ORG}.csv
            done
          done < repos.txt

      - name: Upload open leaks CSV
        uses: actions/upload-artifact@v4
        with:
          name: open-leaks-${{ steps.setvars.outputs.ORG }}
          path: open_leaks_${{ steps.setvars.outputs.ORG }}.csv

      - name: Upload closed leaks CSV
        uses: actions/upload-artifact@v4
        with:
          name: closed-leaks-${{ steps.setvars.outputs.ORG }}
          path: closed_leaks_${{ steps.setvars.outputs.ORG }}.csv
