name: Shai-Hulud NPM 

on:
  workflow_dispatch:
 # schedule:
  #  - cron: '0 3 * * *' # Every day at 3 AM UTC

jobs:
  scan-org-npm-ioc:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout scanning repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq git

      - name: Authenticate with GitHub CLI
        run: gh auth login --with-token <<< "${{ secrets.PROD_FINE_GRAINED_PAT }}"

      - name: Get all repositories in org
        id: get-repos
        run: |
          gh repo list vitechsystems --limit 1000 --json name,description -q '.[] | .name + "|" + (.description // "")' > repos_and_desc.txt
          cut -d"|" -f1 repos_and_desc.txt > repos.txt

      - name: Use wiz_results.txt as IoC list
        run: |
          cp wiz_results.txt ioc_packages.txt

      - name: Scan all branches in all repos
        run: |
          set -eo pipefail
          mkdir -p results
          MALICIOUS_HASHLIST=(
            "de0e25a3e6c1e1e5998b306b7141b3dc4c0088da9d7bb47c1c00c91e6e4f85d6"
            "81d2a004a1bca6ef87a1caf7d0e0b355ad1764238e40ff6d1b1cb77ad4f595c3"
            "83a650ce44b2a9854802a7fb4c202877815274c129af49e6c2d1d5d5d55c501e"
            "4b2399646573bb737c4969563303d8ee2e9ddbd1b271f1ca9e35ea78062538db"
            "dc67467a39b70d1cd4c1f7f7a459b35058163592f4a9e8fb4dffcbba98ef210c"
            "46faab8ab153fae6e80e7cca38eab363075bb524edd79e42269217a083628f09"
            "b74caeaa75e077c99f7d44f46daaf9796a3be43ecf24f2a1fd381844669da777"
            "86532ed94c5804e1ca32fa67257e1bb9de628e3e48a1f56e67042dc055effb5b"
            "aba1fcbd15c6ba6d9b96e34cec287660fff4a31632bf76f2a766c499f55ca1ee"
          )          

          for linedesc in $(cat repos_and_desc.txt); do
            repo=$(echo "$linedesc" | cut -d"|" -f1)
            desc=$(echo "$linedesc" | cut -d"|" -f2-)
            # Check for suspicious repo names and descriptions
            if [[ "$repo" =~ [Ss]hai[-]?Hulud ]]; then
              echo "!!! Repo $repo flagged: name contains Shai-Hulud" >> results/org-wide-repo-check.txt
            fi
            if [[ "$repo" =~ -migration$ ]] && [[ "$desc" == *Shai-Hulud*Migration* ]]; then
              echo "!!! Repo $repo flagged: migration repo with Shai-Hulud description" >> results/org-wide-repo-check.txt
            fi
          done

          while read repo; do
            echo "Scanning repo: $repo"
            gh api repos/vitechsystems/$repo/branches --paginate | jq -r '.[].name' > branches.txt
            while read branch; do
              echo "  Scanning branch: $branch"
              rm -rf tmprepo
              if ! git clone --depth 1 --branch "$branch" "https://github.com/vitechsystems/$repo.git" tmprepo; then
                continue
              fi
              cd tmprepo
              RESULT_FILE="../results/${repo}__${branch}.txt"
              echo "## Results for $repo@$branch" > "$RESULT_FILE"
              FOUND=0
              # 1. Compromised npm packages (package.json)
              if [ -f package.json ]; then
                jq -r '.dependencies,.devDependencies,.peerDependencies // {} | to_entries[] | "\(.key),\(.value)"' package.json > deps.txt || true
                while IFS=, read -r pkg ver; do
                  if grep -q "^$pkg,$ver$" deps.txt; then
                    echo "!!! Compromised NPM package found: $pkg,$ver" >> "$RESULT_FILE"
                    FOUND=1
                  fi
                done < ../ioc_packages.txt
              fi
              # 2. Compromised npm packages (lock files)
              for lockf in package-lock.json yarn.lock pnpm-lock.yaml; do
                if [ -f "$lockf" ]; then
                  while IFS=, read -r pkg ver; do
                    if grep -q "$pkg.*$ver" "$lockf"; then
                      echo "!!! Compromised NPM package found in lock file: $pkg,$ver" >> "$RESULT_FILE"
                      FOUND=1
                    fi
                  done < ../ioc_packages.txt
                fi
              done
              # 3. Suspicious postinstall script
              if [ -f package.json ]; then
                if grep -A 3 '"postinstall"' package.json 2>/dev/null | grep -E 'curl|wget|node -e|eval'; then
                  echo "!!! Suspicious postinstall script found" >> "$RESULT_FILE"
                  FOUND=1
                fi
              fi
              # 4. Suspicious domains/webhooks
              if grep -rE 'webhook\.site|npmjs\.help' .; then
                echo "!!! Suspicious domain found in source files" >> "$RESULT_FILE"
                FOUND=1
              fi
              # 5. Attacker wallet/obfuscated code
              if grep -rE '0xFc4a4858bafef54D1b1d7697bfb5c52F4c166976|javascript-obfuscator' .; then
                echo "!!! Suspect wallet or obfuscation detected" >> "$RESULT_FILE"
                FOUND=1
              fi
              # 6. Malicious workflow files
              if find .github/workflows -name 'shai-hulud-workflow.yml' 2>/dev/null | grep -q .; then
                for wf_file in $(find .github/workflows -name 'shai-hulud-workflow.yml' 2>/dev/null); do
                  wf_hash=$(sha256sum "$wf_file" | awk '{print $1}')
                  for malicious_hash in "${MALICIOUS_HASHLIST[@]}"; do
                    if [[ "$wf_hash" == "$malicious_hash" ]]; then
                      echo "!!! Malicious workflow file $wf_file with hash $wf_hash found" >> "$RESULT_FILE"
                      FOUND=1
                      break 2  # Exit both loops after first match
                    fi
                  done
                done
              fi

              # 7. Branch named shai-hulud
              if [[ "$branch" =~ shai[-]?hulud ]]; then
                echo "!!! Branch named shai-hulud found" >> "$RESULT_FILE"
                FOUND=1
              fi
              # 8. Trufflehog/secret scanning activity
              if grep -r -i 'trufflehog' .; then
                echo "!!! Trufflehog/secret scanning activity detected" >> "$RESULT_FILE"
                FOUND=1
              fi
              # 9. Malicious file hashes
              while read file; do
                hash=$(sha256sum "$file" | awk '{print $1}')
                if [[ "$hash" == "$MALICIOUS_HASHES" ]]; then
                  echo "!!! Malicious file hash found: $file ($hash)" >> "$RESULT_FILE"
                  FOUND=1
                fi
              done < <(find . -type f -name "*.js" 2>/dev/null)
              # 10. data.json double base64 check
              if [ -f data.json ]; then
                if head -c 100 data.json | grep -Eq '^[A-Za-z0-9+/=]{20,}$'; then
                  echo "!!! data.json found, contents look like base64. Possible exfiltrated secrets." >> "$RESULT_FILE"
                  FOUND=1
                fi
              fi
              # Always write a summary if nothing found
              if [ $FOUND -eq 0 ]; then
                echo "No Shai-Hulud IoCs or suspicious activity found in this branch." >> "$RESULT_FILE"
              fi
              cd ..
              rm -rf tmprepo
            done < branches.txt
          done < repos.txt

      - name: Ensure results is never empty
        run: |
          if [ ! "$(ls -A results/)" ]; then
            {
              echo "=== Shai-Hulud Scan Summary ==="
              echo ""
              echo "Scanned repositories and branches:"
              total_repos=0
              total_branches=0
              while read repo; do
                echo "- $repo"
                gh api repos/vitechsystems/$repo/branches --paginate | jq -r '.[].name' > branches_tmp.txt
                branch_count=0
                while read branch; do
                  echo "    - $branch"
                  branch_count=$((branch_count+1))
                done < branches_tmp.txt
                total_branches=$((total_branches+branch_count))
                total_repos=$((total_repos+1))
              done < repos.txt
              echo ""
              echo "Total repositories scanned: $total_repos"
              echo "Total branches scanned: $total_branches"
              echo ""
              echo "No Shai-Hulud IoCs or suspicious activity found in any branch."
            } > results/scan_summary.txt
          fi

      - name: Upload scan results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: shai-hulud-scan-results
          path: results/

      - name: Clean working directory
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          rm -rf *
