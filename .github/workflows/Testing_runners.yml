name: "Testing_Runners_Status"

on:
  schedule:
    - cron: '30,40,50 14 12 8 *'   # 14:30, 14:40, 14:50 UTC
    - cron: '*/10 15 12 8 *' 
  workflow_dispatch:

jobs:
  check_instances:
    runs-on: ubuntu-latest
    
    env:
      CLASSIC_PAT: ${{ secrets.CLASSIC_PAT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
 
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'
 
      - name: Install dependencies
        run: pip install boto3 requests

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          
      - run: python3 PYTHON_Script/TESting_runners.py
