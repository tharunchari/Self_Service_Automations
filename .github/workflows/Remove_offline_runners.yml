name: Remove Offline GitHub Runners
 
on:
  schedule:
    - cron: '0 23 * * 6' # Runs every Saturday at 23:00 UTC
  workflow_dispatch:
 
jobs:
  cleanup-runners:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Remove Offline Runners
        env:
          GITHUB_TOKEN: ${{ secrets.CLASSIC_PAT }}
          ORG: "vitechsystems"
        run: |
          PAGE=1
          ALL_RUNNERS="[]"
 
          # Fetch all runners from all pages
          while :; do
            RESPONSE=$(curl -s -L \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/orgs/${ORG}/actions/runners?per_page=100&page=${PAGE}")
 
            COUNT=$(echo "$RESPONSE" | jq '.runners | length')
 
            if [[ "$COUNT" -eq 0 ]]; then
              break
            fi
 
            # Merge into ALL_RUNNERS array
            ALL_RUNNERS=$(jq -s '.[0] + .[1]' <(echo "$ALL_RUNNERS") <(echo "$RESPONSE" | jq '.runners'))
 
            PAGE=$((PAGE+1))
          done
 
          # Filter offline runners except Internal_Tools
          RUNNERS=$(echo "$ALL_RUNNERS" | jq '[.[] | select(.status == "offline" and .name != "Internal_Tools_Automation_Server" and .name != "Internal_Tools_Automation_Server_2" and .name != "Majesco_Github_Backup_Runner")]')
 
          if [[ $(echo "$RUNNERS" | jq length) -eq 0 ]]; then
            echo "No offline runners found."
            exit 0
          fi
 
          RUNNER_IDS=$(echo "$RUNNERS" | jq -r '.[].id')
 
          for ID in $RUNNER_IDS; do
            echo "Removing runner with ID: $ID"
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/orgs/${ORG}/actions/runners/${ID}")
            if [[ "$RESPONSE" == "204" ]]; then
              echo "✅ Successfully removed runner ID: $ID"
            else
              echo "❌ Failed to remove runner ID: $ID (HTTP Status: $RESPONSE)"
            fi
          done
 
          echo "Cleanup completed."
