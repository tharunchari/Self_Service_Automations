---
name: ephemeral-Bamboo-Agent-build

'on':
  workflow_dispatch:
  schedule:
    - cron: '30 5 1 * *'  # 11:00 IST on the 1st of every month

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    env:
      SNS_TOPIC_ARN: arn:aws:sns:us-west-2:389180911583:Internal-Tools_Patching
      ECR_REPO: 389180911583.dkr.ecr.us-west-2.amazonaws.com/vitech-bamboodr-repo
      TINI_VERSION: v0.19.0
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PROD_FINE_GRAINED_PAT }}

      - name: Clone Bitbucket Bamboo Agent Base
        run: |
          git clone https://bitbucket.org/atlassian-docker/docker-bamboo-agent-base.git agent-base || {
            echo "Failed to clone docker-bamboo-agent-base repository"
            exit 1
          }

      - name: Clone Atlassian Docker Shared Components
        run: |
          git clone https://bitbucket.org/atlassian-docker/docker-shared-components.git shared-components-upstream || {
            echo "Failed to clone docker-shared-components repository"
            exit 1
          }

      - name: Compare Dockerfiles
        id: compare
        run: |
          if [ -f agent-base/Dockerfile ] && [ -f Dockerfile.last ]; then
            diff -q agent-base/Dockerfile Dockerfile.last > diff.log || true
          else
            echo "No previous Dockerfile to compare, treating as changes present"
            echo "DIFF" > diff.log
          fi
          if [ -s diff.log ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate Upstream Dockerfile
        if: steps.compare.outputs.changed == 'true'
        run: |
          if ! grep -q "FROM.*ubuntu" agent-base/Dockerfile; then
            echo "Upstream Dockerfile does not use Ubuntu base, conversion may fail"
            #exit 1
          fi

      - name: Prepare AWS Linux Dockerfile from Atlassian Upstream
        if: steps.compare.outputs.changed == 'true'
        working-directory: agent-base
        run: |
          # Convert Dockerfile from Ubuntu/Debian to Amazon Linux
          sed -i 's|^ARG BASE_IMAGE=.*|ARG BASE_IMAGE=amazonlinux:2023|' Dockerfile
          sed -i 's|^FROM .*$|FROM $BASE_IMAGE|' Dockerfile
          # Remove all lines that start with && to clean up any malformed commands
          sed -i '/^\s*&&/d' Dockerfile

          # Process package installations
          awk '
          BEGIN {
            install=0; pkg_count=0;
            seen["git"]=0; seen["openssh-clients"]=0;
            seen["python3"]=0; seen["python3-pip"]=0
          }
          /apt-get install -y/ {install=1; next}
          install && /^[ \t]+[a-zA-Z]/ {
            # Extract package name from line
            line = $0
            gsub("^ *", "", line)
            gsub(/[ \t\\]+$/, "", line)
            
            # Split line by spaces to handle multiple packages on one line
            n = split(line, packages, " ")
            for(j=1; j<=n; j++) {
              pkg = packages[j]
              if(pkg == "") continue
              
              # Convert package names
              if(pkg == "openssh-client") pkg = "openssh-clients"
              else if(pkg == "python-is-python3") pkg = "python3"
              else if(pkg == "python3-jinja2") pkg = "python3-pip"
              else if(pkg == "tini" || pkg == "git-lfs") continue
              
              # Avoid duplicates
              if((pkg == "git" && seen["git"]==1) ||
                 (pkg == "openssh-clients" && seen["openssh-clients"]==1) ||
                 (pkg == "python3" && seen["python3"]==1) ||
                 (pkg == "python3-pip" && seen["python3-pip"]==1)) {
                continue
              }
              
              # Mark as seen and add to list
              seen[pkg] = 1
              pkg_list[pkg_count] = pkg
              pkg_count++
            }
            next
          }
          install && (/^[ \t]*&&/ || /^[ \t]*$/ || !/^[ \t]+/) {
            if(pkg_count > 0) {
              print "RUN yum update -y && yum upgrade -y && yum install -y \\"
              for(i=0; i<pkg_count; i++) {
                if(i < pkg_count-1)
                  print "    " pkg_list[i] " \\"
                else
                  print "    " pkg_list[i] " \\"
              }
              print "    && yum clean all"
              print "RUN pip3 install jinja2"
              print "RUN curl -Lo git-lfs.tar.gz https://github.com/git-lfs/git-lfs/releases/download/v3.5.1/git-lfs-linux-amd64-v3.5.1.tar.gz \\"
              print "    && tar -xzf git-lfs.tar.gz \\"
              print "    && mv git-lfs-*/git-lfs /usr/local/bin/ \\"
              print "    && rm -rf git-lfs.tar.gz git-lfs-*"
            }
            install=0
            pkg_count=0
            delete pkg_list
            # Skip all apt-get related commands
            if(/apt-get/ || /rm -rf \/var\/lib\/apt/) next
            # Skip empty lines and continuation lines that were part of apt-get
            if(/^[ \t]*&&/ || /^[ \t]*$/) next
          }
          /apt-get/ {next}
          /rm -rf \/var\/lib\/apt/ {next}
          {print}
          ' Dockerfile > Dockerfile.tmp && mv Dockerfile.tmp Dockerfile

          # Debug: Log the generated Dockerfile
          echo "Generated Dockerfile:"
          cat Dockerfile

          # Validate Dockerfile syntax
          echo "Validating Dockerfile syntax..."
          if ! docker run --rm -i hadolint/hadolint < Dockerfile 2>/dev/null; then
            echo "Warning: Dockerfile has style issues, but proceeding with build"
          fi
          
          # Basic validation - check for lines that start with package names
          if grep -E '^[ \t]*[a-z][a-z0-9_-]*[ \t]*\\?[ \t]*$' Dockerfile; then
            echo "ERROR: Found malformed package lines in Dockerfile"
            exit 1
          fi

          # Install tini manually if not present
          if ! grep -q "/tini" Dockerfile; then
            sed -i '/yum clean all/a \
          # Install tini manually\nRUN curl -Lo /tini https://github.com/krallin/tini/releases/download/${TINI_VERSION}/tini-${TINI_VERSION}-amd64\nRUN chmod +x /tini\nRUN mv /tini /usr/local/bin/tini' Dockerfile
          fi

          # Remove sensitive ARG or ENV instructions
          sed -i '/ARG.*PASSWORD/d' Dockerfile
          sed -i '/ENV.*PASSWORD/d' Dockerfile

          # Robustly convert ENV lines to key=value format
          sed -i -E 's/^ENV[[:space:]]+([A-Za-z_][A-Za-z0-9_]*)[[:space:]]*=[[:space:]]*(.*)$/ENV \1=\2/' Dockerfile
          sed -i -E 's/^ENV[[:space:]]+([A-Za-z_][A-Za-z0-9_]*)[[:space:]]+(.*)$/ENV \1=\2/' Dockerfile

          # Remove accidental lines starting with &&
          sed -i '/^&&/d' Dockerfile
          # Remove empty continuation lines
          sed -i '/^\\$/d' Dockerfile
          # Remove lines that are just package names without RUN
          sed -i '/^[ \t]*[a-zA-Z][a-zA-Z0-9_-]*[ \t]*\\*$/d' Dockerfile
          # Remove any remaining apt-get references
          sed -i '/apt-get/d' Dockerfile

          # Validate package availability
          echo "Checking package availability..."
          docker run --rm amazonlinux:2023 yum list available git openssh-clients python3 python3-pip || {
            echo "One or more packages not found in Amazon Linux 2023 repository"
            exit 1
          }
      - name: Copy everything from agent-base to workspace
        if: steps.compare.outputs.changed == 'true'
        run: |
          cp -r agent-base/* .

      - name: Copy shared-components from upstream to workspace
        if: steps.compare.outputs.changed == 'true'
        run: |
          rm -rf shared-components
          cp -r shared-components-upstream shared-components

      - name: Configure AWS credentials
        if: steps.compare.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Login to Amazon ECR
        if: steps.compare.outputs.changed == 'true'
        run: |
          aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin $ECR_REPO

      - name: Build Docker image
        if: steps.compare.outputs.changed == 'true'
        run: |
          docker build -t vitech-bamboodr-repo .
        shell: /usr/bin/bash -e {0}
        env:
          SNS_TOPIC_ARN: arn:aws:sns:us-west-2:389180911583:Internal-Tools_Patching
          ECR_REPO: 389180911583.dkr.ecr.us-west-2.amazonaws.com/vitech-bamboodr-repo
          TINI_VERSION: v0.19.0
          AWS_DEFAULT_REGION: us-west-2
          AWS_REGION: us-west-2
          AWS_ACCESS_KEY_ID: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}

      - name: Tag and Push Docker image to ECR
        if: steps.compare.outputs.changed == 'true'
        run: |
          TAG=$(date +%Y%m%d-%H%M%S)
          docker tag vitech-bamboodr-repo:latest $ECR_REPO:$TAG
          docker push $ECR_REPO:$TAG || {
            echo "Docker push failed"
            exit 1
          }

      - name: Update Dockerfile.last in repo for future comparison
        if: steps.compare.outputs.changed == 'true'
        run: |
          cp agent-base/Dockerfile Dockerfile.last

      - name: Commit and push Dockerfile.last
        if: steps.compare.outputs.changed == 'true'
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add Dockerfile.last
          git diff --staged --quiet || git commit -m "Update last known Bamboo Dockerfile [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
