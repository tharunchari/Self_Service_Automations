name: ephemeral-Bamboo-Agent-build

on:
  workflow_dispatch:
  schedule:
    - cron: '30 5 1 * *'
    # 11:00 IST on the 1st of every month

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    env:
      SNS_TOPIC_ARN: arn:aws:sns:us-west-2:389180911583:Internal-Tools_Patching
      ECR_REPO: 389180911583.dkr.ecr.us-west-2.amazonaws.com/vitech-bamboodr-repo
    steps:
    - name: Checkout this repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PROD_FINE_GRAINED_PAT }}

    - name: Clone Bitbucket Bamboo Agent Base
      run: git clone https://bitbucket.org/atlassian-docker/docker-bamboo-agent-base.git agent-base

    - name: Clone Atlassian Docker Shared Components
      run: git clone https://bitbucket.org/atlassian-docker/docker-shared-components.git shared-components-upstream

    - name: Compare Dockerfiles
      id: compare
      run: |
        if [ -f agent-base/Dockerfile ] && [ -f Dockerfile.last ]; then
          diff -q agent-base/Dockerfile Dockerfile.last > diff.log || true
        else
          echo "No previous Dockerfile to compare, treating as changes present"
          echo "DIFF" > diff.log
        fi
        if [ -s diff.log ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Prepare AWS Linux Dockerfile from Atlassian Upstream
      if: steps.compare.outputs.changed == 'true'
      working-directory: agent-base
      run: |
        # Convert Dockerfile from Ubuntu/Debian to Amazon Linux
        sed -i 's|^ARG BASE_IMAGE=.*|ARG BASE_IMAGE=amazonlinux:2023|' Dockerfile
        sed -i 's|^FROM .*$|FROM $BASE_IMAGE|' Dockerfile
    
        # Rewrite the apt-based install block to yum-based for AL2023
        awk '
        BEGIN {
            install = 0
            pkg_count = 0
            seen["python3"] = 1  # Already in AL2023, skip
            seen["python3-pip"] = 0
        }
        /apt-get install -y/ {
            install = 1
            next
        }
        install && /^         / {
            pkg = $0
            gsub("^ *", "", pkg)
            gsub("openssh-client", "openssh", pkg)
            gsub("python-is-python3", "python3", pkg)
            gsub("python3-jinja2", "python3-pip", pkg)
            gsub("tini", "", pkg)
            if (pkg == "" || pkg == "\\" || pkg ~ /^ *$/) next
            if (seen[pkg] == 1) next
            seen[pkg] = 1
            pkg_list[pkg_count] = pkg
            pkg_count++
            next
        }
        install && !/^         / {
            if (pkg_count > 0) {
                print "RUN yum update -y && yum upgrade -y && yum install -y \\"
                for (i = 0; i < pkg_count; i++) {
                    line = "    " pkg_list[i]
                    if (i < pkg_count - 1) {
                        print line " \\"
                    } else {
                        print line " && yum clean all"
                    }
                }
                print "RUN pip3 install jinja2"
            }
            install = 0
            pkg_count = 0
            delete pkg_list
            next
        }
        /apt-get update/ {next}
        /apt-get upgrade/ {next}
        /apt-get clean/ {next}
        /apt-get autoclean/ {next}
        /apt-get autoremove/ {next}
        /rm -rf \/var\/lib\/apt\/lists\/*/ {next}
        {print}
        ' Dockerfile > Dockerfile.tmp && mv Dockerfile.tmp Dockerfile
    
        # Insert tini install after yum block if not already present
        if ! grep -q "/tini" Dockerfile; then
          sed -i '/yum clean all/a \
        # Install tini manually\nRUN curl -Lo /tini https://github.com/krallin/tini/releases/download/v0.19.0/tini-0.19.0-amd64\nRUN chmod +x /tini\nRUN mv /tini /usr/local/bin/tini' Dockerfile
        fi
    
        # Normalize ENV format
        sed -i -E 's/^ENV[[:space:]]+([A-Za-z_][A-Za-z0-9_]*)[[:space:]]*=[[:space:]]*(.*)$/ENV \1=\2/' Dockerfile
        sed -i -E 's/^ENV[[:space:]]+([A-Za-z_][A-Za-z0-9_]*)[[:space:]]+(.*)$/ENV \1=\2/' Dockerfile
    
        # Remove accidental lines that start with just "&&" or "\"
        sed -i '/^ *&&/d' Dockerfile
        sed -i '/^ *\\$/d' Dockerfile
    
        # Remove trailing backslashes from last package lines (just in case)
        sed -i 's/ \\ *$//' Dockerfile


    - name: Copy everything from agent-base to workspace
      if: steps.compare.outputs.changed == 'true'
      run: |
        cp -r agent-base/* .

    - name: Copy shared-components from upstream to workspace
      if: steps.compare.outputs.changed == 'true'
      run: |
        rm -rf shared-components
        cp -r shared-components-upstream shared-components

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
        aws-region: us-west-2

    - name: Login to Amazon ECR
      if: steps.compare.outputs.changed == 'true'
      run: |
        aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin $ECR_REPO

    - name: Build Docker image
      if: steps.compare.outputs.changed == 'true'
      run: |
        docker build -t vitech-bamboodr-repo .

    - name: Tag Docker image
      if: steps.compare.outputs.changed == 'true'
      run: |
        docker tag vitech-bamboodr-repo:latest $ECR_REPO:latest-test

    - name: Push Docker image to ECR
      if: steps.compare.outputs.changed == 'true'
      run: |
        docker push $ECR_REPO:latest-test

    - name: Update Dockerfile.last in repo for future comparison
      if: steps.compare.outputs.changed == 'true'
      run: |
        cp agent-base/Dockerfile Dockerfile.last

    - name: Commit and push Dockerfile.last
      if: steps.compare.outputs.changed == 'true'
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        git add Dockerfile.last
        git commit -m "Update last known Bamboo Dockerfile [skip ci]" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
