name: ephemeral-Bamboo-Agent-build

on:
  workflow_dispatch:
  schedule:
    - cron: '30 5 1 * *'
    # 11:00 IST on the 1st of every month

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    env:
      SNS_TOPIC_ARN: arn:aws:sns:us-west-2:389180911583:Internal-Tools_Patching
      ECR_REPO: 389180911583.dkr.ecr.us-west-2.amazonaws.com/vitech-bamboodr-repo
    steps:
    - name: Checkout this repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PROD_FINE_GRAINED_PAT }}

    - name: Clone Bitbucket Bamboo Agent Base
      run: git clone https://bitbucket.org/atlassian-docker/docker-bamboo-agent-base.git agent-base

    - name: Compare Dockerfiles
      id: compare
      run: |
        if [ -f agent-base/Dockerfile ] && [ -f Dockerfile.last ]; then
          diff -q agent-base/Dockerfile Dockerfile.last > diff.log || true
        else
          echo "No previous Dockerfile to compare, treating as changes present"
          echo "DIFF" > diff.log
        fi
        if [ -s diff.log ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Prepare AWS Linux Dockerfile using sed
      if: steps.compare.outputs.changed == 'true'
      run: |
        cp agent-base/Dockerfile Dockerfile
        # Replace Ubuntu base image with Amazon Linux
        sed -i 's|FROM ubuntu:.*|FROM amazonlinux:latest|' Dockerfile
        # Replace apt-get update/upgrade/clean/autoremove and rm -rf /var/lib/apt/lists/* with yum equivalents or remove them
        sed -i '/apt-get.*update/d' Dockerfile
        sed -i '/apt-get.*upgrade/d' Dockerfile
        sed -i '/apt-get.*clean/d' Dockerfile
        sed -i '/apt-get.*autoremove/d' Dockerfile
        sed -i '/rm -rf \/var\/lib\/apt\/lists\/*/d' Dockerfile
        # Replace apt-get install with yum install, convert package list, and add amazonlinux packages as needed
        sed -i 's/apt-get install -y\( --no-install-recommends\)\? /yum install -y /g' Dockerfile
        # Replace common Ubuntu packages with Amazon Linux equivalents
        sed -i 's/openssh-client/openssh/g' Dockerfile
        sed -i 's/python-is-python3/python3/g' Dockerfile
        # Always ensure Java is installed
        sed -i '/yum install -y/ s/$/ java-17-amazon-corretto-devel tar/' Dockerfile
        # Tini not in Amazon Linux repo; install manually if referenced
        if grep -q 'tini' Dockerfile; then
          echo -e '# Install tini for Amazon Linux\nRUN curl -Lo /tini https://github.com/krallin/tini/releases/download/v0.19.0/tini-0.19.0-amd64 \\\n    && chmod +x /tini \\\n    && mv /tini /usr/local/bin/tini' >> Dockerfile
        fi
        # Convert ENV key value to ENV key=value for Docker best practices
        sed -i -E 's/^ENV ([A-Za-z_][A-Za-z0-9_]*) (.*)$/ENV \1=\2/' Dockerfile

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
        aws-region: us-west-2

    - name: Login to Amazon ECR
      if: steps.compare.outputs.changed == 'true'
      run: |
        aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin $ECR_REPO

    - name: Build Docker image
      if: steps.compare.outputs.changed == 'true'
      run: |
        docker build -t vitech-bamboodr-repo .

    - name: Tag Docker image
      if: steps.compare.outputs.changed == 'true'
      run: |
        docker tag vitech-bamboodr-repo:latest $ECR_REPO:latest-test

    - name: Push Docker image to ECR
      if: steps.compare.outputs.changed == 'true'
      run: |
        docker push $ECR_REPO:latest-test

    - name: Update Dockerfile.last in repo for future comparison
      if: steps.compare.outputs.changed == 'true'
      run: |
        cp agent-base/Dockerfile Dockerfile.last

    - name: Commit and push Dockerfile.last
      if: steps.compare.outputs.changed == 'true'
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        git add Dockerfile.last
        git commit -m "Update last known Bamboo Dockerfile [skip ci]" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
