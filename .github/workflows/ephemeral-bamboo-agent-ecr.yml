name: ephemeral-Bamboo-Agent-build

on:
  workflow_dispatch:
  schedule:
    - cron: '30 5 1 * *' # 11:00 IST on the 1st of every month

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    env:
      ECR_REPO: 389180911583.dkr.ecr.us-west-2.amazonaws.com/vitech-bamboodr-repo
      TINI_VERSION: v0.19.0
    steps:
    - name: Checkout this repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PROD_FINE_GRAINED_PAT }}

    - name: Clone Bitbucket Bamboo Agent Base
      run: git clone https://bitbucket.org/atlassian-docker/docker-bamboo-agent-base.git agent-base

    - name: Clone Atlassian Docker Shared Components
      run: git clone https://bitbucket.org/atlassian-docker/docker-shared-components.git shared-components-upstream

    - name: Compare Dockerfiles
      id: compare
      shell: bash
      run: |
        if [ -f agent-base/Dockerfile ] && [ -f Dockerfile.last ]; then
          diff -q agent-base/Dockerfile Dockerfile.last > diff.log || true
        else
          echo "DIFF" > diff.log
        fi
        if [ -s diff.log ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

        - name: Prepare AWS Linux Dockerfile from Atlassian Upstream
          if: steps.compare.outputs.changed == 'true'
          working-directory: agent-base
          shell: bash
          run: |
            sed -i 's|^ARG BASE_IMAGE=.*|ARG BASE_IMAGE=amazonlinux:2023|' Dockerfile
            sed -i 's|^FROM .*|FROM $BASE_IMAGE|' Dockerfile
    
            awk '
            BEGIN {in_apt=0}
            /RUN apt-get update/ {in_apt=1; print "RUN yum update -y"; print "RUN yum upgrade -y"; next}
            in_apt==1 && /apt-get install -y/ {next}
            in_apt==1 && /^\s+/ {
              pkg=$0
              gsub("^\\s+", "", pkg)
              gsub("\\\\", "", pkg)
              gsub("openssh-client", "openssh", pkg)
              gsub("python-is-python3", "python3", pkg)
              gsub("python3-jinja2", "python3-pip", pkg)
              # Remove tini and git-lfs here, will add manually later
              if(pkg=="tini" || pkg=="git-lfs" || pkg=="") next
              print "RUN yum install -y " pkg
              next
            }
            in_apt==1 && !/^\s+/ {
              print "RUN yum install -y java-17-amazon-corretto-devel"
              print "RUN yum install -y tar"
              print "RUN yum install -y git-lfs"
              print "RUN yum clean all"
              print "RUN pip3 install jinja2"
              print "RUN curl -Lo /tini https://github.com/krallin/tini/releases/download/v0.19.0/tini-0.19.0-amd64"
              print "RUN chmod +x /tini"
              print "RUN mv /tini /usr/local/bin/tini"
              in_apt=0
              next
            }
            /apt-get upgrade/ {next}
            /apt-get clean/ {next}
            /apt-get autoclean/ {next}
            /apt-get autoremove/ {next}
            /rm -rf \/var\/lib\/apt\/lists\/*/ {next}
            {if(in_apt==0) print}
            ' Dockerfile > Dockerfile.tmp && mv Dockerfile.tmp Dockerfile
    
            echo "Transformed Dockerfile:"
            cat Dockerfile

    - name: Copy everything from agent-base to workspace
      if: steps.compare.outputs.changed == 'true'
      shell: bash
      run: cp -r agent-base/* .

    - name: Copy shared-components from upstream to workspace
      if: steps.compare.outputs.changed == 'true'
      shell: bash
      run: |
        rm -rf shared-components
        cp -r shared-components-upstream shared-components

    - name: Configure AWS credentials
      if: steps.compare.outputs.changed == 'true'
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
        aws-region: us-west-2

    - name: Login to Amazon ECR
      if: steps.compare.outputs.changed == 'true'
      shell: bash
      run: aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin $ECR_REPO

    - name: Build Docker image
      if: steps.compare.outputs.changed == 'true'
      shell: bash
      run: docker build -t vitech-bamboodr-repo .

    - name: Tag Docker image
      if: steps.compare.outputs.changed == 'true'
      shell: bash
      run: |
        TAG=$(date +%Y%m%d-%H%M%S)
        docker tag vitech-bamboodr-repo:latest $ECR_REPO:$TAG

    - name: Push Docker image to ECR
      if: steps.compare.outputs.changed == 'true'
      shell: bash
      run: |
        TAG=$(date +%Y%m%d-%H%M%S)
        docker push $ECR_REPO:$TAG

    - name: Update Dockerfile.last in repo for future comparison
      if: steps.compare.outputs.changed == 'true'
      shell: bash
      run: cp agent-base/Dockerfile Dockerfile.last

    - name: Commit and push Dockerfile.last
      if: steps.compare.outputs.changed == 'true'
      shell: bash
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        git add Dockerfile.last
        git diff --staged --quiet || git commit -m "Update last known Bamboo Dockerfile [skip ci]"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
