name: ephemeral-Bamboo-Agent-build

on:
  workflow_dispatch:
  schedule:
    - cron: '30 5 1 * *' # 11:00 IST on the 1st of every month

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    env:
      SNS_TOPIC_ARN: arn:aws:sns:us-west-2:389180911583:Internal-Tools_Patching
      ECR_REPO: 389180911583.dkr.ecr.us-west-2.amazonaws.com/vitech-bamboodr-repo
      TINI_VERSION: v0.19.0
    steps:
    - name: Checkout this repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PROD_FINE_GRAINED_PAT }}

    - name: Clone Bitbucket Bamboo Agent Base
      run: |
        git clone https://bitbucket.org/atlassian-docker/docker-bamboo-agent-base.git agent-base || {
          echo "Failed to clone docker-bamboo-agent-base repository"
          exit 1
        }

    - name: Clone Atlassian Docker Shared Components
      run: |
        git clone https://bitbucket.org/atlassian-docker/docker-shared-components.git shared-components-upstream || {
          echo "Failed to clone docker-shared-components repository"
          exit 1
        }

    - name: Compare upstream content
      id: compare
      run: |
        if [ -d agent-base ] && [ -f .last_upstream_hash ]; then
          NEW_HASH=$(tar --exclude=.git -cf - agent-base | sha256sum | awk '{print $1}')
          OLD_HASH=$(cat .last_upstream_hash)
          if [ "$NEW_HASH" != "$OLD_HASH" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "changed=true" >> $GITHUB_OUTPUT
        fi

    - name: Validate Upstream Dockerfile
      if: steps.compare.outputs.changed == 'true'
      run: |
        if ! grep -q "FROM.*ubuntu" agent-base/Dockerfile; then
          echo "Upstream Dockerfile does not use Ubuntu base, conversion may fail"
        fi

    - name: Prepare AWS Linux Dockerfile from Atlassian Upstream
      if: steps.compare.outputs.changed == 'true'
      working-directory: agent-base
      run: |
        # 1. Switch base image to Amazon Linux 2023
        sed -i 's|^ARG BASE_IMAGE=.*|ARG BASE_IMAGE=amazonlinux:2023|' Dockerfile
        sed -i 's|^FROM .*$|FROM $BASE_IMAGE|' Dockerfile

        # 2. Load mapping file
        declare -A pkgmap
        while read -r src dst; do
          [[ "$src" =~ ^# ]] && continue  # skip comments
          [[ -z "$src" ]] && continue
          pkgmap["$src"]="$dst"
        done < ../package-map.txt

        # 3. Extract apt-get install package names
        pkgs=$(grep -E "apt-get install" -A20 Dockerfile \
            | sed -E 's/.*apt-get install -y//; s/\\//g' \
            | tr ' ' '\n' \
            | sed '/^$/d')

        # 4. Apply mapping + deduplication
        dedup_pkgs=""
        for p in $pkgs; do
            mapped="${pkgmap[$p]:-$p}"  # default to same name if not mapped
            if [ "$mapped" = "__REMOVE__" ]; then
                continue
            fi
            if ! echo "$dedup_pkgs" | grep -qw "$mapped"; then
                dedup_pkgs="$dedup_pkgs $mapped"
            fi
        done
        dedup_pkgs=$(echo "$dedup_pkgs" | xargs)

        # 5. Remove original apt-get install lines
        sed -i '/apt-get install/,+20d' Dockerfile

        # 6. Add yum install block
        echo -e "RUN yum update -y && yum upgrade -y && yum install -y \\\n    $(echo $dedup_pkgs | tr ' ' '\n' | sed 's/$/ \\/' | sed '$ s/ \\/ /')\n    && yum clean all" \
          >> Dockerfile

        # 7. Add separate installs for removed packages
        echo "RUN pip3 install jinja2" >> Dockerfile
        echo "RUN curl -Lo git-lfs.tar.gz https://github.com/git-lfs/git-lfs/releases/download/v3.5.1/git-lfs-linux-amd64-v3.5.1.tar.gz \\
        && tar -xzf git-lfs.tar.gz \\
        && mv git-lfs-*/git-lfs /usr/local/bin/ \\
        && rm -rf git-lfs.tar.gz git-lfs-*" >> Dockerfile

        # 8. Install tini manually
        echo "RUN curl -Lo /tini https://github.com/krallin/tini/releases/download/${TINI_VERSION}/tini-amd64 \\
        && chmod +x /tini \\
        && mv /tini /usr/local/bin/tini" >> Dockerfile

        # 9. Remove sensitive ENV/ARG
        sed -i '/ARG.*PASSWORD/d' Dockerfile
        sed -i '/ENV.*PASSWORD/d' Dockerfile

        # 10. Normalize ENV syntax
        sed -i -E 's/^ENV[[:space:]]+([A-Za-z_][A-Za-z0-9_]*)[[:space:]]*=[[:space:]]*(.*)$/ENV \1=\2/' Dockerfile
        sed -i -E 's/^ENV[[:space:]]+([A-Za-z_][A-Za-z0-9_]*)[[:space:]]+(.*)$/ENV \1=\2/' Dockerfile

        # 11. Validate package availability
        echo "Checking package availability..."
        docker run --rm amazonlinux:2023 yum list available $dedup_pkgs || {
            echo "One or more packages not found in Amazon Linux 2023 repository"
            exit 1
        }

        echo "Generated yum install command:"
        grep "yum install" Dockerfile

    - name: Copy everything from agent-base to workspace
      if: steps.compare.outputs.changed == 'true'
      run: |
        cp -r agent-base/* .

    - name: Copy shared-components from upstream to workspace
      if: steps.compare.outputs.changed == 'true'
      run: |
        rm -rf shared-components
        cp -r shared-components-upstream shared-components

    - name: Configure AWS credentials
      if: steps.compare.outputs.changed == 'true'
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
        aws-region: us-west-2

    - name: Login to Amazon ECR
      if: steps.compare.outputs.changed == 'true'
      run: |
        aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin $ECR_REPO

    - name: Build Docker image
      if: steps.compare.outputs.changed == 'true'
      run: |
        docker build -t vitech-bamboodr-repo . || {
          echo "Docker build failed"
          exit 1
        }

    - name: Tag Docker image
      if: steps.compare.outputs.changed == 'true'
      run: |
        TAG=$(date +%Y%m%d-%H%M%S)
        echo "TAG=$TAG" >> $GITHUB_ENV
        docker tag vitech-bamboodr-repo:latest $ECR_REPO:$TAG

    - name: Push Docker image to ECR
      if: steps.compare.outputs.changed == 'true'
      run: |
        docker push $ECR_REPO:$TAG || {
          echo "Docker push failed"
          exit 1
        }

    - name: Update upstream hash + Dockerfile.last in repo
      if: steps.compare.outputs.changed == 'true'
      run: |
        tar --exclude=.git -cf - agent-base | sha256sum | awk '{print $1}' > .last_upstream_hash
        cp agent-base/Dockerfile Dockerfile.last

    - name: Commit and push update
      if: steps.compare.outputs.changed == 'true'
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        git add Dockerfile.last .last_upstream_hash
        git diff --staged --quiet || git commit -m "Update last known Bamboo Agent upstream snapshot [skip ci]"
        git pull --rebase
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
