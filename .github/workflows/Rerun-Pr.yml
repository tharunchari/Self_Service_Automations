name: Rerun PRs With Self-hosted Runner Connection Errors

on:
  workflow_dispatch:

jobs:
  rerun-connection-error-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Rerun PRs failed with runner connection error (deep search)
        env:
          PROD_FINE_GRAINED_PAT: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          TOKEN="${PROD_FINE_GRAINED_PAT}"
          OWNER="vitechsystems"
          REPO="CoreAdmin"
          ERROR_SIGNATURE="lost communication with the server"

          echo "========= BEGIN SELF-HOSTED RUNNER CONNECTION ERROR CHECKS ========="

          # Fetch open PRs
          prs=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${OWNER}/${REPO}/pulls?state=open&per_page=25" | \
              jq -r '.[].number' 2>/dev/null)

          if [ -z "$prs" ]; then
            echo "No open PRs found"
            exit 1
          fi

          # Process each PR
          for pr in $prs; do
            echo "--------------------------------------------------------"
            echo "Checking PR #$pr"

            # Get PR details
            pr_data=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
              "https://api.github.com/repos/${OWNER}/${REPO}/pulls/${pr}")

            branch=$(echo "$pr_data" | jq -r '.head.ref' 2>/dev/null)
            head_sha=$(echo "$pr_data" | jq -r '.head.sha' 2>/dev/null)

            if [ -z "$head_sha" ] || [ "$head_sha" = "null" ]; then
              echo "  Cannot get head SHA for PR #$pr, skipping"
              continue
            fi

            echo "  Branch: $branch"
            echo "  Head SHA: $head_sha"

            # Search through MULTIPLE PAGES of workflow runs (deeper history)
            found_error=0
            total_checked=0

            for page in 1 2 3 4 5; do
              echo "  Fetching workflow runs page $page..."
              
              page_runs=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs?per_page=100&page=$page")

              # Find runs for this PR by SHA
              pr_run_ids=$(echo "$page_runs" | jq -r ".workflow_runs[] | select(.head_sha == \"$head_sha\") | .id" 2>/dev/null)

              if [ -z "$pr_run_ids" ]; then
                echo "    No runs found on page $page for this commit"
                continue
              fi

              # Check each run on this page
              for run_id in $pr_run_ids; do
                total_checked=$((total_checked + 1))

                run_name=$(echo "$page_runs" | jq -r ".workflow_runs[] | select(.id == $run_id) | .name" 2>/dev/null)
                run_status=$(echo "$page_runs" | jq -r ".workflow_runs[] | select(.id == $run_id) | .status" 2>/dev/null)
                run_conclusion=$(echo "$page_runs" | jq -r ".workflow_runs[] | select(.id == $run_id) | .conclusion" 2>/dev/null)
                
                if [ "$run_conclusion" = "null" ]; then
                  run_conclusion="(no conclusion)"
                fi
                
                echo "    Run $total_checked: $run_name [status: $run_status, conclusion: $run_conclusion] (ID: $run_id)"

                # Check ALL runs (even successful ones) for connection errors in their job history
                echo "      Fetching jobs to check for connection errors..."

                jobs_json=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs/${run_id}/jobs")

                # Search for error signature
                if echo "$jobs_json" | grep -qi "$ERROR_SIGNATURE"; then
                  echo "      [MATCH] Connection error found in run $run_id!"
                  echo "      [ACTION] Requesting rerun..."

                  http_code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                    -H "Authorization: Bearer ${TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs/${run_id}/rerun")

                  if [ "$http_code" = "201" ] || [ "$http_code" = "202" ]; then
                    echo "      [SUCCESS] Rerun requested for run $run_id (PR #$pr)"
                    found_error=1
                  elif [ "$http_code" = "403" ]; then
                    echo "      [WARNING] Rerun forbidden (HTTP 403) - may already be rerun or in progress"
                  else
                    echo "      [ERROR] Rerun failed with HTTP $http_code"
                  fi

                  sleep 1
                fi
              done
            done

            if [ $found_error -eq 0 ]; then
              echo "  No connection errors found in $total_checked runs for PR #$pr"
            fi
          done

          echo "========= COMPLETED ALL PR CHECKS ========="
