name: Rerun PRs With Self-hosted Runner Connection Errors

on:
  workflow_dispatch:

jobs:
  rerun-connection-error-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Rerun PRs failed with runner connection error (check runs API)
        env:
          PROD_FINE_GRAINED_PAT: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          TOKEN="${PROD_FINE_GRAINED_PAT}"
          OWNER="vitechsystems"
          REPO="CoreAdmin"
          ERROR_SIGNATURE="lost communication with the server"

          echo "========= BEGIN SELF-HOSTED RUNNER CONNECTION ERROR CHECKS ========="

          echo "Fetching open PRs..."
          prs_json=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${OWNER}/${REPO}/pulls?state=open&per_page=25")

          if echo "$prs_json" | jq empty 2>/dev/null; then
            prs=$(echo "$prs_json" | jq -r '.[].number' 2>/dev/null || echo "")
          else
            echo "Error: Failed to get valid JSON for PRs list."
            exit 1
          fi

          for pr in $prs; do
            echo "--------------------------------------------------------"
            echo "Checking PR #$pr"

            # Get PR details including head commit SHA
            pr_json=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
              "https://api.github.com/repos/${OWNER}/${REPO}/pulls/${pr}")
            
            if ! echo "$pr_json" | jq empty 2>/dev/null; then
              echo "  Error: Cannot get PR details for #$pr"
              continue
            fi

            head_sha=$(echo "$pr_json" | jq -r '.head.sha' 2>/dev/null || echo "")
            branch_name=$(echo "$pr_json" | jq -r '.head.ref' 2>/dev/null || echo "")
            
            if [ -z "$head_sha" ]; then
              echo "  Cannot determine head SHA for PR #$pr"
              continue
            fi

            echo "  Branch: $branch_name"
            echo "  Head SHA: $head_sha"

            # Get check runs for the head commit
            echo "  Fetching check runs for commit $head_sha..."
            check_runs_json=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${OWNER}/${REPO}/commits/${head_sha}/check-runs?per_page=100")

            if ! echo "$check_runs_json" | jq empty 2>/dev/null; then
              echo "  Error: Cannot get check runs for commit $head_sha"
              continue
            fi

            # Look for failed check runs
            failed_checks=$(echo "$check_runs_json" | jq -c '.check_runs[] | select(.conclusion == "failure")')

            if [ -z "$failed_checks" ]; then
              echo "  No failed check runs found for commit $head_sha"
              continue
            fi

            found_runner_error=0

            echo "$failed_checks" | while IFS= read -r check; do
              if [ -z "$check" ]; then
                continue
              fi

              check_name=$(echo "$check" | jq -r '.name' 2>/dev/null || echo "")
              check_id=$(echo "$check" | jq -r '.id' 2>/dev/null || echo "")
              conclusion=$(echo "$check" | jq -r '.conclusion' 2>/dev/null || echo "")
              output_title=$(echo "$check" | jq -r '.output.title // empty' 2>/dev/null || echo "")
              output_summary=$(echo "$check" | jq -r '.output.summary // empty' 2>/dev/null || echo "")
              
              echo "    FAILED CHECK: '$check_name' (ID: $check_id) conclusion=[$conclusion]"

              # Check if this failed check contains our error signature
              full_output=$(echo "$check" | jq -r '.output | tostring' 2>/dev/null || echo "")
              
              if echo "$full_output" | grep -qi "$ERROR_SIGNATURE"; then
                echo "      [MATCH] Connection error found in check '$check_name'!"
                
                # Now we need to find the workflow run associated with this check
                # Try to find workflow runs for this commit
                runs_json=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs?per_page=50")

                if echo "$runs_json" | jq empty 2>/dev/null; then
                  # Find workflow run with matching commit SHA
                  matching_run=$(echo "$runs_json" | jq -c ".workflow_runs[] | select(.head_sha == \"$head_sha\" and .name == \"$check_name\")" | head -1)
                  
                  if [ -n "$matching_run" ]; then
                    run_id=$(echo "$matching_run" | jq -r '.id' 2>/dev/null || echo "")
                    
                    if [ -n "$run_id" ]; then
                      echo "      Found matching workflow run: $run_id"
                      echo "      [ACTION] Requesting rerun for workflow run $run_id..."
                      
                      rerun_resp=$(curl -s -w "%{http_code}" -X POST \
                        -H "Authorization: Bearer ${TOKEN}" \
                        -H "Accept: application/vnd.github+json" \
                        "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs/${run_id}/rerun")
                      
                      http_code="${rerun_resp: -3}"
                      if [ "$http_code" = "201" ] || [ "$http_code" = "202" ]; then
                        echo "      [SUCCESS] Rerun requested successfully for run $run_id (PR #$pr)."
                      else
                        echo "      [ERROR] Rerun request failed with HTTP $http_code for run $run_id."
                        echo "      Response: ${rerun_resp%???}"
                      fi
                      
                      found_runner_error=1
                      sleep 2
                    fi
                  else
                    echo "      No matching workflow run found for check '$check_name'"
                  fi
                else
                  echo "      Error: Cannot get workflow runs to find matching run"
                fi
              else
                echo "      No connection error found in check '$check_name'"
              fi
            done

            if [ "$found_runner_error" -eq 0 ]; then
              echo "  No connection errors found in failed checks for PR #$pr."
            fi
          done

          echo "========= COMPLETED ALL PR CHECKS ========="
