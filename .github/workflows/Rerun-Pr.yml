name: Rerun PRs With Connection Errors (API)

on:
  workflow_dispatch:

jobs:
  rerun-connection-error-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (optional if script in repo)
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq unzip

      - name: Rerun failed PRs (API method)
        env:
          PROD_FINE_GRAINED_PAT: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          #!/bin/bash

          TOKEN="${PROD_FINE_GRAINED_PAT}"
          OWNER="vitechsystems"
          REPO="CoreAdmin"
          ERROR_SIGNATURE="lost communication with the server"

          # 1. List top 25 open PRs
          prs=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${OWNER}/${REPO}/pulls?state=open&per_page=25" |
              jq '.[].number')

          for pr in $prs; do
            echo "Checking PR #$pr"
            # 2. List workflow runs for PR
            runs=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs?event=pull_request&per_page=20" |
              jq -c '.workflow_runs[] | {id: .id, conclusion: .conclusion, pr_numbers: [.pull_requests[].number]}')

            echo "$runs" | while IFS= read -r run; do
              run_id=$(echo "$run" | jq -r '.id')
              conclusion=$(echo "$run" | jq -r '.conclusion')
              pr_numbers=$(echo "$run" | jq -r '.pr_numbers[]')

              if [[ "$conclusion" == "failure" ]] && echo "$pr_numbers" | grep -q -w "$pr"; then
                echo "  -> Failed run $run_id for PR #$pr"
                # 3. Download API log ZIP
                curl -sL \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs/${run_id}/logs" \
                  -o logs.zip

                unzip -o logs.zip -d logs_dir &> /dev/null
                found=""
                for f in logs_dir/*; do
                  if grep -qF "$ERROR_SIGNATURE" "$f"; then
                    found="yes"
                    break
                  fi
                done
                rm -rf logs_dir logs.zip

                if [[ $found == "yes" ]]; then
                  echo "    Connection error found! Re-running run $run_id for PR #$pr..."
                  curl -s -X POST \
                    -H "Authorization: Bearer ${TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs/${run_id}/rerun"
                  sleep 2
                else
                  echo "    No connection error found."
                fi
              fi
            done
          done
