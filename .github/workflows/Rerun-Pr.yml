name: Rerun PRs With Self-hosted Runner Connection Errors

on:
  workflow_dispatch:

jobs:
  rerun-connection-error-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Rerun PRs failed with runner connection error (optimized)
        env:
          PROD_FINE_GRAINED_PAT: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          TOKEN="${PROD_FINE_GRAINED_PAT}"
          OWNER="vitechsystems"
          REPO="CoreAdmin"
          ERROR_SIGNATURE="lost communication with the server"

          echo "========= BEGIN SELF-HOSTED RUNNER CONNECTION ERROR CHECKS ========="

          # Fetch top 25 open PRs
          prs=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${OWNER}/${REPO}/pulls?state=open&per_page=25" | \
              jq -r '.[].number' 2>/dev/null)

          if [ -z "$prs" ]; then
            echo "No open PRs found or error fetching PRs"
            exit 1
          fi

          # Process each PR
          for pr in $prs; do
            echo "--------------------------------------------------------"
            echo "Checking PR #$pr"

            # Get branch name for this PR
            branch=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
              "https://api.github.com/repos/${OWNER}/${REPO}/pulls/${pr}" | \
              jq -r '.head.ref' 2>/dev/null)

            if [ -z "$branch" ] || [ "$branch" = "null" ]; then
              echo "  Cannot get branch for PR #$pr, skipping"
              continue
            fi

            echo "  Branch: $branch"

            # Get workflow runs for this branch (limited to recent runs)
            echo "  Fetching recent workflow runs for branch..."
            run_ids=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs?per_page=50" | \
                jq -r ".workflow_runs[] | select(.head_branch == \"$branch\") | .id" 2>/dev/null)

            if [ -z "$run_ids" ]; then
              echo "  No workflow runs found for branch $branch"
              continue
            fi

            found_error=0
            run_count=0

            # Check each workflow run
            for run_id in $run_ids; do
              run_count=$((run_count + 1))
              
              if [ $run_count -gt 10 ]; then
                echo "  Checked 10 runs, stopping search for this PR"
                break
              fi

              echo "    Checking run $run_id..."

              # Get jobs and search for error
              jobs_json=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs/${run_id}/jobs")

              # Simple grep check for error signature
              if echo "$jobs_json" | grep -qi "$ERROR_SIGNATURE"; then
                echo "    [MATCH] Connection error found in run $run_id!"
                echo "    [ACTION] Requesting rerun..."

                http_code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs/${run_id}/rerun")

                if [ "$http_code" = "201" ] || [ "$http_code" = "202" ]; then
                  echo "    [SUCCESS] Rerun requested for run $run_id (PR #$pr)"
                  found_error=1
                else
                  echo "    [ERROR] Rerun failed with HTTP $http_code"
                fi

                sleep 1
              fi
            done

            if [ $found_error -eq 0 ]; then
              echo "  No connection errors found in checked runs for PR #$pr"
            fi
          done

          echo "========= COMPLETED ALL PR CHECKS ========="
