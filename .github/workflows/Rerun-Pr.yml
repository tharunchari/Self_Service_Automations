name: Rerun PRs With Self-hosted Runner Connection Errors

on:
  workflow_dispatch:

jobs:
  rerun-connection-error-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Rerun PRs failed with runner connection error (job annotation detection)
        env:
          PROD_FINE_GRAINED_PAT: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          set -e
          TOKEN="${PROD_FINE_GRAINED_PAT}"
          OWNER="vitechsystems"
          REPO="CoreAdmin"
          ERROR_SIGNATURE="lost communication with the server"

          echo "========= BEGIN SELF-HOSTED RUNNER CONNECTION ERROR CHECKS ========="

          prs_json=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${OWNER}/${REPO}/pulls?state=open&per_page=25")

          if [ -z "$prs_json" ] || [[ "$prs_json" =~ "rate limit" ]] || [[ "$prs_json" =~ "Bad credentials" ]]; then
            echo "  Error: Could not fetch PRs or hit rate limit or bad token!"
            echo "$prs_json"
            exit 1
          fi

          prs=$(echo "$prs_json" | jq '.[].number')

          for pr in $prs; do
            echo "--------------------------------------------------------"
            echo "Checking PR #$pr"

            pr_json=$(curl -s \
              -H "Authorization: Bearer ${TOKEN}" \
              "https://api.github.com/repos/${OWNER}/${REPO}/pulls/${pr}")

            commit_sha=$(echo "$pr_json" | jq -r '.head.sha')

            if [[ -z "$commit_sha" || "$commit_sha" == "null" ]]; then
              echo "  Could not find commit SHA for PR #$pr, skipping."
              continue
            fi

            runs_json=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs?per_page=40")

            if [ -z "$runs_json" ] || [[ "$runs_json" =~ "rate limit" ]]; then
              echo "  Error: Could not fetch workflow runs or hit rate limit!"
              echo "$runs_json"
              continue
            fi

            runs=$(echo "$runs_json" | jq -c ".workflow_runs[] | select(.head_sha==\"$commit_sha\")")

            found_runner_error=0

            for run in $runs; do
              run_id=$(echo "$run" | jq -r '.id')
              conclusion=$(echo "$run" | jq -r '.conclusion')
              echo "    Checking workflow run $run_id with conclusion [$conclusion] for commit $commit_sha."

              jobs_resp=$(curl -s \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs/${run_id}/jobs")

              if [ -z "$jobs_resp" ] || [[ "$jobs_resp" =~ "rate limit" ]]; then
                echo "      Error: Could not fetch jobs or hit rate limit!"
                echo "$jobs_resp"
                continue
              fi

              matches=$(echo "$jobs_resp" | grep -iF "$ERROR_SIGNATURE" | wc -l)

              if [ "$matches" -gt 0 ]; then
                echo "    [MATCH] Connection error found in run $run_id. Sending rerun request."
                curl -s -X POST \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs/${run_id}/rerun"
                echo "    [ACTION] Rerun requested for workflow run $run_id (PR #$pr, commit $commit_sha)."
                found_runner_error=1
                sleep 2
              fi
            done

            if [ "$found_runner_error" -eq 0 ]; then
              echo "  No workflow run jobs detected runner connection error for PR #$pr."
            fi
          done

          echo "========= COMPLETED ALL PR CHECKS ========="
