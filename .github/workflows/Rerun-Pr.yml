name: Rerun PRs With Self-hosted Runner Connection Errors

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * 1-5'  

jobs:
  rerun-connection-error-jobs:
    runs-on: arc-codeql-runners
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Rerun PRs with failed jobs due to runner connection errors
        env:
          PROD_FINE_GRAINED_PAT: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          TOKEN="${PROD_FINE_GRAINED_PAT}"
          OWNER="vitechsystems"
          REPO="CoreAdmin"
          
          # Multiple error signatures for runner connection issues
          ERROR_PATTERNS=(
            "lost communication with the server"
            "Broken pipe"
            "write error"
            "Debug Instance ID"
          )

          echo "=========================================="
          echo "  RUNNER CONNECTION ERROR DETECTION"
          echo "=========================================="
          echo ""

          # Array to track rerun PR numbers
          rerun_prs=()

          # Fetch open PRs
          echo "Fetching open PRs..."
          prs=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${OWNER}/${REPO}/pulls?state=open&per_page=25" | \
              jq -r '.[].number' 2>/dev/null)

          if [ -z "$prs" ]; then
            echo "No open PRs found"
            exit 1
          fi

          pr_count=$(echo "$prs" | wc -l)
          echo "Found $pr_count open PRs"
          echo ""

          total_runs_checked=0
          total_jobs_checked=0
          total_reruns=0
          current_pr=0

          # Process each PR
          for pr in $prs; do
            current_pr=$((current_pr + 1))
            echo "=========================================="
            echo "PR $current_pr/$pr_count: #$pr"
            echo "=========================================="

            # Get PR details
            pr_data=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
              "https://api.github.com/repos/${OWNER}/${REPO}/pulls/${pr}")

            branch=$(echo "$pr_data" | jq -r '.head.ref' 2>/dev/null)
            head_sha=$(echo "$pr_data" | jq -r '.head.sha' 2>/dev/null)

            if [ -z "$head_sha" ] || [ "$head_sha" = "null" ]; then
              echo "  ERROR: Cannot get head SHA for PR #$pr, skipping"
              echo ""
              continue
            fi

            echo "  Branch: $branch"
            echo "  Latest commit: ${head_sha:0:7}"
            echo "  Checking workflow runs for latest commit only..."
            echo ""

            found_error_in_pr=0

            # Get workflow runs for ONLY the HEAD commit
            commit_runs=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs?per_page=100" | \
                jq -c ".workflow_runs[] | select(.head_sha == \"$head_sha\")" 2>/dev/null)

            if [ -z "$commit_runs" ]; then
              echo "  No workflow runs found for latest commit"
              echo ""
              continue
            fi

            # Process each run for this commit
            run_ids=$(echo "$commit_runs" | jq -r '.id' 2>/dev/null)
            
            for run_id in $run_ids; do
              if [ -z "$run_id" ]; then
                continue
              fi

              total_runs_checked=$((total_runs_checked + 1))

              run_name=$(echo "$commit_runs" | jq -r "select(.id == $run_id) | .name" 2>/dev/null | head -1)
              run_status=$(echo "$commit_runs" | jq -r "select(.id == $run_id) | .status" 2>/dev/null | head -1)
              run_conclusion=$(echo "$commit_runs" | jq -r "select(.id == $run_id) | .conclusion" 2>/dev/null | head -1)
              
              if [ "$run_conclusion" = "null" ] || [ -z "$run_conclusion" ]; then
                run_conclusion="(no conclusion)"
              fi
              
              echo "  ----------------------------------------"
              echo "  WORKFLOW RUN: $run_name"
              echo "  ----------------------------------------"
              echo "    Run ID: $run_id"
              echo "    Status: $run_status"
              echo "    Conclusion: $run_conclusion"
              echo ""

              # Fetch ALL jobs in this workflow run
              echo "    Fetching jobs for this run..."
              jobs_json=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs/${run_id}/jobs")

              if ! echo "$jobs_json" | jq empty 2>/dev/null; then
                echo "    ERROR: Failed to fetch jobs"
                echo ""
                continue
              fi

              job_count=$(echo "$jobs_json" | jq '.jobs | length' 2>/dev/null)
              echo "    Found $job_count jobs in this workflow"
              echo ""

              # Check each job individually
              job_ids=$(echo "$jobs_json" | jq -r '.jobs[].id' 2>/dev/null)
              job_number=0
              found_connection_error=0

              for job_id in $job_ids; do
                job_number=$((job_number + 1))
                total_jobs_checked=$((total_jobs_checked + 1))

                job_name=$(echo "$jobs_json" | jq -r ".jobs[] | select(.id == $job_id) | .name" 2>/dev/null)
                job_conclusion=$(echo "$jobs_json" | jq -r ".jobs[] | select(.id == $job_id) | .conclusion" 2>/dev/null)
                job_status=$(echo "$jobs_json" | jq -r ".jobs[] | select(.id == $job_id) | .status" 2>/dev/null)
                
                echo "    JOB $job_number/$job_count: $job_name"
                echo "      Status: $job_status | Conclusion: $job_conclusion"
                
                # Check if job failed
                if [ "$job_conclusion" = "failure" ]; then
                  echo "      ⚠ Job failed - checking for runner connection error..."
                  
                  # Get full job data including steps
                  job_data=$(echo "$jobs_json" | jq ".jobs[] | select(.id == $job_id)" 2>/dev/null)
                  
                  # Check for any of our error patterns
                  error_found=0
                  detected_pattern=""
                  
                  for pattern in "${ERROR_PATTERNS[@]}"; do
                    if echo "$job_data" | grep -qi "$pattern"; then
                      error_found=1
                      detected_pattern="$pattern"
                      break
                    fi
                  done
                  
                  if [ $error_found -eq 1 ]; then
                    echo "      *** RUNNER CONNECTION ERROR DETECTED ***"
                    echo "      Pattern matched: '$detected_pattern'"
                    found_connection_error=1
                  else
                    echo "      Job failed but no runner connection error pattern found"
                  fi
                else
                  echo "      ✓ No error"
                fi
                echo ""
              done

              # If any job has connection error, rerun the entire workflow
              if [ $found_connection_error -eq 1 ]; then
                echo "    =========================================="
                echo "    [ACTION] RUNNER CONNECTION ERROR FOUND!"
                echo "    =========================================="
                echo "    Requesting rerun of ALL jobs in run $run_id..."

                http_code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs/${run_id}/rerun")

                if [ "$http_code" = "201" ] || [ "$http_code" = "202" ]; then
                  echo "    ✓ [SUCCESS] Rerun requested for workflow: $run_name"
                  echo "    ✓ All jobs (including failed ones) will be rerun"
                  echo "    ✓ Run ID: $run_id | PR: #$pr"
                  total_reruns=$((total_reruns + 1))
                  found_error_in_pr=1
                  
                  # Add to rerun list if not already added
                  if [[ ! " ${rerun_prs[@]} " =~ " ${pr} " ]]; then
                    rerun_prs+=("$pr")
                  fi
                elif [ "$http_code" = "403" ]; then
                  echo "    ✗ [WARNING] Rerun forbidden (HTTP 403)"
                  echo "    This may mean the run is already queued or in progress"
                else
                  echo "    ✗ [ERROR] Rerun request failed with HTTP $http_code"
                fi
                echo ""

                sleep 1
              else
                echo "    No runner connection errors found in any jobs"
                echo ""
              fi
            done

            if [ $found_error_in_pr -eq 0 ]; then
              echo "  No runner connection errors found in any workflows for PR #$pr"
            fi
            echo ""
          done

          echo "=========================================="
          echo "           FINAL SUMMARY"
          echo "=========================================="
          echo "Total PRs checked: $pr_count"
          echo "Total workflow runs checked: $total_runs_checked"
          echo "Total jobs examined: $total_jobs_checked"
          echo "Total reruns requested: $total_reruns"
          echo ""
          
          if [ ${#rerun_prs[@]} -gt 0 ]; then
            echo "=========================================="
            echo "  PRs WITH RERUNS REQUESTED (${#rerun_prs[@]})"
            echo "=========================================="
            for pr_num in "${rerun_prs[@]}"; do
              pr_url="https://github.com/${OWNER}/${REPO}/pull/${pr_num}"
              echo "  • PR #$pr_num: $pr_url"
            done
            echo "=========================================="
          else
            echo "No PRs required reruns"
          fi
          
          echo ""
          echo "COMPLETED ALL CHECKS"
          echo "=========================================="
