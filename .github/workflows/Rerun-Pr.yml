name: Rerun PRs With Self-hosted Runner Connection Errors

on:
  workflow_dispatch:

jobs:
  rerun-connection-error-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Rerun PRs failed with runner connection error (check runs detection)
        env:
          PROD_FINE_GRAINED_PAT: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          TOKEN="${PROD_FINE_GRAINED_PAT}"
          OWNER="vitechsystems"
          REPO="CoreAdmin"
          ERROR_SIGNATURE="lost communication with the server"

          echo "========= BEGIN SELF-HOSTED RUNNER CONNECTION ERROR CHECKS ========="

          prs=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${OWNER}/${REPO}/pulls?state=open&per_page=25" |
              jq '.[].number')

          for pr in $prs; do
            echo "--------------------------------------------------------"
            echo "Checking PR #$pr"

            # Get latest commit SHA for the PR
            commit_sha=$(curl -s \
              -H "Authorization: Bearer ${TOKEN}" \
              "https://api.github.com/repos/${OWNER}/${REPO}/pulls/${pr}" | jq -r '.head.sha')

            if [[ -z "$commit_sha" ]]; then
              echo "  Could not find commit SHA for PR #$pr, skipping."
              continue
            fi

            # Get all check runs for the commit
            check_runs=$(curl -s \
              -H "Authorization: Bearer ${TOKEN}" \
              "https://api.github.com/repos/${OWNER}/${REPO}/commits/${commit_sha}/check-runs")

            num_checks=$(echo "$check_runs" | jq '.check_runs | length')
            if [ "$num_checks" -eq 0 ]; then
              echo "  No check runs found for commit $commit_sha of PR #$pr."
              echo "  No check run detected with runner connection error for PR #$pr"
              continue
            fi

            found_runner_error=0

            for check in $(echo "$check_runs" | jq -c '.check_runs[]'); do
              name=$(echo "$check" | jq -r '.name')
              conclusion=$(echo "$check" | jq -r '.conclusion')
              output=$(echo "$check" | jq -r '.output.text // empty')

              if [[ "$conclusion" == "failure" ]] && echo "$output" | grep -qi "$ERROR_SIGNATURE"; then
                echo "  [MATCH] Check run \"$name\" failed for PR #$pr due to runner connection error."

                found_runner_error=1

                # Find workflow runs triggered by this commit
                runs=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs?per_page=40" |
                  jq -c ".workflow_runs[] | select(.head_sha==\"$commit_sha\")")

                workflow_found=0
                for run in $runs; do
                  run_id=$(echo "$run" | jq -r '.id')
                  conclusion=$(echo "$run" | jq -r '.conclusion')
                  echo "    Found workflow run $run_id with conclusion [$conclusion] for commit $commit_sha."
                  # Re-run workflow
                  curl -s -X POST \
                    -H "Authorization: Bearer ${TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs/${run_id}/rerun"
                  echo "    [ACTION] Rerun requested for workflow run $run_id (PR #$pr, commit $commit_sha)."
                  workflow_found=1
                  sleep 2
                done

                if [ "$workflow_found" -eq 0 ]; then
                  echo "    No workflow run found for commit $commit_sha."
                fi

              fi
            done

            if [ "$found_runner_error" -eq 0 ]; then
              echo "  No check run detected with runner connection error for PR #$pr"
            fi
          done

          echo "========= COMPLETED ALL PR CHECKS ========="
