name: Rerun PRs With Self-hosted Runner Connection Errors

on:
  workflow_dispatch:

jobs:
  rerun-connection-error-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Rerun PRs failed with runner connection error (check all PR runs)
        env:
          PROD_FINE_GRAINED_PAT: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          TOKEN="${PROD_FINE_GRAINED_PAT}"
          OWNER="vitechsystems"
          REPO="CoreAdmin"
          ERROR_SIGNATURE="lost communication with the server"

          echo "========= BEGIN SELF-HOSTED RUNNER CONNECTION ERROR CHECKS ========="

          echo "Fetching open PRs..."
          prs_json=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${OWNER}/${REPO}/pulls?state=open&per_page=25")

          if echo "$prs_json" | jq empty 2>/dev/null; then
            prs=$(echo "$prs_json" | jq -r '.[].number' 2>/dev/null || echo "")
          else
            echo "Error: Failed to get valid JSON for PRs list."
            echo "Raw response: $prs_json"
            exit 1
          fi

          for pr in $prs; do
            echo "--------------------------------------------------------"
            echo "Checking PR #$pr"

            echo "  Fetching ALL workflow runs for PR #$pr (not just current commit)..."
            
            # Get ALL workflow runs that reference this PR number
            runs_json=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs?event=pull_request&per_page=100")

            if ! echo "$runs_json" | jq empty 2>/dev/null; then
              echo "  Error: Invalid JSON received for workflow runs. Skipping PR #$pr."
              continue
            fi

            # Filter runs that are associated with this PR number
            pr_runs=$(echo "$runs_json" | jq -c ".workflow_runs[] | select(.pull_requests[]?.number == $pr)")

            if [ -z "$pr_runs" ]; then
              echo "  No workflow runs found for PR #$pr."
              continue
            fi

            found_runner_error=0

            echo "$pr_runs" | while IFS= read -r run; do
              if [ -z "$run" ]; then
                continue
              fi

              run_id=$(echo "$run" | jq -r '.id' 2>/dev/null || echo "")
              conclusion=$(echo "$run" | jq -r '.conclusion' 2>/dev/null || echo "")
              commit_sha=$(echo "$run" | jq -r '.head_sha' 2>/dev/null || echo "")

              if [ -z "$run_id" ]; then
                continue
              fi

              echo "    Checking workflow run $run_id (commit: ${commit_sha:0:7}) with conclusion [$conclusion]..."

              # Skip successful runs
              if [ "$conclusion" == "success" ]; then
                echo "      Skipping successful run."
                continue
              fi

              jobs_resp=$(curl -s \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs/${run_id}/jobs")

              if echo "$jobs_resp" | jq empty 2>/dev/null; then
                matches=$(echo "$jobs_resp" | grep -iF "$ERROR_SIGNATURE" | wc -l)

                if [ "$matches" -gt 0 ]; then
                  echo "    [MATCH] Connection error found in run $run_id. Sending rerun request."
                  curl -s -X POST \
                    -H "Authorization: Bearer ${TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs/${run_id}/rerun"
                  echo "    [ACTION] Rerun requested for workflow run $run_id (PR #$pr)."
                  found_runner_error=1
                  sleep 2
                else
                  echo "    No connection error found in run $run_id."
                fi
              else
                echo "    Error: Invalid JSON received for jobs in run $run_id."
              fi
            done

          done

          echo "========= COMPLETED ALL PR CHECKS ========="
