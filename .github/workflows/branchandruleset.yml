name: ruleset_creationandbranchadd
on:
  workflow_dispatch:
    inputs:
      org_name:
        description: "Organization Name"
        required: true
        default: "vitechsystems"
      repo_name:
        description: "Repository Name"
        required: true
        default: "Repository Name"
      new_branch:
        description: "New Branch to be added"
        required: true
        default: "refs/heads/branchname"
 
jobs:
  update-ruleset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
 
      - name: List directories
        run: ls -al
 
      - name: Change directories and execute script
        env:
          GITHUB_TOKEN: ${{ secrets.PROD_CLASSIC_PAT }}
        run: |
          ls -al
          cd shell_scripts
          ls -al
          chmod +x ./ADDbranching_ruleset.sh
          ./ADDbranching_ruleset.sh ${{ github.event.inputs.org_name }} ${{ github.event.inputs.repo_name }} ${{ github.event.inputs.new_branch }}

