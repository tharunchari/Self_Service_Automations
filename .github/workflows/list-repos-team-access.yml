name: List Org Team Access to Repos

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'  # Every Sunday at 06:00 UTC

jobs:
  team-access:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Generate Team Access Report
        env:
          GH_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
          ORG: vitechsystems
        run: |
          echo " Starting team access audit for organization: $ORG"
          > repo-access.txt
          > codev-matched.txt
          > codev-summary.txt

          page=1
          per_page=100
          has_more=true

          while $has_more; do
            REPOS=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/orgs/$ORG/repos?per_page=$per_page&page=$page")

            COUNT=$(echo "$REPOS" | jq 'length')
            if [ "$COUNT" -eq 0 ]; then
              has_more=false
            else
              echo "$REPOS" | jq -r '.[].name' | while read repo; do
                echo "🔹 Repo: $ORG/$repo" >> repo-access.txt
                TEAMS=$(curl -s -H "Authorization: token $GH_TOKEN" \
                  "https://api.github.com/repos/$ORG/$repo/teams")

                if echo "$TEAMS" | jq -e 'type=="array"' >/dev/null; then
                  if [ "$(echo "$TEAMS" | jq length)" -eq 0 ]; then
                    echo "  (no team access)" >> repo-access.txt
                  else
                    TEAM_LINES=$(echo "$TEAMS" | jq -r '
                      .[] |
                      "  - \(.name): \(
                        if .permission == "pull" then "read"
                        elif .permission == "push" then "write"
                        else .permission
                      end
                      )"
                    ')
                    echo "$TEAM_LINES" >> repo-access.txt

                    if [[ "$repo" == *_L5 || "$repo" == "Nextgen" || "$repo" == "CoreAdmin" ]]; then
                      CODEV_LINE=$(echo "$TEAM_LINES" | grep '^  - CoDev:' || true)
                      if [ -n "$CODEV_LINE" ]; then
                        CODEV_PERMISSION=$(echo "$CODEV_LINE" | awk -F': ' '{print $2}')
                        echo "$repo: $CODEV_PERMISSION" >> codev-matched.txt
                      fi
                    fi
                  fi
                else
                  echo "  (error fetching teams)" >> repo-access.txt
                fi

                echo "" >> repo-access.txt
              done
              page=$((page + 1))
            fi
          done

          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ -s codev-matched.txt ]; then
            echo "Repos with CoDev team access and their permissions:" >> codev-summary.txt
            echo "" >> codev-summary.txt
            echo "| Repository     | CoDev Permission |" >> codev-summary.txt
            echo "|----------------|------------------|" >> codev-summary.txt
            while read matched_line; do
              repo=$(echo "$matched_line" | cut -d':' -f1)
              perm=$(echo "$matched_line" | awk -F': ' '{print $2}')
              printf "| %-14s | %-16s |\n" "$repo" "$perm" >> codev-summary.txt
            done < codev-matched.txt
          else
            echo "No CoDev read or write access is granted for any L5, CoreAdmin, or Nextgen repositories." >> codev-summary.txt
          fi

          echo "" >> codev-summary.txt
          echo "🔗 View full report and logs: $RUN_URL" >> codev-summary.txt
          echo "📎 Download artifact: From the 'Artifacts' section in the link above" >> codev-summary.txt

          if [ -s codev-matched.txt ]; then
            echo "" >> repo-access.txt
            cat codev-summary.txt >> repo-access.txt
          fi

          echo " Team access written to repo-access.txt"
          cat repo-access.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: team-repo-access
          path: repo-access.txt

      - name: Send Email with SES
        run: |
          pip install boto3
          python - <<EOF
          import boto3
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.application import MIMEApplication

          sender = "v3atlassianops@vitechinc.com"
          recipient = "v3atlassianops@vitechinc.com"
          subject = "[GitHub Audit] vitechsystems – CoDev Repo Access Summary"

          with open("codev-summary.txt", "r") as f:
              body_text = f.read()

          msg = MIMEMultipart()
          msg["Subject"] = subject
          msg["From"] = sender
          msg["To"] = recipient
          msg.attach(MIMEText(body_text, "plain"))

          with open("repo-access.txt", "rb") as f:
              part = MIMEApplication(f.read())
              part.add_header("Content-Disposition", "attachment", filename="repo-access.txt")
              msg.attach(part)

          client = boto3.client("ses", region_name="us-east-1")
          response = client.send_raw_email(
              Source=sender,
              Destinations=[recipient],
              RawMessage={"Data": msg.as_string()}
          )
          print("Email sent! Message ID:", response["MessageId"])
EOF
