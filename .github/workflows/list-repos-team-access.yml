name: List Org Team Access to Repos

on:
  workflow_dispatch:

jobs:
  team-access:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Team Access Report
        env:
          GH_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
          ORG: vitechsystems
        run: |
          set -e  # Stop on error
          echo "Starting team access audit for organization: $ORG"
          > repo-access.txt
          > codev-matched.txt

          page=1
          per_page=100
          has_more=true

          while $has_more; do
            echo "Fetching repos (page $page)..."
            REPOS=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/orgs/$ORG/repos?per_page=$per_page&page=$page")

            if [ -z "$REPOS" ] || ! echo "$REPOS" | jq empty >/dev/null 2>&1; then
              echo "❌ Failed to fetch or parse repos from GitHub API"
              echo "Response: $REPOS"
              exit 1
            fi

            COUNT=$(echo "$REPOS" | jq 'length')
            if [ "$COUNT" -eq 0 ]; then
              has_more=false
            else
              echo "$REPOS" | jq -r '.[].name' | while read repo; do
                echo "🔹 Repo: $ORG/$repo" >> repo-access.txt
                TEAMS=$(curl -s -H "Authorization: token $GH_TOKEN" \
                  "https://api.github.com/repos/$ORG/$repo/teams")

                if [ -z "$TEAMS" ] || ! echo "$TEAMS" | jq empty >/dev/null 2>&1; then
                  echo "  (error fetching teams)" >> repo-access.txt
                elif [ "$(echo "$TEAMS" | jq length)" -eq 0 ]; then
                  echo "  (no team access)" >> repo-access.txt
                else
                  TEAM_LINES=$(echo "$TEAMS" | jq -r '
                    .[] |
                    "  - \(.name): \(
                      if .permission == "pull" then "read"
                      elif .permission == "push" then "write"
                      else .permission
                    end
                    )"
                  ')
                  echo "$TEAM_LINES" >> repo-access.txt

                  # Check for CoDev team in specific repos
                  if [[ "$repo" == *_L5 || "$repo" == "Nextgen" || "$repo" == "CoreAdmin" ]]; then
                    CODEV_LINE=$(echo "$TEAM_LINES" | grep '^  - CoDev: ')
                    if [[ -n "$CODEV_LINE" ]]; then
                      PERMISSION=$(echo "$CODEV_LINE" | awk -F': ' '{print $2}')
                      echo "- $repo: $PERMISSION" >> codev-matched.txt
                    fi
                  fi
                fi

                echo "" >> repo-access.txt
              done
              page=$((page + 1))
            fi
          done

          if [ -s codev-matched.txt ]; then
            echo "" >> repo-access.txt
            echo "Below repos have access to CoDev team:" >> repo-access.txt
            echo "" >> repo-access.txt
            cat codev-matched.txt >> repo-access.txt
          fi

          echo "✅ Team access written to repo-access.txt"
          cat repo-access.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: team-repo-access
          path: repo-access.txt
