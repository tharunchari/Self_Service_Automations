name: "CodeQL_for_sql"

on:
  pull_request:
  workflow_dispatch:

jobs:
  CodeQL_for_sql:
    runs-on: ubuntu-latest
      
    steps:  
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run DevSkim Action
        uses: vitechsystems/DevSkim-Action@v1.0
        with:
          directory-to-scan: path/to/scan

          
