name: "CodeQL_for_sql"

on:
  pull_request:
  workflow_dispatch:

jobs:
  CodeQL_for_sql:
    runs-on: ubuntu-latest
      
    steps:  
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug JAVA_HOME
        run: |
          java -version
        
      - name: Set environment variable for third job
        id: gen_step
        run: echo "INSTANCE_ID=${{ needs.LaunchingSelfHostedRunner.outputs.genrun }}" >> $GITHUB_OUTPUT

      - name: Initialize CodeQL for SQL
        run: |
          # Replace with your CodeQL initialization steps if needed

      - name: Run DevSkim Action
        uses: vitechsystems/DevSkim-Action@v1.0

      - name: Upload CodeQL results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: devskim-results.sarif
          
