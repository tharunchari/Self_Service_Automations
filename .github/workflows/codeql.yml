name: "CodeQL"

on:
  workflow_dispatch:

jobs:
  LaunchingSelfHostedRunner:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    outputs:
      genrun: ${{ steps.gen_step.outputs.INSTANCE_ID }}      # <== Note the output variable
    steps:      
      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Start EC2 instance using an ami
        id: start-ec2
        run: |
          aws ec2 run-instances \
            --image-id ${{ vars.SELF_HOSTED_RUNNER_AMI }} \
            --instance-type c5.9xlarge \
            --key-name InternalTools \
            --security-group-ids sg-05c61d58016fc3e3b \
            --subnet-id subnet-074f1c628d472d492 \
            --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=Github_Self_Hosted_Runner},{Key=env,Value=prod},{Key=client,Value=vitech},{Key=env-purpose,Value=prod},{Key=v3ops-custom-tag,Value=githubrunner},{Key=category,Value=app},{Key=fincode,Value=vit-corp-github}]' \
            --iam-instance-profile Name=VitechTools > /tmp/ec2_output.json
          echo "INSTANCE_ID=$(jq -r '.Instances[0].InstanceId' < /tmp/ec2_output.json)" >> $GITHUB_ENV
          echo "INSTANCE_IP=$(jq -r '.Instances[0].PrivateIpAddress' < /tmp/ec2_output.json)" >> $GITHUB_ENV
        shell: bash
        
      - name: Set environment variable for second job
        id: gen_step                                # <====== Note the step id here
        shell: bash
        run: |
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Run Command on EC2 Instance to register the runner with instance ID
        run: |
          aws ssm create-association \
            --name "AWS-RunShellScript" \
            --targets Key=instanceids,Values=$INSTANCE_ID \
            --parameters "commands=['runuser -l ec2-user -c \"/actions-runner/config.sh --url https://github.com/vitechsystems --pat ${{ secrets.PROD_CLASSIC_PAT }} --name $INSTANCE_ID --runnergroup ops --labels $INSTANCE_ID --work _work && /actions-runner/run.sh\"']" \
            --region us-east-1
        shell: bash

      - name: Run Command on EC2 Instance to set JAVA_HOME to ${{ vars.JAVA_HOME_11 }}
        run: |
          aws ssm create-association \
            --name "AWS-RunShellScript" \
            --targets Key=instanceids,Values=$INSTANCE_ID \
            --parameters commands="sudo update-alternatives --install /usr/bin/java java ${{ vars.JAVA_HOME_11 }}/bin/java 1 && sudo update-alternatives --set java ${{ vars.JAVA_HOME_11 }}/bin/java" \
            --region us-east-1
        shell: bash

  CodeQLScan:
    needs: LaunchingSelfHostedRunner
    runs-on: "${{ needs.LaunchingSelfHostedRunner.outputs.genrun }}"
    outputs:
      genrun-2: ${{ steps.gen_step.outputs.INSTANCE_ID }}      # <== Note the output variable
    continue-on-error: true

    name: CodeQL scan
    timeout-minutes: ${{ (matrix.language == 'swift' && 120) || 360 }}
    strategy:
      fail-fast: false
      matrix:
        language: [ 'python' ]
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:  
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set environment variable for third job
        id: gen_step                                # <====== Note the step id here
        shell: bash
        run: |
          echo "INSTANCE_ID=${{ needs.LaunchingSelfHostedRunner.outputs.genrun }}" >> $GITHUB_OUTPUT

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

  TerminatingSelfHostedRunner:
    runs-on: ubuntu-latest
    needs: CodeQLScan
    continue-on-error: true

    steps:       
      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          
      - name: Debug Instance IP
        run: |
          echo Instance ID: "${{ needs.CodeQLScan.outputs.genrun-2 }}"
          
      - name: Run Command on EC2 Instance to remove runner from GitHub
        run: |
          aws ssm create-association \
            --name "AWS-RunShellScript" \
            --targets Key=instanceids,Values=${{ needs.CodeQLScan.outputs.genrun-2 }} \
            --parameters commands="sudo -u ec2-user /actions-runner/config.sh remove --pat ${{ secrets.PROD_CLASSIC_PAT }}" \
            --region us-east-1
        shell: bash

      - name: Get the associations IDS
        id: get_associations
        run: |
          ASSOC_IDS=$(aws ssm describe-effective-instance-associations --instance-id "${{ needs.CodeQLScan.outputs.genrun-2 }}" | jq -r '.Associations[].AssociationId')
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "ASSOC_IDS<<$EOF" >> $GITHUB_ENV
          echo "$ASSOC_IDS" >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV
 
      - name: Delete associations
        run: |
          for ASSOC_ID in $ASSOC_IDS
          do
            aws ssm delete-association --association-id $ASSOC_ID
          done

      - name: Workflow will be in sleep mode until GITHUB runner gets removed from GitHub
        run: |
          sleep 10
          
      - name: Terminate Self Hosted Runner instance
        run: |
          aws ec2 terminate-instances --instance-ids "${{ needs.CodeQLScan.outputs.genrun-2 }}" --region us-east-1
