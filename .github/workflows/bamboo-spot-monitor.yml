name: Bamboo Spot Interruption Monitor

on:
  workflow_dispatch:
    inputs:
      max_results:
        description: 'Maximum number of failed builds to check'
        required: false
        default: '100'
      dry_run:
        description: 'Dry run mode (true = list only, false = actually retry)'
        required: true
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'true'

jobs:
  monitor-and-retry:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests
      
      - name: Download previous run state
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: retry-state
          path: bamboo-builds-monitoring
      
      - name: Run Bamboo Spot Monitor
        env:
          BAMBOO_URL: https://bamboo.vitechinc.com/bamboo
          BAMBOO_USERNAME: ${{ secrets.BAMBOO_USERNAME }}
          BAMBOO_API_TOKEN: ${{ secrets.bamboo_ACCESS_TOKEN }}
          MAX_RESULTS: ${{ github.event.inputs.max_results }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        working-directory: bamboo-builds-monitoring
        run: python bamboo_spot_monitor.py
      
      - name: Upload current run state
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: retry-state
          path: bamboo-builds-monitoring/retry-state.json
          retention-days: 30
      
      - name: Upload detailed report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bamboo-spot-report-${{ github.run_number }}
          path: bamboo-builds-monitoring/bamboo-spot-report-*.json
          retention-days: 2
