name: ERPPRD Patching Pipeline
 
on:
#  workflow_dispatch:
#    inputs:
#      TOMCAT_VERSION:
#        required: true
#        description: Tomcat Version (e.g., 9.0.100)
#      APP_ENVIRONMENT:
#        required: true
#        description: APP Environment (e.g., 'PROD' or 'DR')
#      KEY:
#        required: true
#        description: Authentication Key for OPS Internal Tools
 
env:
  RUNNER_NAME: "Internal_Tools_Automation_Server"
  INSTANCE_ID: "i-020530b54ac86537b"
 
jobs:
  start-runner:
    uses: vitechsystems/service_workflows/.github/workflows/start_runner.yml@main
    secrets: inherit
  
  execute-job:
    name: Execute Job on Self-Hosted Runner
    needs: start-runner
    runs-on: Internal_Tools_Automation_Server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up AWS CLI
        uses: vitechsystems/configure-aws-credentials@v1.0
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
 
      - name: Write defaults/main.yml file
        run: |
          sudo tee erpprd_patching/vars/main.yml > /dev/null <<EOF
          vcusername: "${{ vars.VC_USERNAME }}"
          vcpassword: "${{ secrets.VC_PASSWORD }}"
          tomcat_version: "${{ inputs.TOMCAT_VERSION }}"
          EOF
 
      - name: Write inventory file
        run: |
          sudo tee erpprd_patching/tests/inventory > /dev/null <<EOF
          [DR]
          #VITECH-APP01-ERPPRD-DR-TOM9
          172.26.52.190 ansible_user=root ansible_ssh_pass="${{ secrets.VITECH_LINUX_ZOIO_PASSWORD }}"
 
          [APP01-ERPPRD]
          #VITECH-APP01-ERPPRD-TOM9
          172.26.52.188 ansible_user=root ansible_ssh_pass="${{ secrets.VITECH_LINUX_ZOIO_PASSWORD }}"
 
          [APP02-ERPPRD]
          #VITECH-APP02-ERPPRD-TOM9
          172.26.52.189 ansible_user=root ansible_ssh_pass="${{ secrets.VITECH_LINUX_ZOIO_PASSWORD }}"
          EOF
 
      - name: Run Ansible Playbook
        id: run_playbook
        run: |
          if [ "${{ inputs.KEY }}" == "${{ secrets.OPS_INTERNAL_TOOLS_PASSWORD }}" ]; then
            if [ "${{ inputs.APP_ENVIRONMENT }}" == "PROD" ]; then
              sudo ansible-playbook erpprd_patching/tests/test.yml -i erpprd_patching/tests/inventory
            elif [ "${{ inputs.APP_ENVIRONMENT }}" == "DR" ]; then
              sudo ansible-playbook erpprd_patching/tests/test_2.yml -i erpprd_patching/tests/inventory
            else
              echo "Invalid group name. Use 'DR' or 'PROD'."
              exit 1
            fi
          else
            echo "Invalid authentication key."
            exit 1
          fi
        continue-on-error: true  # Capture playbook failure but don't stop workflow
 
      - name: Send Notification on Failure
        if: failure()
        run: |
          ERROR_MSG=$(grep -iE "fatal:|error:" $GITHUB_WORKSPACE/_work/${{ github.event.repository.name }}/${{ github.event.repository.name }}/logs/*.log | tail -n 20)
          if [[ -z "$ERROR_MSG" ]]; then
            ERROR_MSG="No specific error message found. Check GitHub Actions logs for details."
          fi
          aws sns publish \
            --topic-arn arn:aws:sns:us-east-1:389180911583:VitechToolsNVAProd \
            --message "**ERPPRD ${{ inputs.APP_ENVIRONMENT }} Patch Status: FAILED**\n\nThe patching process for Tomcat ${{ inputs.TOMCAT_VERSION }} has **failed**.\n\n **Error Details:**\n$ERROR_MSG\n\n Please check the GitHub Actions logs for more details." \
            --subject "Rolling Restart: ERPPRD ${{ inputs.APP_ENVIRONMENT }} Patching Failed"
 
      - name: Send Notification on Success
        if: success()
        run: |
          aws sns publish \
            --topic-arn arn:aws:sns:us-east-1:389180911583:VitechToolsNVAProd \
            --message "**ERPPRD ${{ inputs.APP_ENVIRONMENT }} Patch Status: SUCCESS**\n\nThe patching process for Tomcat ${{ inputs.TOMCAT_VERSION }} has completed successfully.\n\n$(date +%Y-%m-%d)" \
            --subject "Rolling Restart: ERPPRD ${{ inputs.APP_ENVIRONMENT }} Patching Completed"

  stop-runner:
    needs: execute-job
    if: always()  # Ensures this job runs even if execute-job fails
    uses: vitechsystems/service_workflows/.github/workflows/stop_runner.yml@main
    secrets: inherit
