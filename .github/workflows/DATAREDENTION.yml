name: "DATAREDENSION"
on:
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: AWS code commit
        run: |
          ls -al
          git config --global user.name 'github-bamboo_vitech'
          git config --global user.password '${{ secrets.PROD_CLASSIC_PAT }}'
          git clone https://${{ secrets.V3LOCITY_CODECOMMIT_USERNAME1 }}:${{ secrets.V3LOCITY_CODECOMMIT_PASSWORD1 }}@git-codecommit.us-west-2.amazonaws.com/v1/repos/RetensionDBA
      - name: Process the code based on comparison
        run: |
          cd RetensionDBA
          rm -rf *
          cd ..
          cp -rf PYTHON_Script/* RetensionDBA/ 
          cd RetensionDBA/ 
          if [ -n "$(git status --porcelain)" ]; then
            # Proceed with commit and push
            git add .
            git commit -m "Latest commits added"
            git push origin main
          else
            # No changes to commit, skip the job
            echo "No changes to commit. Skipping commit and push."
          fi
