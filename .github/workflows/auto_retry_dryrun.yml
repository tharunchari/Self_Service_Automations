name: "Auto-Retry Dry Run PRs"

on:
  #schedule:
  #  - cron: "*/10 * * * *"  # every 10 minutes
  workflow_dispatch:

jobs:
  dryrun-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Dry-Run Auto-Retry Script
        env:
          GITHUB_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}  
          MAX_RETRIES: 2
        run: python PYTHON_Script/auto_retry_prs_dryrun.py
