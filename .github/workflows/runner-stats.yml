name: Runner Stats Collection

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start Date (DD/MM/YYYY)'
        required: true
        default: '01/02/2025'
      end_date:
        description: 'End Date (DD/MM/YYYY)'
        required: true
        default: '27/02/2025'

jobs:
  get-runner-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v3

      - name: Set up Git and jq (for JSON processing)
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Validate Input Dates
        run: |
          start_date="${{ github.event.inputs.start_date }}"
          end_date="${{ github.event.inputs.end_date }}"

          # Validate date format DD/MM/YYYY
          if [[ ! "$start_date" =~ ^[0-9]{2}/[0-9]{2}/[0-9]{4}$ || ! "$end_date" =~ ^[0-9]{2}/[0-9]{2}/[0-9]{4}$ ]]; then
            echo "Error: Invalid date format. Please use DD/MM/YYYY."
            exit 1
          fi

          # Convert to YYYY-MM-DD format for GitHub API
          start_date_formatted=$(echo $start_date | awk -F'/' '{print $3"-"$2"-"$1}')
          end_date_formatted=$(echo $end_date | awk -F'/' '{print $3"-"$2"-"$1}')

          # Check if the date is valid
          start_date_ts=$(date -d "$start_date_formatted" +%s 2>/dev/null)
          end_date_ts=$(date -d "$end_date_formatted" +%s 2>/dev/null)

          if [[ -z "$start_date_ts" || -z "$end_date_ts" ]]; then
            echo "Error: Invalid date. Ensure the date format is correct (DD/MM/YYYY)."
            exit 1
          fi

          if [[ "$start_date_ts" -gt "$end_date_ts" ]]; then
            echo "Error: Start date must be before end date."
            exit 1
          fi

      - name: Run shell script to collect runner stats
        env:
          VITECHSYSTEMS_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
          VITECHQA_TOKEN: ${{ secrets.QA_FINE_GRAINED_PAT }}
          VITECHINFRA_TOKEN: ${{ secrets.INFRA_FINE_GRAINED_PAT }}
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}
        run: |
          #!/bin/bash

          # Output file with timestamp
          output_file="runner_stats_output_$(date +%Y%m%d%H%M%S).txt"
          echo "Runner Stats Collection Report" > $output_file
          echo "===============================" >> $output_file
          echo "Date Range: $START_DATE to $END_DATE" >> $output_file
          echo "" >> $output_file

          # Convert DD/MM/YYYY to ISO-8601 format (YYYY-MM-DD) for GitHub API
          start_date_formatted=$(echo $START_DATE | awk -F'/' '{print $3"-"$2"-"$1}')
          end_date_formatted=$(echo $END_DATE | awk -F'/' '{print $3"-"$2"-"$1}')

          # Debug: Output converted start and end dates
          echo "Start Date: $start_date_formatted"
          echo "End Date: $end_date_formatted"

          # Define organizations and their tokens
          orgs=("vitechsystems" "VitechQA" "VitechInfra")
          declare -A tokens
          tokens["vitechsystems"]="${VITECHSYSTEMS_TOKEN}"
          tokens["VitechQA"]="${VITECHQA_TOKEN}"
          tokens["VitechInfra"]="${VITECHINFRA_TOKEN}"

          # API endpoints
          repos_url="https://api.github.com/orgs/{org}/repos"
          runs_url="https://api.github.com/repos/{org}/{repo}/actions/runs"
          runners_url="https://api.github.com/repos/{org}/{repo}/actions/runners"

          # Function to fetch repos for an org
          fetch_repos() {
            local org=$1
            local token=$2
            repos_url="https://api.github.com/orgs/$org/repos"
            response=$(curl -s -H "Authorization: token $token" "$repos_url")
            if [[ $? -ne 0 ]]; then
              echo "Error: curl command failed for $repos_url." >> $output_file
              return 1
            fi
            # Debug: log the response from repos_url
            echo "Response from $repos_url: $response" >> $output_file
            if [[ $(echo "$response" | jq 'type') != '"array"' ]]; then
              echo "Error: Unable to fetch repositories for $org. Response: $response" >> $output_file
              return 1
            fi
            echo "$response" | jq -r '.[].name'
          }

          # Function to fetch runner count for a repo
          fetch_runners() {
            local org=$1
            local repo=$2
            local token=$3
            runners_url="https://api.github.com/repos/$org/$repo/actions/runners"
            response=$(curl -s -H "Authorization: token $token" "$runners_url")
            if [[ $? -ne 0 ]]; then
              echo "Error: curl command failed for $runners_url." >> $output_file
              return 1
            fi
            # Debug: log the response from runners_url
            echo "Response from $runners_url: $response" >> $output_file
            if [[ $(echo "$response" | jq 'type') != '"object"' ]]; then
              echo "Error: Invalid JSON response for $runners_url. Response: $response" >> $output_file
              return 1
            fi
            echo "$response" | jq '.total_count'
          }

          # Function to fetch workflow runs and calculate total runtime for a repo
          fetch_runs() {
            local org=$1
            local repo=$2
            local token=$3
            local total_runs=0
            local total_runtime=0
            page=1
            while : ; do
              runs_url="https://api.github.com/repos/$org/$repo/actions/runs?page=$page&per_page=100"
              data=$(curl -s -H "Authorization: token $token" "$runs_url")
              if [[ $? -ne 0 ]]; then
                echo "Error: curl command failed for $runs_url." >> $output_file
                return 1
              fi
              # Debug: log the response from runs_url
              echo "Response from $runs_url: $data" >> $output_file

              if [[ "$data" == "null" || -z "$data" || $(echo "$data" | jq -r '.workflow_runs | length') == "0" ]]; then
                break
              fi

              # Loop through all runs in the page
              echo "$data" | jq -r '.workflow_runs[] | .created_at, .run_duration_ms' | while read -r run_date; do
                read -r run_duration
                # Debug: Output the raw run data
                echo "Run Date: $run_date, Duration: $run_duration ms" >> $output_file

                # Compare the run date with the date range
                if [[ "$run_date" > "$start_date_formatted"T* && "$run_date" < "$end_date_formatted"T* ]]; then
                  # Increment total runtime if the run falls within the date range
                  if [[ "$run_duration" -gt 0 ]]; then
                    total_runtime=$((total_runtime + run_duration))
                    total_runs=$((total_runs + 1))
                  fi
                fi
              done
              page=$((page + 1))
            done
            echo "$total_runs $total_runtime"
          }

          # Main loop through organizations and repositories
          total_overall_runtime=0
          for org in "${orgs[@]}"; do
            echo "Processing organization: $org" >> $output_file
            token="${tokens[$org]}"
            repos=$(fetch_repos "$org" "$token")
            if [[ $? -ne 0 ]]; then
              echo "Error fetching repositories for $org. Skipping organization." >> $output_file
              continue
            fi

            total_runners=0
            total_runtime=0
            total_repos=0
            for repo in $repos; do
              echo "  Checking repo: $repo" >> $output_file
              runners=$(fetch_runners "$org" "$repo" "$token")
              if [[ $? -ne 0 ]]; then
                echo "Error fetching runners for $repo. Skipping repo." >> $output_file
                continue
              fi
              total_runners=$((total_runners + runners))

              # Get workflow run details for the repo
              read total_runs repo_runtime <<<$(fetch_runs "$org" "$repo" "$token")
              if [[ $? -ne 0 ]]; then
                echo "Error fetching runs for $repo. Skipping repo." >> $output_file
                continue
              fi
              total_runtime=$((total_runtime + repo_runtime))
              echo "    $repo: $total_runs runs, $(convert_time $repo_runtime) runtime" >> $output_file
              total_repos=$((total_repos + 1))
            done

            # Convert total runtime into hours, minutes, seconds
            echo "$org: Total Repositories: $total_repos, Total Runners: $total_runners" >> $output_file
            echo "$org: Total Repositories: $total_repos, Total Runners: $total_runners"
            echo "  Total Runtime: $(convert_time $total_runtime)" >> $output_file
            echo "  Total Runtime: $(convert_time $total_runtime)"
            echo "" >> $output_file
          done

      - name: Upload the output file as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: runner-stats-output
          path: runner_stats_output_*.txt
