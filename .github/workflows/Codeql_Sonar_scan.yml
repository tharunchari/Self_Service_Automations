name: Sonarqube
on:
  workflow_dispatch:

jobs:
  sonarlint:
    runs-on: ubuntu-latest  # Adjust runner OS if necessary
    steps:
      - uses: actions/checkout@v3  # Fetch full code history for accurate analysis

      # Project Creation (optional)
      # - Here, you'd conditionally create a SonarQube project using the SonarQube REST API (if allowed)
      #   - This step might involve making an API call with project details and authentication

      - name: Use SonarLint for Code Linting
        uses: sonarsource/sonarlint@v1.3.1  # Adjust version as needed
        env:
          SONAR_LINT_PROJECT_KEY: Internal-Tools_Sonar
          SONAR_LINT_PROJECT_NAME: Internal-Tools_Sonar
          SONAR_LINT_SOURCES: .  # Analyze all files in the root directory (adjust paths)
          GITHUB_TOKEN: ${{ secrets.PROD_CLASSIC_PAT }}  # Required for authentication
