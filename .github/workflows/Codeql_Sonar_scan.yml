name: Sonarqube
on:
  workflow_dispatch:

jobs:
  sonarlint:
    runs-on: ubuntu-latest 
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
 
    - name: Set up JDK 11
      uses: actions/setup-java@v2
      with:
        java-version: '11'
        distribution: 'temurin'
 
    - name: Install SonarLint
      run: |
        curl -sSL -o /tmp/sonarlint-cli.zip https://github.com/SonarSource/sonarlint-cli/releases/download/v1.0.0/sonarlint-cli-1.0.0-linux.zip
        if ! file /tmp/sonarlint-cli.zip | grep -q "Zip archive data"; then
          echo "Downloaded file is not a valid zip archive"
          exit 1
        fi
        unzip /tmp/sonarlint-cli.zip -d /tmp/sonarlint-cli
        chmod +x /tmp/sonarlint-cli/bin/sonarlint
 
    - name: Run SonarLint
      run: |
        /tmp/sonarlint-cli/bin/sonarlint --src . --language java
