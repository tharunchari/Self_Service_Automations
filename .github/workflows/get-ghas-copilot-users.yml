name: Export GHAS and Copilot Users

on:
  workflow_dispatch:

jobs:
  export-users:
    runs-on: ubuntu-latest
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get GHAS users (org members of vitechsystems)
        env:
          GH_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/vitechsystems/members" > org_members.json
          echo "login" > ghas_users.csv
          jq -r '.[] | [.login] | @csv' org_members.json >> ghas_users.csv

      - name: Get Copilot users (seats in VitechCopilot)
        env:
          GH_TOKEN: ${{ secrets.PROD_CLASSIC_PAT }}
        run: |
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/VitechCopilot/members" > copilot_members.json        
           echo "login" > copilot_users.csv
           jq -r '.[] | [.login] | @csv' copilot_members.json >> copilot_users.csv

      - name: Upload CSVs
        uses: actions/upload-artifact@v4
        with:
          name: ghas-and-copilot-users
          path: |
            ghas_users.csv
            copilot_users.csv
