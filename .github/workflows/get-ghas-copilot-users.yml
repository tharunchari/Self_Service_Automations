name: Get GHAS and Copilot Users

on:
  workflow_dispatch:

jobs:
  fetch-users:
    runs-on: ubuntu-latest
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get Organization Members (GHAS candidates)
        env:
          GH_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/vitechsystems/members" > org_members.json
          jq . org_members.json

      - name: Get Copilot Users (Seats)
        env:
          GH_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/vitechsystems/copilot/billing/seats" > copilot_seats.json
          jq . copilot_seats.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ghas-and-copilot-users
          path: |
            org_members.json
            copilot_seats.json
