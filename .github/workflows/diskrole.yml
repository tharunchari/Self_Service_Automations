name: Moniter Internal Tools Servers
 
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1-5'
 
jobs:
  start-runner:
    uses: vitechsystems/Internal-Tools_sub_workflows/.github/workflows/start_runner.yml@main
    with:
      runner_name: "Internal_Tools_Automation_Server"
    secrets: inherit

  Monitering:
    name: Run Ansible Playbook
    needs: start-runner
    runs-on: Internal_Tools_Automation_Server
 
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up AWS CLI
        uses: vitechsystems/configure-aws-credentials@v1.0
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Run Ansible Playbook
        env:
          ANSIBLE_SSH_PASS_1: ${{ secrets.VITECH_LINUX_ZOIO_PASSWORD }}
          ANSIBLE_SSH_PASS_2: ${{ secrets.INTERNAL_TOOLS_PASSWORD_4O1 }}
        run: |
          export ANSIBLE_ROLES_PATH="$PWD/Ansible"
          sudo -E ANSIBLE_HOST_KEY_CHECKING=False \
            ansible-playbook \
              Ansible/diskrole/tests/test.yml \
              -i Ansible/diskrole/tests/inventory \
              -e "ansible_ssh_pass_1=$ANSIBLE_SSH_PASS_1 ansible_ssh_pass_2=$ANSIBLE_SSH_PASS_2"

  stop-runner:
    needs: Monitering
    if: always()  # Ensures this job runs even if execute-job fails
    uses: vitechsystems/Internal-Tools_sub_workflows/.github/workflows/stop_runner.yml@main
    with:
      runner_name: "Internal_Tools_Automation_Server"
    secrets: inherit
