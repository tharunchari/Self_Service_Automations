name: List old WAR files in Artifactory

on:
  workflow_dispatch:

jobs:
  list-old-war-files:
    runs-on: ubuntu-latest

    steps:
      - name: Install JFrog CLI
        run: |
          curl -fL https://getcli.jfrog.io | sh
          sudo mv jfrog /usr/local/bin/

      - name: Configure JFrog CLI
        run: |
          jfrog config add my-server \
            --url https://artifactrepodr.vitechinc.com \
            --access-token ${{ secrets.JFROG_TOKEN }} \
            --interactive=false

      - name: Create File Spec for AQL query
        run: |
          echo '{
            "files": [
              {
                "aql": "items.find({\"repo\":\"libs-snapshot-local\",\"path\":{\"$match\":\"com/vitechinc/v3/*\"},\"name\":{\"$match\":\"*.war\"},\"modified\":{\"$before\":\"7d\"}})"
              }
            ]
          }' > file-spec.json
      
      - name: Run AQL query to list WAR files older than 7 days
        run: |
          jfrog rt s --spec=file-spec.json --server-id=my-server
