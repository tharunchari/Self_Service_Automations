name: Monthly JIRA Patch Schedule

on:
  schedule:
    - cron: '0 10 25-31 * 0'   # Sundays between 25-31 UTC (potential last Sunday)
    - cron: '0 2 * * 2'        # Every Tuesday 2 AM UTC (check for first Tuesday)
    - cron: '0 10 25-31 * 5'   # Fridays between 25-31 UTC (potential last Friday)
    - cron: '0 14 25-31 * 6'   # Saturdays between 25-31 UTC (potential last Saturday, not used yet)

permissions:
  id-token: write
  contents: read

jobs:

  notify_nonprod:
    name: Notify Non-Prod Patching (Last Sunday)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Check if today is the last Sunday of the month
        id: check
        run: |
          today=$(date -u +'%Y-%m-%d')
          last_sunday=$(date -u -d "$(date -u +'%Y-%m-01') +1 month -1 day" +'%Y-%m-%d')
          while [ "$(date -u -d "$last_sunday" +%u)" -ne 7 ]; do
            last_sunday=$(date -u -d "$last_sunday -1 day" +'%Y-%m-%d')
          done
          if [ "$today" = "$last_sunday" ]; then
            echo "continue=true" >> $GITHUB_OUTPUT
          else
            echo "continue=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS
        if: steps.check.outputs.continue == 'true'
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Notify via SNS for NON-PROD
        if: steps.check.outputs.continue == 'true'
        run: |
          aws sns publish \
            --topic-arn arn:aws:sns:us-east-1:123456789012:jira-nonprod-patch-topic \
            --subject "NON-PROD Patching Scheduled" \
            --message "NON-PROD JIRA patching will start Tuesday night (EST) as part of the monthly schedule."

  check_first_tuesday:
    name: Check if today is the first Tuesday
    runs-on: ubuntu-latest
    outputs:
      continue: ${{ steps.check.outputs.continue }}
    steps:
      - name: Check if today is the first Tuesday
        id: check
        run: |
          day=$(date -u +'%d')
          weekday=$(date -u +'%u')
          if [ "$weekday" -eq 2 ] && [ "$day" -le 7 ]; then
            echo "continue=true" >> $GITHUB_OUTPUT
          else
            echo "continue=false" >> $GITHUB_OUTPUT
          fi

  trigger_nonprod_jiraqa:
    name: Trigger JIRAQA Patching (First Tuesday)
    needs: check_first_tuesday
    if: needs.check_first_tuesday.outputs.continue == 'true' && github.event_name == 'schedule'
    uses: vitechsystems/Internal-Tools/.github/workflows/Jira_Patching.yml@main
    with:
      environment: "jiraqa"
    secrets: inherit

  trigger_nonprod_jiraupg:
    name: Trigger JIRAUPG Patching
    needs: trigger_nonprod_jiraqa
    if: success()
    uses: vitechsystems/Internal-Tools/.github/workflows/Jira_Patching.yml@main
    with:
      environment: "jiraupg"
    secrets: inherit

  notify_failure_jiraqa:
    needs: trigger_nonprod_jiraqa
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Notify failure via SNS for JIRAQA
        run: |
          aws sns publish \
            --topic-arn arn:aws:sns:us-east-1:123456789012:jira-nonprod-patch-topic \
            --subject "JIRAQA Patching Failed" \
            --message "Patching on the JIRAQA instance failed. Manual intervention may be required."

  notify_failure_jiraupg:
    needs: trigger_nonprod_jiraupg
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Notify failure via SNS for JIRAUPG
        run: |
          aws sns publish \
            --topic-arn arn:aws:sns:us-east-1:123456789012:jira-nonprod-patch-topic \
            --subject "JIRAUPG Patching Failed" \
            --message "Patching on the JIRAUPG instance failed. Manual intervention may be required."

  notify_prod:
    name: Notify PROD Patching (Last Friday)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Check if today is the last Friday of the month
        id: check
        run: |
          today=$(date -u +'%Y-%m-%d')
          last_friday=$(date -u -d "$(date -u +'%Y-%m-01') +1 month -1 day" +'%Y-%m-%d')
          while [ "$(date -u -d "$last_friday" +%u)" -ne 5 ]; do
            last_friday=$(date -u -d "$last_friday -1 day" +'%Y-%m-%d')
          done
          if [ "$today" = "$last_friday" ]; then
            echo "continue=true" >> $GITHUB_OUTPUT
          else
            echo "continue=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS
        if: steps.check.outputs.continue == 'true'
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Notify via SNS for PROD
        if: steps.check.outputs.continue == 'true'
        run: |
          aws sns publish \
            --topic-arn arn:aws:sns:us-east-1:389180911583:Internal-Tools_Patching \
            --subject "PROD Patching Notification" \
            --message "PROD JIRA patching is scheduled for Saturday morning (EST). Please prepare accordingly."

  trigger_prod:
    name: Trigger PROD Patching
    if: github.event_name == 'schedule'
    uses: vitechsystems/Internal-Tools/.github/workflows/Jira_Patching.yml@main
    with:
      environment: "jiraprod"
      KEY: ${{ secrets.VITECH_LINUX_ZOIO_PASSWORD }}
    secrets:
      inherit: true
      VITECH_LINUX_ZOIO_PASSWORD: ${{ secrets.VITECH_LINUX_ZOIO_PASSWORD }}

  notify_failure_jiraprod:
    name: Notify Failure - JIRAPROD
    needs: trigger_prod
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Notify failure via SNS for JIRAPROD
        run: |
          aws sns publish \
            --topic-arn arn:aws:sns:us-east-1:389180911583:Internal-Tools_Patching \
            --subject "JIRAPROD Patching Failed" \
            --message "Patching on the JIRAPROD instance failed. Please investigate immediately."
