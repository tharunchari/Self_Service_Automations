name: Monthly JIRA Patch Schedule

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 22-31 * 1'   # Mondays between 22-31 at 2 AM UTC
    - cron: '0 10 22-31 * 5'  # Fridays between 22-31 at 10 AM UTC
    - cron: '0 2 23-32 * 6'   # Saturdays between 23-32 at 2 AM UTC

permissions:
  id-token: write
  contents: read

jobs:

  check_last_fullweek_monday:
    name: Check if today is the Monday of the last full week of the month
    runs-on: ubuntu-latest
    outputs:
      is_last_fullweek_monday: ${{ steps.check.outputs.is_last_fullweek_monday }}
    steps:
      - id: check
        run: |
          today=$(date -u +'%Y-%m-%d')
          # Find last Friday of the month
          last_friday=$(date -u -d "$(date -u +'%Y-%m-01') +1 month -1 day" +'%Y-%m-%d')
          while [ "$(date -u -d "$last_friday" +%u)" -ne 5 ]; do
            last_friday=$(date -u -d "$last_friday -1 day" +'%Y-%m-%d')
          done
          # Monday of the last full week (4 days before last Friday)
          week_monday=$(date -u -d "$last_friday -4 days" +'%Y-%m-%d')
          if [ "$today" = "$week_monday" ]; then
            echo "is_last_fullweek_monday=true" >> $GITHUB_OUTPUT
          else
            echo "is_last_fullweek_monday=false" >> $GITHUB_OUTPUT
          fi

  notify_nonprod:
    name: Notify Non-Prod Patching (Last full week Monday)
    needs: check_last_fullweek_monday
    if: needs.check_last_fullweek_monday.outputs.is_last_fullweek_monday == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Notify via SNS for NON-PROD
        run: |
          aws sns publish \
            --topic-arn arn:aws:sns:us-east-1:389180911583:Internal-Tools_Patching \
            --subject "Non-Production JIRAQA and JIRAUPG Monthly Patch - Rolling Restart (No Downtime)" \
            --message "Automated notification: Non-Production JIRA patching with rolling restart is scheduled for today JIRAQA and JIRAUPG. No application downtime is expected. Please contact v3atlassianops if you have any questions."

  trigger_nonprod_jiraqa:
    name: Trigger JIRAQA Patching (Last full week Monday)
    needs: check_last_fullweek_monday
    if: needs.check_last_fullweek_monday.outputs.is_last_fullweek_monday == 'true'
    permissions:
      contents: read
      id-token: write
      actions: read
      pull-requests: read
      security-events: write
    uses: vitechsystems/Internal-Tools/.github/workflows/Jira_Patching.yml@main
    with:
      environment: "jiraqa"
    secrets:
      CORP_CLD_AWS_ACCESS_KEY_ID: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
      CORP_CLD_AWS_SECRET_ACCESS_KEY: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
      VITECH_LINUX_ZOIO_PASSWORD: ${{ secrets.VITECH_LINUX_ZOIO_PASSWORD }}
      JIRAQA_ACCESS_TOKEN: ${{ secrets.JIRAQA_ACCESS_TOKEN }}

  trigger_nonprod_jiraupg:
    name: Trigger JIRAUPG Patching (Last full week Monday)
    needs: [trigger_nonprod_jiraqa, check_last_fullweek_monday]
    if: needs.check_last_fullweek_monday.outputs.is_last_fullweek_monday == 'true' && needs.trigger_nonprod_jiraqa.result == 'success'
    permissions:
      contents: read
      id-token: write
      actions: read
      pull-requests: read
      security-events: write
    uses: vitechsystems/Internal-Tools/.github/workflows/Jira_Patching.yml@main
    with:
      environment: "jiraupg"
    secrets:
      CORP_CLD_AWS_ACCESS_KEY_ID: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
      CORP_CLD_AWS_SECRET_ACCESS_KEY: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
      VITECH_LINUX_ZOIO_PASSWORD: ${{ secrets.VITECH_LINUX_ZOIO_PASSWORD }}
      JIRAUPG_ACCESS_TOKEN: ${{ secrets.JIRAUPG_ACCESS_TOKEN }}

  notify_failure_jiraqa:
    needs: trigger_nonprod_jiraqa
    if: needs.trigger_nonprod_jiraqa.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Notify failure via SNS for JIRAQA
        run: |
          aws sns publish \
            --topic-arn arn:aws:sns:us-east-1:389180911583:Internal-Tools_Patching \
            --subject "ALERT: JIRAQA Monthly Patch Failure" \
            --message "Automated patching (rolling restart, no expected downtime) for the JIRAQA environment has failed. Immediate manual intervention is required. Please check GitHub Actions logs for details."

  notify_failure_jiraupg:
    needs: trigger_nonprod_jiraupg
    if: needs.trigger_nonprod_jiraupg.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Notify failure via SNS for JIRAUPG
        run: |
          aws sns publish \
            --topic-arn arn:aws:sns:us-east-1:389180911583:Internal-Tools_Patching \
            --subject "ALERT: JIRAUPG Monthly Patch Failure" \
            --message "Automated patching (rolling restart, no expected downtime) for the JIRAUPG environment has failed. Immediate manual intervention is required. Please check GitHub Actions logs for details."

  check_last_friday:
    name: Check if today is the last Friday of the month
    runs-on: ubuntu-latest
    outputs:
      is_last_friday: ${{ steps.check.outputs.is_last_friday }}
    steps:
      - id: check
        run: |
          today=$(date -u +'%Y-%m-%d')
          last_friday=$(date -u -d "$(date -u +'%Y-%m-01') +1 month -1 day" +'%Y-%m-%d')
          while [ "$(date -u -d "$last_friday" +%u)" -ne 5 ]; do
            last_friday=$(date -u -d "$last_friday -1 day" +'%Y-%m-%d')
          done
          if [ "$today" = "$last_friday" ]; then
            echo "is_last_friday=true" >> $GITHUB_OUTPUT
          else
            echo "is_last_friday=false" >> $GITHUB_OUTPUT
          fi

  notify_prod:
    name: Notify PROD Patching (Last Friday)
    needs: check_last_friday
    if: needs.check_last_friday.outputs.is_last_friday == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Notify via SNS for PROD
        run: |
          aws sns publish \
            --topic-arn arn:aws:sns:us-east-1:389180911583:Internal-Tools_Patching \
            --subject "Production JIRA Monthly Patch Scheduled for Tomorrow" \
            --message "Reminder: Production JIRA patching will be performed tomorrow (Saturday, rolling restart, no downtime expected). Please reach out to v3atlassianops if you have any concerns."

  check_patching_saturday:
    name: Check if today is the Saturday after the last Friday of the month
    runs-on: ubuntu-latest
    outputs:
      is_patching_saturday: ${{ steps.check.outputs.is_patching_saturday }}
    steps:
      - id: check
        run: |
          today=$(date -u +'%Y-%m-%d')
          # Find last Friday of the month
          last_friday=$(date -u -d "$(date -u +'%Y-%m-01') +1 month -1 day" +'%Y-%m-%d')
          while [ "$(date -u -d "$last_friday" +%u)" -ne 5 ]; do
            last_friday=$(date -u -d "$last_friday -1 day" +'%Y-%m-%d')
          done
          # Find the Saturday after last Friday
          patch_saturday=$(date -u -d "$last_friday +1 day" +'%Y-%m-%d')
          if [ "$today" = "$patch_saturday" ]; then
            echo "is_patching_saturday=true" >> $GITHUB_OUTPUT
          else
            echo "is_patching_saturday=false" >> $GITHUB_OUTPUT
          fi

  trigger_prod:
    name: Trigger PROD Patching (Saturday after Last Friday)
    needs: check_patching_saturday
    if: needs.check_patching_saturday.outputs.is_patching_saturday == 'true'
    permissions:
      contents: read
      id-token: write
      actions: read
      pull-requests: read
      security-events: write
    uses: vitechsystems/Internal-Tools/.github/workflows/Jira_Patching.yml@main
    with:
      environment: "jiraprod"
    secrets:
      CORP_CLD_AWS_ACCESS_KEY_ID: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
      CORP_CLD_AWS_SECRET_ACCESS_KEY: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
      VITECH_LINUX_ZOIO_PASSWORD: ${{ secrets.VITECH_LINUX_ZOIO_PASSWORD }}
      JIRAPROD_ACCESS_TOKEN: ${{ secrets.JIRAPROD_ACCESS_TOKEN }}

  notify_failure_jiraprod:
    name: Notify Failure - JIRAPROD
    needs: trigger_prod
    if: needs.trigger_prod.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Notify failure via SNS for JIRAPROD
        run: |
          aws sns publish \
            --topic-arn arn:aws:sns:us-east-1:389180911583:Internal-Tools_Patching \
            --subject "URGENT: Production JIRA Monthly Patch Failure" \
            --message "Critical: The scheduled monthly rolling restart patching process for Production JIRA (JIRAPROD) has failed. Immediate investigation is required. Review GitHub Actions logs and notify stakeholders."
