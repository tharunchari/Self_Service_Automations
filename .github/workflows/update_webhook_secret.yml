name: "Update Webhook Secret in GitHub Repositories"

on:
  workflow_dispatch:
    inputs:
      org_name:
        description: "GitHub Organization Name"
        required: true
        default: "vitechsystems"

      repo_scope:
        description: "Select scope: single | multiple | all"
        required: true
        type: choice
        options:
          - single
          - multiple
          - all
        default: "single"

      repo_names:
        description: "Repository name(s) (comma-separated for multiple)"
        required: false

      webhook_url:
        description: "Webhook URL to match"
        required: true

      new_secret:
        description: "New webhook secret"
        required: true

      dry_run:
        description: "Dry run (true/false)"
        required: true
        type: choice
        options:
          - true
          - false
        default: "true"

jobs:
  update-webhook-secret:
    runs-on: ubuntu-24.04

    env:
      PROD_FINE_GRAINED_PAT: ${{ secrets.PROD_FINE_GRAINED_PAT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Run webhook update script
        run: |
          python3 PYTHON_Script/update_webhook_secret.py \
            --org "${{ inputs.org_name }}" \
            --scope "${{ inputs.repo_scope }}" \
            --repos "${{ inputs.repo_names }}" \
            --webhook-url "${{ inputs.webhook_url }}" \
            --new-secret "${{ inputs.new_secret }}" \
            --dry-run "${{ inputs.dry_run }}"
