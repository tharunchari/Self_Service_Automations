name: Create Repo Branch and Update Pom-files

on:
  workflow_dispatch:
    inputs:
      SOURCE_REPO_NAME:
        required: true
        description: Source Repo name
      TARGET_REPO_NAME:
        required: true
        description: Target Repo name
      confirm:
        default: "NO"
        required: true
        description: Specify 'YES' if client code should be in product code (COREADMIN/NEXTGEN), otherwise 'NO'.
      SOURCE_BRANCH:
        required: true
        description: Source branch name
      TARGET_BRANCH:
        required: true
        description: Target branch name
      SOURCE_VERSION:
        required: true
        description: Pom file version of source
      TARGET_VERSION:
        required: true
        description: Pom file version of target
      Commit_Number:
        default: "HEAD"
        required: true
        description: SHA Value or default HEAD
      OWNER:
        required: true
        description: Branch Protection Rule ('product' or 'client')
        default: 'client'
      PROJECT_KEY:
        required: true
        description: Jira Project Key value

jobs:
  create-branch-and-update-pom:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Inputs and Repository Type
        run: |
          if [ "${{ inputs.OWNER }}" != "client" ] && [ "${{ inputs.OWNER }}" != "product" ]; then
            echo "Invalid Repository type value '${{ inputs.OWNER }}'. Stopping the workflow."
            exit 1
          fi

          target_repo="${{ inputs.TARGET_REPO_NAME }}"
          confirm="${{ inputs.confirm }}"
          if [[ "$target_repo" == "Coreadmin" || "$target_repo" == "nextgen" ]]; then
            if [[ "$confirm" == "YES" ]]; then
              echo "Proceeding with target branch in product REPO COREADMIN/NEXTGEN"
            elif [[ "$confirm" == "NO" ]]; then
              echo "Not proceeding with target branch in product REPO COREADMIN/NEXTGEN"
              exit 0
            else
              echo "Invalid input for confirmation ('$confirm'). Please enter 'YES' or 'NO'."
              exit 2
            fi
          else
            echo "Invalid target repository type ('$target_repo'). Valid types are 'Coreadmin' and 'nextgen'."
          fi

      - name: Check if Repository Exists or Create
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X GET \
            -H "Authorization: token ${{ secrets.PROD_CLASSIC_PAT }}" \
            "https://api.github.com/repos/vitechsystems/${{ inputs.TARGET_REPO_NAME }}")

          if [ "$response" -eq "200" ]; then
            echo "Repository already exists, proceeding with branch creation task..."
            TARGET_REPO_NAME1="${{ inputs.TARGET_REPO_NAME }}" >> $GITHUB_ENV
          else
            echo "Repository does not exist. Creating repository and proceeding with branch creation task..."
            cd shell_scripts
            pwd
            chmod +x git_repo_creation.sh
            TARGET_REPO_NAME1="${{ inputs.TARGET_REPO_NAME }}_PRODUCT_L5" >> $GITHUB_ENV
            ./git_repo_creation.sh ${{ secrets.PROD_CLASSIC_PAT }} $TARGET_REPO_NAME1 ${{ inputs.OWNER }} ${{ inputs.PROJECT_KEY }} ${{ secrets.SECRET_CODE_GITHUB }}
          fi

      - name: Create and Push Branch
        run: |
          SOURCE_REPO_NAME="${{ inputs.SOURCE_REPO_NAME }}"
          TARGET_REPO_NAME="${{ inputs.TARGET_REPO_NAME }}"
          TARGET_REPO_NAME1="${{ github.event.inputs.TARGET_REPO_NAME }}"
          SOURCE_BRANCH="${{ inputs.SOURCE_BRANCH }}"
          TARGET_BRANCH="${{ inputs.TARGET_BRANCH }}"
          SOURCE_VERSION="${{ inputs.SOURCE_VERSION }}"
          TARGET_VERSION="${{ inputs.TARGET_VERSION }}"
          COMMIT_NUMBER="${{ inputs.Commit_Number }}"

          mkdir Branch_creation
          cd Branch_creation

          # Checking if the target branch already exists
          echo "Checking if branch $TARGET_BRANCH exists..."
          if git ls-remote --heads "https://${{ secrets.PROD_CLASSIC_PAT }}@github.com/vitechsystems/${SOURCE_REPO_NAME}.git" $TARGET_BRANCH | grep -q $TARGET_BRANCH; then
            echo "Error: Branch $TARGET_BRANCH already exists. Please discard the existing one or create with a different name."
            exit 2
          else
            echo "Branch $TARGET_BRANCH doesn't exist. Proceeding with branch creation..."
          fi

          # Cloning the repository and checking out the source branch
          echo "Cloning repository and checking out source branch $SOURCE_BRANCH..."
          git clone "https://${{ secrets.PROD_CLASSIC_PAT }}@github.com/vitechsystems/${SOURCE_REPO_NAME}.git" --single-branch --branch=$SOURCE_BRANCH
          cd $SOURCE_REPO_NAME

          # Checking out the target branch
          if [ "$COMMIT_NUMBER" = "HEAD" ]; then
            echo "Checking out source code from the latest revision..."
            git checkout -b $TARGET_BRANCH
          else
            echo "Checking out source code from revision $COMMIT_NUMBER..."
            git checkout -b $TARGET_BRANCH $COMMIT_NUMBER
          fi

          # Pushing the newly created branch to the remote repository
          echo "Pushing the newly created branch $TARGET_BRANCH to the remote repository..."
          git config --local user.name "V3OPS_USER"
          git config --local user.email "v3ops@vitechinc.com"
          if ! git remote -v | grep -q "^https://${{ secrets.PROD_CLASSIC_PAT }}@github.com/vitechsystems/${TARGET_REPO_NAME1}.git\s+" ; then
            git push -u origin $TARGET_BRANCH
          else
            git remote add origin https://${{ secrets.PROD_CLASSIC_PAT }}@github.com/vitechsystems/${TARGET_REPO_NAME1}.git
            git push -u origin $TARGET_BRANCH
          fi

          # Checking if the branch was created successfully
          echo "Checking if branch $TARGET_BRANCH was created successfully..."
          if git ls-remote --heads "https://${{ secrets.PROD_CLASSIC_PAT }}@github.com/vitechsystems/${TARGET_REPO_NAME1}.git" $TARGET_BRANCH | grep -q $TARGET_BRANCH; then
            echo "Branch $TARGET_BRANCH was created successfully."
            echo "Updating pom files and committing code..."

            # Updating pom files, committing and pushing changes
            find . -name pom.xml | xargs sed -i "s/${SOURCE_VERSION}/${TARGET_VERSION}/g"
            git add -u
            git commit -m "Updated pom files to version ${TARGET_VERSION}"
            git push -u origin $TARGET_BRANCH
          else
            echo "Error: Branch $TARGET_BRANCH was not created successfully."
            exit 3
          fi

      - name: Add Branch Protection Rule
        run: |
          find / -name "shell_scripts" -type d -print -exec cd {} \;
          pwd
          chmod +x git_branch_protection.sh
          ./git_branch_protection.sh ${{ secrets.PROD_CLASSIC_PAT }} ${TARGET_REPO_NAME1} ${{ inputs.TARGET_BRANCH }} ${{ inputs.OWNER }}
      - name: Clean up workspace
        run: |
          # Remove all files and directories in the workspace
          rm -rf *
