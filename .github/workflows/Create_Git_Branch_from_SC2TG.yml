name: Branch Creation in Same or Cross-Repository 
on:
  workflow_dispatch:
    inputs:
      SOURCE_REPO_NAME:
        required: true
        description: Source Repo name
      TARGET_REPO_NAME:
        required: true
        description: Target Repo name
      confirm:
        default: "NO"
        required: true
        description: "Specify 'YES' if the client branch should be included in the product branch (COREADMIN/NEXTGEN); otherwise, specify 'NO'."
      SOURCE_BRANCH:
        required: true
        description: Source branch name
      TARGET_BRANCH:
        required: true
        description: Target branch name
      SOURCE_CLIENT_VERSION:
        required: false
        description: Enter the source client-value to update in the pom file.
      TARGET_CLIENT_VERSION:
        required: false
        description: Enter the target client-value to update in the pom file.
      SOURCE_PROD_VERSION:
        required: false
        description: Enter the source prod-value to update in the pom file.
      TARGET_PROD_VERSION:
        required: false
        description: Enter the target prod-value to update in the pom file.
      Commit_Number:
        default: "HEAD"
        required: true
        description: SHA Value or default HEAD

jobs:
  create-branch-and-update-pom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Inputs and Repository Type
        run: |
          target_repo="${{ inputs.TARGET_REPO_NAME }}"
          confirm="${{ inputs.confirm }}"
          if [[ "$target_repo" == "Coreadmin" || "$target_repo" == "nextgen" ]]; then
            if [[ "$confirm" == "YES" ]]; then
              echo "Proceeding with target branch in product REPO $target_repo"
            else
              echo "Confirmation is required to proceed for repository '$target_repo'. Received '$confirm'. Expected 'YES'."
              exit 1
            fi
          else
            echo "Non-product repository ('$target_repo'). Skipping validation and proceeding."
          fi

      - name: Create and Prepare Branch
        run: |
          SOURCE_REPO_NAME="${{ inputs.SOURCE_REPO_NAME }}"
          TARGET_REPO_NAME="${{ inputs.TARGET_REPO_NAME }}"
          SOURCE_BRANCH="${{ inputs.SOURCE_BRANCH }}"
          TARGET_BRANCH="${{ inputs.TARGET_BRANCH }}"
          SOURCE_CLIENT_VERSION="${{ inputs.SOURCE_CLIENT_VERSION }}"
          TARGET_CLIENT_VERSION="${{ inputs.TARGET_CLIENT_VERSION }}"
          SOURCE_PROD_VERSION="${{ inputs.SOURCE_PROD_VERSION }}"
          TARGET_PROD_VERSION="${{ inputs.TARGET_PROD_VERSION }}"
          COMMIT_NUMBER="${{ inputs.Commit_Number }}"
          set -x
          mkdir Branch_creation
          cd Branch_creation
          # Checking if the target branch already exists
          if git ls-remote --heads "https://${{ secrets.PROD_FINE_GRAINED_PAT }}@github.com/vitechsystems/${TARGET_REPO_NAME}.git" $TARGET_BRANCH | grep -q $TARGET_BRANCH; then
            echo "Error: Branch $TARGET_BRANCH already exists. Please discard the existing one or create with a different name."
            exit 2
          else
            echo "Branch $TARGET_BRANCH doesn't exist. Proceeding with branch creation..."
          fi
          # Clone source branch only
          git clone "https://${{ secrets.PROD_FINE_GRAINED_PAT }}@github.com/vitechsystems/${SOURCE_REPO_NAME}.git" --single-branch --branch=$SOURCE_BRANCH
          cd $SOURCE_REPO_NAME
          # Prepare branch from commit or HEAD
          if [ "$COMMIT_NUMBER" != "HEAD" ]; then
            git fetch origin $COMMIT_NUMBER || (echo "ERROR: Could not fetch commit $COMMIT_NUMBER" && exit 3)
            git checkout -b $TARGET_BRANCH $COMMIT_NUMBER
          else
            git checkout -b $TARGET_BRANCH
          fi
          # Prepare for later push
          git config --local user.name "V3OPS_USER"
          git config --local user.email "v3ops@vitechinc.com"
          git remote set-url origin "https://${{ secrets.PROD_FINE_GRAINED_PAT }}@github.com/vitechsystems/${TARGET_REPO_NAME}.git"
          # Update pom.xml files if needed
          if [[ -n "$SOURCE_CLIENT_VERSION" && -n "$TARGET_CLIENT_VERSION" ]]; then
            echo "Updating client versions: $SOURCE_CLIENT_VERSION → $TARGET_CLIENT_VERSION"
            find . -name pom.xml -exec sed -i "s|${SOURCE_CLIENT_VERSION}|${TARGET_CLIENT_VERSION}|g" {} +
          fi
          if [[ -n "$SOURCE_PROD_VERSION" && -n "$TARGET_PROD_VERSION" ]]; then
            echo "Updating prod versions: $SOURCE_PROD_VERSION → $TARGET_PROD_VERSION"
            find . -name pom.xml -exec sed -i "s|${SOURCE_PROD_VERSION}|${TARGET_PROD_VERSION}|g" {} +
          fi
          sleep 10
          if git diff --quiet; then
            echo "No changes detected. Skipping commit."
          else
            echo "Changes detected. Committing updated files."
            git add -u
            git commit -m "Updated pom files to version $TARGET_CLIENT_VERSION/$TARGET_PROD_VERSION"
          fi

      - name: Create push-large-repo.sh script
        if: ${{ inputs.SOURCE_REPO_NAME == 'Coreadmin' }}
        working-directory: ./Branch_creation/${{ inputs.SOURCE_REPO_NAME }}
        run: |
          cat <<'EOF' > push-large-repo.sh
          #!/bin/bash
          GITHUB_PAT="${{ secrets.PROD_FINE_GRAINED_PAT }}"
          PATH_TO_REPO=$(pwd)
          ORG_NAME=vitechsystems
          REPO_NAME="${{ inputs.TARGET_REPO_NAME }}"
          BRANCH_NAME="${{ inputs.TARGET_BRANCH }}"
          STEP_SIZE=1000
          LOG_FILE="push-log.txt"
          cd "$PATH_TO_REPO" || { echo "Error: Directory $PATH_TO_REPO does not exist."; exit 1; }
          git remote remove origin-2 2>/dev/null || true
          git remote add origin-2 "https://${GITHUB_PAT}@github.com/${ORG_NAME}/${REPO_NAME}.git" || { echo "Error: Failed to add remote origin-2."; exit 1; }
          if ! git remote get-url origin-2 > /dev/null 2>&1; then
              echo "Error: Remote 'origin-2' not found. Please check the repository URL or PAT."
              exit 1
          fi
          > "$LOG_FILE"
          step_commits=$(git log --oneline --reverse refs/heads/"$BRANCH_NAME" | awk "NR % $STEP_SIZE == 0" | awk '{print $1}')
          if [ -z "$step_commits" ]; then
              echo "No commits found to push. Check the branch name or repository history."
              exit 1
          fi
          echo "Pushing commits in chunks..."
          for commit in $step_commits; do
              echo "Pushing commit $commit to origin-2:$BRANCH_NAME" | tee -a "$LOG_FILE"
              if git push -u origin-2 +"$commit":refs/heads/"$BRANCH_NAME" 2>&1 | tee -a "$LOG_FILE"; then
                  echo "Successfully pushed commit $commit" | tee -a "$LOG_FILE"
              else
                  echo "Error: Failed to push commit $commit" | tee -a "$LOG_FILE"
                  echo "This may be due to the chunk size being too large. Try reducing STEP_SIZE (e.g., $((STEP_SIZE / 2)))" | tee -a "$LOG_FILE"
                  #exit 1
                  continue
              fi
          done
          echo "Performing final push to sync branch $BRANCH_NAME..." | tee -a "$LOG_FILE"
          git push origin-2 "$BRANCH_NAME" 2>&1 | tee -a "$LOG_FILE"
          PUSH_EXIT_CODE=${PIPESTATUS[0]}
          if [ $PUSH_EXIT_CODE -eq 0 ]; then
              echo "Successfully completed the final branch push." | tee -a "$LOG_FILE"
          else
              echo "Error: Branch push failed due to repository rule violations or other errors." | tee -a "$LOG_FILE"
              exit 1
          fi
          EOF
          chmod +x push-large-repo.sh

      - name: Push branch in chunks for large repos
        if: ${{ inputs.SOURCE_REPO_NAME == 'Coreadmin' }}
        run: ./push-large-repo.sh
        working-directory: ./Branch_creation/${{ inputs.SOURCE_REPO_NAME }}

      - name: Push branch normally for other repos
        if: ${{ inputs.SOURCE_REPO_NAME != 'Coreadmin' }}
        run: |
          git push -u origin "${{ inputs.TARGET_BRANCH }}"
        working-directory: ./Branch_creation/${{ inputs.SOURCE_REPO_NAME }}

      - name: Clean up workspace
        run: |
          rm -rf *


