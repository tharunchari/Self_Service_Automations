name: Artifactory Cleanup (WAR + EAR)

on:
 # schedule:
  #  - cron: "0 0 * * *"   # daily at midnight
  workflow_dispatch:

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    outputs:
      should_proceed: ${{ steps.check.outputs.should_proceed }}
    steps:
      - id: check
        run: echo "should_proceed=true" >> $GITHUB_OUTPUT

  start-runner:
    needs: check-schedule
    if: needs.check-schedule.outputs.should_proceed == 'true'
    uses: vitechsystems/Internal-Tools_sub_workflows/.github/workflows/start_runner.yml@main
    with:
      runner_name: "Internal_Tools_Automation_Server"
    secrets: inherit

  cleanup-artifacts:
    needs: [check-schedule, start-runner]
    if: needs.check-schedule.outputs.should_proceed == 'true'
    runs-on: [self-hosted, Internal_Tools_Automation_Server]

    env:
      SES_FROM: do-not-reply@vitechinc.com
      SES_TO: v3atlassianops@vitechinc.com
      SNS_TOPIC_ARN: ${{ secrets.SNS_TOPIC_ARN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Prepare output file
        run: |
          mkdir -p artifacts
          rm -f artifacts/artifacts_deleted.txt
          echo "**************** WAR FILES deleted from artifactory *******************" >> artifacts/artifacts_deleted.txt

      - name: Delete WAR Artifacts
        run: |
          java -cp DevOps.jar com.vitechinc.opsutil.artifactory.ArtiFactoryRestCaller -pattern "*.war" >> artifacts/artifacts_deleted.txt
          java -cp DevOps.jar com.vitechinc.opsutil.artifactory.ArtiFactoryRestCaller -pattern "*.war" -delete -confirm N

      - name: Append EAR Header
        run: echo "************** EAR FILES deleted from artifactory **************" >> artifacts/artifacts_deleted.txt

      - name: Delete EAR Artifacts
        run: |
          java -cp DevOps.jar com.vitechinc.opsutil.artifactory.ArtiFactoryRestCaller -pattern "*.ear" >> artifacts/artifacts_deleted.txt
          java -cp DevOps.jar com.vitechinc.opsutil.artifactory.ArtiFactoryRestCaller -pattern "*.ear" -delete -confirm N

      - name: Publish Report to SNS Topic
        env:
          TOPIC_ARN: arn:aws:sns:us-east-1:389180911583:Internal-Tools_Patching
        run: |
          REPORT=$(sed 's/"/\\"/g' artifacts/artifacts_deleted.txt)

          aws sns publish \
            --topic-arn "arn:aws:sns:us-east-1:389180911583:Internal-Tools_Patching" \
            --subject "Artifacts deleted from Artifactory" \
            --message "From: ${SES_FROM}\nTo: ${SES_TO}\n\n${REPORT}"

      - name: Upload Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-deleted-report
          path: artifacts/artifacts_deleted.txt

  stop-runner:
    needs: [cleanup-artifacts]
    if: always()
    uses: vitechsystems/Internal-Tools_sub_workflows/.github/workflows/stop_runner.yml@main
    with:
      runner_name: "Internal_Tools_Automation_Server"
    secrets: inherit
