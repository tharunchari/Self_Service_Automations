name: Artifactory Cleanup (WAR + EAR)

on:
  # Uncomment next lines to enable daily scheduled runs
  # schedule:
  #   - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    outputs:
      should_proceed: ${{ steps.check.outputs.should_proceed }}
    steps:
      - id: check
        run: echo "should_proceed=true" >> $GITHUB_OUTPUT

  start-runner:
    needs: check-schedule
    if: github.event_name == 'workflow_dispatch' && needs.check-schedule.outputs.should_proceed == 'true'
    uses: vitechsystems/Internal-Tools_sub_workflows/.github/workflows/start_runner.yml@main
    with:
      runner_name: "Internal_Tools_Automation_Server"
    secrets: inherit

  cleanup-artifacts:
    needs: [check-schedule, start-runner]
    if: needs.check-schedule.outputs.should_proceed == 'true'
    runs-on: Internal_Tools_Automation_Server

    env:
      SES_FROM: do-not-reply@vitechinc.com
      SES_TO: v3atlassianops@vitechinc.com
      SNS_TOPIC_ARN: ${{ secrets.SNS_TOPIC_ARN }}
      ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Debugging section: check directory, jar and Java setup
      - name: Print working directory and list files
        run: |
          pwd
          ls -l

      - name: Print Java version
        run: java -version

      - name: Check if DevOps.jar contains the main class
        run: |
          jar tf DevOps.jar | grep ArtiFactoryRestCaller || echo "Class not found in jar"

      - name: Prepare output file
        run: |
          mkdir -p artifacts
          rm -f artifacts/artifacts_deleted.txt
          echo "**************** WAR FILES deleted from artifactory *******************" >> artifacts/artifacts_deleted.txt

      - name: Delete WAR Artifacts
        run: |
          java -cp DevOps.jar com.vitechinc.opsutil.artifactory.ArtiFactoryRestCaller -pattern "*.war" -token "${ARTIFACTORY_TOKEN}" >> artifacts/artifacts_deleted.txt
          # Uncomment next line for actual deletion
          # java -cp DevOps.jar com.vitechinc.opsutil.artifactory.ArtiFactoryRestCaller -pattern "*.war" -delete -confirm N -token "${ARTIFACTORY_TOKEN}"

      - name: Append EAR Header
        run: echo "************** EAR FILES deleted from artifactory **************" >> artifacts/artifacts_deleted.txt

      - name: Delete EAR Artifacts
        run: |
          java -cp DevOps.jar com.vitechinc.opsutil.artifactory.ArtiFactoryRestCaller -pattern "*.ear" -token "${ARTIFACTORY_TOKEN}" >> artifacts/artifacts_deleted.txt
          # Uncomment next line for actual deletion
          # java -cp DevOps.jar com.vitechinc.opsutil.artifactory.ArtiFactoryRestCaller -pattern "*.ear" -delete -confirm N -token "${ARTIFACTORY_TOKEN}"

      - name: Publish Report to SNS Topic
        env:
          TOPIC_ARN: arn:aws:sns:us-east-1:389180911583:Internal-Tools_Patching
        run: |
          REPORT=$(sed 's/"/\\"/g' artifacts/artifacts_deleted.txt)
          aws sns publish \
            --topic-arn "${TOPIC_ARN}" \
            --subject "Artifacts deleted from Artifactory" \
            --message "From: ${SES_FROM}\\nTo: ${SES_TO}\\n\\n${REPORT}"

      - name: Upload Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-deleted-report
          path: artifacts/artifacts_deleted.txt

  stop-runner:
    needs: [cleanup-artifacts]
    if: always()
    uses: vitechsystems/Internal-Tools_sub_workflows/.github/workflows/stop_runner.yml@main
    with:
      runner_name: "Internal_Tools_Automation_Server"
    secrets: inherit
