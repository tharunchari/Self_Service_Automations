name: 'wiz-cli'

on: [pull_request]

jobs:
  wiz-cli-iac-scan:
    name: 'Wiz-cli Iac Scan'
    runs-on: ubuntu-latest

    env:
      SCAN_PATH: "."  # Set the relative path in the repo to scan
      POLICY: "Default lac policy"  # Set the desired Wiz CLI policy to use

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Download Wiz CLI
        run: |
          curl -o wizcli https://downloads.wiz.io/wizcli/latest/wizcli-linux-amd64 &&
          chmod +x wizcli

      - name: Authenticate to Wiz
        run: |
          ./wizcli auth-id "${{ secrets.WIZ_CLIENT_ID }}" --secret "${{ secrets.WIZ_CLIENT_SECRET }}"
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}

      - name: Run wiz CLI IaC scan
        run: ./wizcli iac scan-path $SCAN_PATH --policy "$POLICY"
