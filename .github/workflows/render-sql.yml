name: Render SQL Using Repo Variables

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository Name"
        required: true
        type: string     
      branch:
        description: "Branch Name"
        required: true
        type: string
      scripts:
        description: "Comma-separated list of SQL scripts (e.g., script1.sql,script2.sql)"
        required: true
        type: string

jobs:
  render-sql:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: vitechsystems/${{ inputs.repo }}
          ref: ${{ inputs.branch }}
          path: target_repo
          token: ${{ secrets.PROD_FINE_GRAINED_PAT }}

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq gettext-base

      - name: Fetch Repo Variables from GitHub
        id: fetch_repo_vars
        run: |
          echo "Fetching repo-level variables from: vitechsystems/${{ inputs.repo }}"
          curl -s -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PROD_FINE_GRAINED_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/vitechsystems/${{ inputs.repo }}/actions/variables" \
            -o repo_vars.json
          echo "Repo variables received:"
          jq '.variables[].name' repo_vars.json

      - name: Create output folder
        run: mkdir -p output

      - name: Render all SQL scripts
        run: |
          IFS=',' read -ra SCRIPT_ARRAY <<< "${{ inputs.scripts }}"

          for script_name in "${SCRIPT_ARRAY[@]}"; do
            echo "Processing script: $script_name"

            # Find the script
            file_path=$(find target_repo -type f -name "$script_name" | head -n 1)
            if [ -z "$file_path" ]; then
              echo "::error ::Script $script_name not found."
              exit 1
            fi
            echo "Found at: $file_path"

            # Extract placeholders
            placeholders=$(grep -o '\${[^}]*}' "$file_path" | sed 's/[${}]//g' | sort -u)
            echo "Placeholders found: $placeholders"

            # Map placeholders to repo variables
            for var in $placeholders; do
              value=$(jq -r --arg name "$var" '.variables[] | select(.name == $name) | .value' repo_vars.json)
              if [ -z "$value" ] || [ "$value" == "null" ]; then
                echo "::warning ::Variable '$var' NOT found in repo variables."
                continue
              fi
              export "$var=$value"
              echo "Mapped: $var = $value"
            done

            # Render SQL and preserve filename
            filename=$(basename "$file_path")
            envsubst < "$file_path" > "output/$filename"
            echo "Rendered SQL created: output/$filename"
          done

      - name: Upload all rendered SQL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rendered-sql
          path: output/*
          retention-days: 1
