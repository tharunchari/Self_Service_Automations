name: shai-hulud-npm Extractor

on:
  workflow_dispatch:

jobs:
  extract-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Extract dependencies (npm install + fallback)
        env:
          GH_PAT: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          mkdir -p cloned_repos
          > dependencies_output.txt

          while IFS= read -r repo_url; do
            [[ -z "$repo_url" ]] && continue

            repo_name=$(basename "$repo_url" .git)
            echo "🔄 Cloning $repo_name..."

            authed_url="${repo_url/https:\/\/github.com\//https:\/\/${GH_PAT}@github.com/}"
            git clone --depth=1 "$authed_url" "cloned_repos/$repo_name" || { echo "❌ Failed to clone $repo_name"; continue; }

            cd "cloned_repos/$repo_name" || continue

            # Find all package.json files (including monorepo packages)
            mapfile -t package_files < <(find . -name 'package.json' -not -path '*/node_modules/*')

            for pkg in "${package_files[@]}"; do
              pkg_dir=$(dirname "$pkg")
              echo "📦 Installing in: $pkg_dir"

              cd "$pkg_dir" || continue

              if [[ -f package.json ]]; then
                npm install --legacy-peer-deps --include=dev || echo "⚠️ npm install failed in $pkg_dir"

                echo "🔍 Extracting installed dependencies in $pkg_dir..."

                if npm ls --all --json > deps.json 2>/dev/null; then
                  if jq -e '.dependencies' deps.json > /dev/null 2>&1; then
                    jq -r '
                      def walk_deps:
                        to_entries[]
                        | "\(.key):\(.value.version)"
                        + (if (.value.dependencies) then "\n" + (.value.dependencies | walk_deps) else "" end);
                      .dependencies | walk_deps
                    ' deps.json | sort -u | while read -r dep; do
                      echo "$repo_name packages $dep" >> ../../../../dependencies_output.txt
                    done
                  else
                    echo "⚠️ No usable dependencies found (empty)"
                  fi
                else
                  echo "⚠️ npm ls failed — falling back to package.json"

                  jq -r '
                    .dependencies // {} + .devDependencies // {}
                    | to_entries[]
                    | "\(.key):\(.value)"
                  ' package.json | sort -u | while read -r dep; do
                    echo "$repo_name packages $dep" >> ../../../../dependencies_output.txt
                  done
                fi
              fi

              cd - >/dev/null || continue
            done

            cd ../../
          done < repos.txt

      - name: Upload dependency output
        uses: actions/upload-artifact@v4
        with:
          name: dependencies-output
          path: dependencies_output.txt
