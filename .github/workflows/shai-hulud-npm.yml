name: Dependency Extractor (Shell with PAT)

on:
  workflow_dispatch:

jobs:
  extract-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Extract dependencies from repos
        env:
          GH_PAT: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          mkdir -p cloned_repos
          > dependencies_output.txt

          while IFS= read -r repo_url; do
            [[ -z "$repo_url" ]] && continue

            repo_name=$(basename "$repo_url" .git)
            echo "Cloning $repo_name..."

            # Inject PAT into the URL for authenticated clone
            authed_url="${repo_url/https:\/\/github.com\//https:\/\/${GH_PAT}@github.com/}"
            git clone --depth=1 "$authed_url" "cloned_repos/$repo_name" || { echo " Failed to clone $repo_name"; continue; }

            cd "cloned_repos/$repo_name" || continue

            if [[ -f package.json ]]; then
              echo "Installing dependencies for $repo_name..."
              npm install --legacy-peer-deps --include=dev > /dev/null 2>&1 || true

              echo "Extracting dependencies for $repo_name..."
              npm ls --all --json > deps.json || true

              jq -r '
                def walk_deps(deps):
                  to_entries[] | "\(.key):\(.value.version)" +
                  (if (.value.dependencies) then "\n" + (.value.dependencies | walk_deps) else "" end);
                if .dependencies then .dependencies | walk_deps else empty end
              ' deps.json | sort -u | while read -r dep; do
                echo "$repo_name packages $dep" >> ../../../dependencies_output.txt
              done
            else
              echo "No package.json found in $repo_name, skipping."
            fi

            cd ../../
          done < repos.txt

      - name: Upload dependency output
        uses: actions/upload-artifact@v4
        with:
          name: dependencies-output
          path: dependencies_output.txt
