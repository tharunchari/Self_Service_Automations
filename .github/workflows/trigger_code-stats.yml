name: Trigger Generate Code Stats
 
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 2 * *'  # every month on 2nd at 00:00 AM UTC
 
jobs:
  Trigger_Generate_Code_Stats:
    runs-on: ubuntu-24.04
 
    env:
      GH_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}  # GitHub PAT with repo + workflow scope
      AWS_REGION: ${{ vars.AWS_REGION }}
      EXCLUDED_REPOS: "Internal-Tools,central-workflows,Internal-Tools_sub_workflows,ImagingViewer,InterfaceBulkupload,MarketplaceStore,Nextgen_CodeQL_Test,CoreAdmin_CodeQL_Test,ConfigurationStore,CoreAdminReact,DLockService,Backport,BackportHack,acttesting,changed-files_backup,codacy-analysis-cli-action,config-transformer,configure-aws-credentials,connector-x,digital-automation,ghas-jira-integration,github-runner-testing,github-securityreport-action,md2jira,multitenanttool,pmd-github-action,productutilities,pull-request-analytics,quality-tools,scripts_queue,v3-graphql,v3-graphql-js,v3-lambda-core,v3-lambda-host,JSON_Extract_Tool,KafkaTestTool,Proxy-Manager"
      WORKFLOW_FILE: ".github/workflows/code-stats.yml"
      SNS_TOPIC_ARN: "arn:aws:sns:us-east-1:389180911583:VitechToolsNVAProd"
 
    steps:
      - name: Set up AWS CLI
        uses: vitechsystems/configure-aws-credentials@v1.0
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
 
      - name: Get all repositories
        id: fetch_repos
        run: |
          page=1
          per_page=100
          echo "[]" > repos.json
 
          while :; do
            echo "Fetching page $page..."
            resp=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/orgs/vitechsystems/repos?per_page=$per_page&page=$page")
 
            count=$(echo "$resp" | jq 'length')
            [[ "$count" -eq 0 ]] && break
 
            # Merge new page results into repos.json
            jq -s '.[0] + .[1]' repos.json <(echo "$resp") > tmp.json && mv tmp.json repos.json
            ((page++))
          done
 
          jq -r '.[].name' repos.json | sort -u > all_repos.txt
 
      - name: Filter and classify repositories
        id: classify
        run: |
          included=()
          excluded=()
          with_workflow=()
          without_workflow=()
 
          IFS=',' read -ra exclude <<< "$EXCLUDED_REPOS"
 
          while read -r repo; do
            skip=false
            for ex in "${exclude[@]}"; do
              if [[ "$repo" == "$ex" ]]; then
                skip=true
                break
              fi
            done
            $skip && continue
 
            # Check if workflow file exists in main branch
            status_code=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/vitechsystems/$repo/contents/$WORKFLOW_FILE?ref=main")
 
            if [[ "$status_code" == "200" ]]; then
              echo "✅ Found: $repo"
              with_workflow+=("$repo")
            else
              echo "❌ Not Found: $repo"
              without_workflow+=("$repo")
            fi
          done < all_repos.txt
 
          # Print arrays
          echo "=== Included Repos With Workflow ==="
          printf '%s\n' "${with_workflow[@]}"
          echo "=== Included Repos Without Workflow ==="
          printf '%s\n' "${without_workflow[@]}"
 
          # Save to env for next steps
          echo "with_workflow=${with_workflow[*]}" >> "$GITHUB_ENV"
          echo "without_workflow=${without_workflow[*]}" >> "$GITHUB_ENV"

      - name: Trigger workflows using curl
        run: |
          for repo in $with_workflow; do
            echo "Triggering $WORKFLOW_FILE in $repo"Add commentMore actions
            curl -s -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/vitechsystems/$repo/actions/workflows/$(basename $WORKFLOW_FILE)/dispatches" \
              -d "{\"ref\":\"main\"}"
          done

      - name: Send SNS notification for repos without workflow
        if: env.without_workflow != ''
        run: |
          repo_list=$(echo "$without_workflow" | tr ' ' '\n')
          message="**The following repositories are missing $WORKFLOW_FILE:**\n\n$repo_list\n\nPlease take action to add the required workflow."
          aws sns publish \
            --topic-arn "$SNS_TOPIC_ARN" \
            --message "$(echo -e "$message")" \
            --subject "Missing Generate Code Stats Workflow in VitechSystems Repositories" \
            --region "$AWS_REGION"
