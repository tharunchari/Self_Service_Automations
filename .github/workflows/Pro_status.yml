name: Check Branch Protection Status

on:
  workflow_dispatch:  

jobs:
  check-branch-protection:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Run branch protection check
      env:
        GITHUB_TOKEN: ${{ secrets.PROD_CLASSIC_PAT }}
      run: |
        # Variables
        ORG="vitechsystems"
        API_URL="https://api.github.com"
        AUTH_HEADER="Authorization: token $GITHUB_TOKEN"
        UNPROTECTED_BRANCHES=()

        # List of repositories to skip
        SKIP_REPOS=("CoreAdmin" "Nextgen" "digital-automation" "github-runner-testing" "ghas-jira-integration" "Internal-Tools" "BackportHack" "acttesting" "changed-files" "github-securityreport-action" "CodeQL-SQL-Test" "connector-x" "V3locityDashBoard" "codacy-analysis-cli-action" "central-workflows" "Nextgen_GHAS_Testing")  

        # Function to fetch all pages of repositories
        fetch_repositories() {
          page=1
          repos=()
          while : ; do
            response=$(curl -s -H "$AUTH_HEADER" "$API_URL/orgs/$ORG/repos?per_page=100&page=$page")
            repos_page=$(echo "$response" | jq -r '.[].name')
            if [ -z "$repos_page" ]; then
              break
            fi
            repos+=($repos_page)
            page=$((page + 1))
          done
          echo "${repos[@]}"
        }

        # Function to fetch all branches for a given repository
        fetch_branches() {
          repo=$1
          page=1
          branches=()
          while : ; do
            response=$(curl -s -H "$AUTH_HEADER" "$API_URL/repos/$ORG/$repo/branches?per_page=100&page=$page")
            branches_page=$(echo "$response" | jq -r '.[].name')
            if [ -z "$branches_page" ]; then
              break
            fi
            branches+=($branches_page)
            page=$((page + 1))
          done
          echo "${branches[@]}"
        }

        # Function to check if a repository is in the skip list
        is_skipped() {
          repo=$1
          for skipped_repo in "${SKIP_REPOS[@]}"; do
            if [[ "$repo" == "$skipped_repo" ]]; then
              return 0  # Return true (skip the repo)
            fi
          done
          return 1  # Return false (do not skip the repo)
        }

        # Fetch all repositories
        repos=$(fetch_repositories)

        # Loop through each repository
        for repo in ${repos[@]}; do
          # Check if the repository is in the skip list
          if is_skipped "$repo"; then
            echo "Skipping repository: $repo"
            continue
          fi

          echo "Checking branches in repository: $repo"

          # Fetch all branches for the current repository
          branches=$(fetch_branches $repo)

          # Loop through each branch
          for branch in ${branches[@]}; do
            # Check if the branch has protection enabled
            protection_status=$(curl -s -o /dev/null -w "%{http_code}" -H "$AUTH_HEADER" "$API_URL/repos/$ORG/$repo/branches/$branch/protection")

            if [ "$protection_status" -ne 200 ]; then
              # If not protected, add it to the list
              UNPROTECTED_BRANCHES+=("$repo:$branch")
            fi
          done
        done

        # Output the result
        if [ ${#UNPROTECTED_BRANCHES[@]} -gt 0 ]; then
          echo "Unprotected branches:"
          for entry in "${UNPROTECTED_BRANCHES[@]}"; do
            echo "Repository and Branch: $entry"
          done
        else
          echo "All branches are protected!"
        fi
