name: Check Branch Protection Status

on:
  workflow_dispatch:  

jobs:
  check-branch-protection:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Run branch protection check
      env:
        GITHUB_TOKEN: ${{ secrets.PROD_CLASSIC_PAT }}  # Use the token to authenticate API requests
      run: |
        # Variables
        ORG="vitechsystems"
        API_URL="https://api.github.com"
        AUTH_HEADER="Authorization: token $GITHUB_TOKEN"
        UNPROTECTED_BRANCHES=()

        # Function to fetch all pages of repositories
        fetch_repositories() {
          page=1
          repos=()
          while : ; do
            response=$(curl -s -H "$AUTH_HEADER" "$API_URL/orgs/$ORG/repos?per_page=100&page=$page")
            repos_page=$(echo "$response" | jq -r '.[].name')
            if [ -z "$repos_page" ]; then
              break
            fi
            repos+=($repos_page)
            page=$((page + 1))
          done
          echo "${repos[@]}"
        }

        # Function to fetch the primary branch for a given repository
        fetch_primary_branch() {
          repo=$1
          response=$(curl -s -H "$AUTH_HEADER" "$API_URL/repos/$ORG/$repo")
          primary_branch=$(echo "$response" | jq -r '.default_branch')
          echo "$primary_branch"
        }

        # Fetch all repositories
        repos=$(fetch_repositories)

        # Loop through each repository
        for repo in ${repos[@]}; do
          # Skip the repositories CoreAdmin and Nextgen
          if [[ "$repo" == "CoreAdmin" || "$repo" == "Nextgen" ]]; then
            echo "Skipping repository: $repo"
            continue
          fi

          echo "Checking primary branch in repository: $repo"

          # Fetch the primary branch (e.g., main, master)
          primary_branch=$(fetch_primary_branch $repo)

          # Check if the primary branch has protection enabled
          protection_status=$(curl -s -o /dev/null -w "%{http_code}" -H "$AUTH_HEADER" "$API_URL/repos/$ORG/$repo/branches/$primary_branch/protection")

          if [ "$protection_status" -ne 200 ]; then
            # If not protected, add it to the list
            UNPROTECTED_BRANCHES+=("$repo:$primary_branch")
          fi
        done

        # Output the result
        if [ ${#UNPROTECTED_BRANCHES[@]} -gt 0 ]; then
          echo "Unprotected primary branches:"
          for entry in "${UNPROTECTED_BRANCHES[@]}"; do
            echo "Repository and Branch: $entry"
          done
        else
          echo "All primary branches are protected!"
        fi
