name: Jira server Patching

on:
  workflow_dispatch:

jobs:
  update-instance:
    runs-on: ubuntu-latest

    steps:
      - name: Set up AWS CLI
        uses: vitechsystems/configure-aws-credentials@v1.0
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: 'us-east-1'

      - name: Get Auto Scaling Group instances
        id: get-instances
        run: |
          ASG_NAME="JIRAUPG-JIRAAWSUPGADScalingGroup-mAS5ealzU5Lc"
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-name $ASG_NAME \
            --query "AutoScalingGroups[0].Instances[].[InstanceId]" \
            --output text | tr -s '\n' ' ')  # Ensure no extra newlines or spaces
          echo "Instance IDs: $INSTANCE_IDS"
          echo "INSTANCE_IDS=$INSTANCE_IDS" >> $GITHUB_ENV

      - name: Set Auto Scaling Group to 1-2 instances
        run: |
          ASG_NAME="JIRAUPG-JIRAAWSUPGADScalingGroup-mAS5ealzU5Lc"
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name $ASG_NAME \
            --min-size 1 \
            --max-size 2

      - name: Set first instance to Standby (without replacement)
        run: |
          INSTANCE_IDS_ARRAY=(${{ env.INSTANCE_IDS }})
          INSTANCE_TO_STANDBY=${INSTANCE_IDS_ARRAY[0]}
          aws autoscaling enter-standby \
            --auto-scaling-group-name $ASG_NAME \
            --instance-ids $INSTANCE_TO_STANDBY \
            --should-decrement-desired-capacity \
            --no-should-replace-instances

      - name: Connect to the first instance and upgrade to the latest version
        run: |
          INSTANCE_TO_UPDATE=${INSTANCE_IDS_ARRAY[0]}
          aws ssm send-command \
            --instance-ids $INSTANCE_TO_UPDATE \
            --document-name "AWS-RunShellScript" \
            --comment "Upgrade to latest Amazon Linux release" \
            --parameters 'commands=["LATEST_VERSION=$(curl -s https://docs.aws.amazon.com/linux/al2023/release-notes/ | grep -oP \"Version \K[0-9\.]+(?=:)\") && sudo dnf upgrade --releasever=$LATEST_VERSION -y"]'

      - name: Restart the first instance
        run: |
          aws ssm send-command \
            --instance-ids $INSTANCE_TO_UPDATE \
            --document-name "AWS-RunShellScript" \
            --comment "Restart instance" \
            --parameters 'commands=["sudo reboot"]'

      - name: Wait for first instance to reboot and Jira restart
        run: |
          sleep 60  # Wait for the first instance to reboot (adjust as necessary)
          
          # Restart Jira service after reboot on the first instance
          aws ssm send-command \
            --instance-ids $INSTANCE_TO_UPDATE \
            --document-name "AWS-RunShellScript" \
            --comment "Restart Jira service" \
            --parameters 'commands=["sudo service jira restart"]'

      - name: Remove first instance from Standby and set Auto Scaling to 2-2
        run: |
          INSTANCE_IDS_ARRAY=(${{ env.INSTANCE_IDS }})
          INSTANCE_TO_UPDATE=${INSTANCE_IDS_ARRAY[0]}
          aws autoscaling exit-standby \
            --auto-scaling-group-name $ASG_NAME \
            --instance-ids $INSTANCE_TO_UPDATE

      - name: Set second instance to Standby (without replacement)
        run: |
          INSTANCE_IDS_ARRAY=(${{ env.INSTANCE_IDS }})
          INSTANCE_TO_STANDBY=${INSTANCE_IDS_ARRAY[1]}
          aws autoscaling enter-standby \
            --auto-scaling-group-name $ASG_NAME \
            --instance-ids $INSTANCE_TO_STANDBY \
            --should-decrement-desired-capacity \
            --no-should-replace-instances

      - name: Connect to the second instance and upgrade to the latest version
        run: |
          INSTANCE_TO_UPDATE=${INSTANCE_IDS_ARRAY[1]}
          aws ssm send-command \
            --instance-ids $INSTANCE_TO_UPDATE \
            --document-name "AWS-RunShellScript" \
            --comment "Upgrade to latest Amazon Linux release" \
            --parameters 'commands=["LATEST_VERSION=$(curl -s https://docs.aws.amazon.com/linux/al2023/release-notes/ | grep -oP \"Version \K[0-9\.]+(?=:)\") && sudo dnf upgrade --releasever=$LATEST_VERSION -y"]'

      - name: Restart the second instance
        run: |
          aws ssm send-command \
            --instance-ids $INSTANCE_TO_UPDATE \
            --document-name "AWS-RunShellScript" \
            --comment "Restart instance" \
            --parameters 'commands=["sudo reboot"]'

      - name: Wait for second instance to reboot and Jira restart
        run: |
          sleep 60  # Wait for the second instance to reboot (adjust as necessary)

          # Restart Jira service after reboot on the second instance
          aws ssm send-command \
            --instance-ids $INSTANCE_TO_UPDATE \
            --document-name "AWS-RunShellScript" \
            --comment "Restart Jira service" \
            --parameters 'commands=["sudo service jira restart"]'

      - name: Remove second instance from Standby and set Auto Scaling to 2-2
        run: |
          INSTANCE_IDS_ARRAY=(${{ env.INSTANCE_IDS }})
          INSTANCE_TO_UPDATE=${INSTANCE_IDS_ARRAY[1]}
          aws autoscaling exit-standby \
            --auto-scaling-group-name $ASG_NAME \
            --instance-ids $INSTANCE_TO_UPDATE
