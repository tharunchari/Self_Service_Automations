name: Jira Server Patching

permissions:
  contents: read
  id-token: write
  actions: read
  pull-requests: read
  security-events: write

on:
  workflow_dispatch:
    inputs:
      pluginKeys:
        default: 'com.vitechinc.jira.hoursTracking,com.vitechinc.jira.defaultCommentSecurity,com.vitechinc.art.ArtJiraService'
        required: true
        description: 'Comma-separated plugin keys to disable'
      environment:
        required: true
        description: 'The environment to patch (jiraupg, jiraqa or jiraprod)'
  workflow_call:
    inputs:
      pluginKeys:
        required: false
        type: string
        default: 'com.vitechinc.jira.hoursTracking,com.vitechinc.jira.defaultCommentSecurity,com.vitechinc.art.ArtJiraService'
      environment:
        required: true
        type: string
    secrets:
      CORP_CLD_AWS_ACCESS_KEY_ID:
        required: true
      CORP_CLD_AWS_SECRET_ACCESS_KEY:
        required: true
      VITECH_LINUX_ZOIO_PASSWORD:
        required: false
      JIRAUPG_ACCESS_TOKEN:
        required: false
      JIRAQA_ACCESS_TOKEN:
        required: false
      JIRAPROD_ACCESS_TOKEN:
        required: false

jobs:
  Jira-Patching:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Set strict shell options
        run: |
          set -euo pipefail

      - name: Set input variables
        id: input_resolver
        run: |
          echo "PLUGIN_KEYS=${{ inputs.pluginKeys }}" >> $GITHUB_ENV
          echo "ENVIRONMENT=${{ inputs.environment }}" >> $GITHUB_ENV

      - name: Set environment-specific variables
        run: |
          set -euo pipefail
          echo "Using environment: $ENVIRONMENT"

          if [ "$ENVIRONMENT" = "jiraupg" ]; then
            echo "ASG_NAME=JIRAUPG-JIRAAWSUPGADScalingGroup-mAS5ealzU5Lc" >> $GITHUB_ENV
            echo "URL=https://jiraupg.vitechinc.com/jiraupg" >> $GITHUB_ENV
            echo "TOKEN=${{ secrets.JIRAUPG_ACCESS_TOKEN }}" >> $GITHUB_ENV
            echo "SNS_TOPIC=arn:aws:sns:us-east-1:389180911583:Internal-Tools_Patching" >> $GITHUB_ENV
            echo "SUBJECT_PREFIX=Restart of JiraUPG Nodes for Scheduled Patching" >> $GITHUB_ENV
            echo "BODY_PREFIX=JiraUPG patching is scheduled." >> $GITHUB_ENV

          elif [ "$ENVIRONMENT" = "jiraqa" ]; then
            echo "ASG_NAME=JIRAQA-JiraQAADScalingGroup-YfhGsDer5pMj" >> $GITHUB_ENV
            echo "URL=https://jiraqa.vitechinc.com/jiraqa" >> $GITHUB_ENV
            echo "TOKEN=${{ secrets.JIRAQA_ACCESS_TOKEN }}" >> $GITHUB_ENV
            echo "SNS_TOPIC=arn:aws:sns:us-east-1:389180911583:Internal-Tools_Patching" >> $GITHUB_ENV
            echo "SUBJECT_PREFIX=Restart of JiraQa Nodes for Scheduled Patching" >> $GITHUB_ENV
            echo "BODY_PREFIX=JiraQA patching is scheduled." >> $GITHUB_ENV

          elif [ "$ENVIRONMENT" = "jiraprod" ]; then
            if [ -z "${{ secrets.VITECH_LINUX_ZOIO_PASSWORD }}" ]; then
              echo "ERROR: Secret VITECH_LINUX_ZOIO_PASSWORD not set for JIRAPROD environment."
              exit 1
            fi
            echo "ASG_NAME=JIRAAWSPROD-JiraAWSPRODDScalingGroup-KH04DAC48ZQX" >> $GITHUB_ENV
            echo "URL=https://jira.vitechinc.com/jira" >> $GITHUB_ENV
            echo "TOKEN=${{ secrets.JIRAPROD_ACCESS_TOKEN }}" >> $GITHUB_ENV
            echo "SNS_TOPIC=arn:aws:sns:us-east-1:389180911583:Internal-Tools_Patching" >> $GITHUB_ENV
            echo "SUBJECT_PREFIX=Restart of JiraProd Nodes for Scheduled Patching" >> $GITHUB_ENV
            echo "BODY_PREFIX=JiraProd patching is scheduled." >> $GITHUB_ENV
          else
            echo "ERROR: Invalid environment specified."
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Send pre-patching notification via SNS
        run: |
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-name "${{ env.ASG_NAME }}" \
            --query 'AutoScalingGroups[0].Instances[*].InstanceId' \
            --output text)
          if [[ -z "$INSTANCE_IDS" ]]; then
            echo "ERROR: No instances found in ASG. Exiting."
            exit 1
          fi
          aws sns publish \
            --topic-arn ${{ env.SNS_TOPIC }} \
            --subject "Rolling ${{ env.SUBJECT_PREFIX }}" \
            --message "$(printf "${{ env.BODY_PREFIX }} Please be aware of any disruptions during this process.\n\n **Instance IDs:**\n%s\n" "$INSTANCE_IDS")"

      - name: Disable Jira Plugins
        run: |
          IFS=',' read -ra PLUGIN_ARRAY <<< "$PLUGIN_KEYS"
          for PLUGIN_KEY in "${PLUGIN_ARRAY[@]}"; do
            echo "Disabling plugin: $PLUGIN_KEY"
            curl --request PUT "${{ env.URL }}/rest/plugins/1.0/${PLUGIN_KEY}-key" \
              --header "Authorization: Bearer ${{ env.TOKEN }}" \
              --header "Content-Type: application/vnd.atl.plugins.plugin+json" \
              --data '{"enabled": false}'
          done

      - name: Get Auto Scaling Group Instances
        id: get-instances
        run: |
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-name "${{ env.ASG_NAME }}" \
            --query 'AutoScalingGroups[0].Instances[*].InstanceId' \
            --output text | tr -s '\n' ' ')
          echo "INSTANCE_IDS=$INSTANCE_IDS" >> $GITHUB_ENV
          echo "Instance IDs: $INSTANCE_IDS"

      - name: Set Auto Scaling Group to 1 instance
        run: |
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${{ env.ASG_NAME }}" \
            --min-size 1  

      - name: Patch Each Instance
        id: patch-each-instance
        run: |
          set -euo pipefail
          INSTANCE_IDS_ARRAY=($INSTANCE_IDS)
          PATCH_SUCCESS=true  
      
          for INSTANCE_ID in "${INSTANCE_IDS_ARRAY[@]}"
          do
            echo "========================================================="
            echo "Starting patching process for: $INSTANCE_ID"
            echo "========================================================="
      
            # Put instance into standby
            aws autoscaling enter-standby \
              --auto-scaling-group-name "${{ env.ASG_NAME }}" \
              --instance-ids "$INSTANCE_ID" \
              --should-decrement-desired-capacity
      
            # Get Private IP for reporting
            INSTANCE_PRIVATE_IP=$(aws ec2 describe-instances \
              --instance-ids "$INSTANCE_ID" \
              --query 'Reservations[].Instances[].PrivateIpAddress' \
              --output text)
      
            echo "Private IP for $INSTANCE_ID: $INSTANCE_PRIVATE_IP"
      
            # Get cluster status BEFORE patching
            BEFORE_STATUS=$(curl -s -X GET \
              -H "Authorization: Bearer ${{ env.TOKEN }}" \
              -H "Content-Type: application/json" \
              "${{ env.URL }}/rest/api/2/cluster/nodes")
      
            # Get OS version BEFORE patching
            VERSION_BEFORE_COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Check OS version before patching" \
              --parameters 'commands=["cat /etc/system-release"]' \
              --query 'Command.CommandId' --output text)
            sleep 5
            VERSION_BEFORE=$(aws ssm list-command-invocations \
              --command-id "$VERSION_BEFORE_COMMAND_ID" \
              --query 'CommandInvocations[0].CommandPlugins[0].Output' \
              --output text)
      
            # Stop Jira and HTTPD
            aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Stop Jira and HTTPD services" \
              --parameters 'commands=["sudo service httpd stop", "sudo service jira stop"]'
      
            # Perform system update
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Upgrade to latest Amazon Linux release" \
              --parameters 'commands=["dnf -y --releasever=latest update"]' \
              --query 'Command.CommandId' --output text)
      
            echo "Waiting for upgrade command to complete..."
            for i in {1..30}; do
              COMMAND_STATUS=$(aws ssm list-commands --command-id "$COMMAND_ID" --query 'Commands[0].Status' --output text)
              echo "Current command status: $COMMAND_STATUS"     
              if [[ "$COMMAND_STATUS" == "Success" ]]; then
                  echo "Command completed successfully."
                  break
              elif [[ "$COMMAND_STATUS" == "Failed" ]]; then
                  echo "Command failed. Exiting..."
                  exit 1
              fi
              sleep 30  
            done
      
            # Restart instance
            echo "Restarting instance $INSTANCE_ID..."
            aws ec2 stop-instances --instance-ids "$INSTANCE_ID"
            aws ec2 wait instance-stopped --instance-ids "$INSTANCE_ID"
            aws ec2 start-instances --instance-ids "$INSTANCE_ID"
            aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
      
            # Wait for SSM agent to be ready
            echo "Waiting for SSM agent to be ready..."
            for i in {1..30}; do
              STATUS=$(aws ssm describe-instance-information \
                --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
                --query 'InstanceInformationList[0].PingStatus' \
                --output text)
              if [[ "$STATUS" == "Online" ]]; then
                echo "SSM agent ready."
                break
              fi
              echo "SSM not ready yet... waiting (attempt $i)"
              sleep 15
            done
      
            # Restart ds_agent and services
            aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Stop ds_agent, remove dsa_filt, and start ds_agent" \
              --parameters 'commands=["service ds_agent stop", "sleep 180", "sudo rmmod dsa_filter", "service ds_agent start"]'
      
            aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Backup /etc/httpd/conf.d, then restart Jira and HTTPD services" \
              --parameters 'commands=["sudo cp -r /etc/httpd/conf.d /etc/httpd/conf.d.bak-$(date +%Y%m%d-%H%M%S)", "sudo service httpd restart", "sudo service jira restart"]'
      
            # Exit standby
            aws autoscaling exit-standby \
              --auto-scaling-group-name "${{ env.ASG_NAME }}" \
              --instance-ids "$INSTANCE_ID"
      
            echo "Waiting 600 seconds for services to stabilize..."
            for i in {1..10}; do
              echo "  ... waiting $((i*60)) seconds elapsed"
              sleep 60
            done
      
            # Get cluster status AFTER patching
            AFTER_STATUS=$(curl -s -X GET \
              -H "Authorization: Bearer ${{ env.TOKEN }}" \
              -H "Content-Type: application/json" \
              "${{ env.URL }}/rest/api/2/cluster/nodes")
      
            # Get OS version AFTER patching
            VERSION_AFTER_COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Check OS version after patching" \
              --parameters 'commands=["cat /etc/system-release"]' \
              --query 'Command.CommandId' --output text)
            sleep 5
            VERSION_AFTER=$(aws ssm list-command-invocations \
              --command-id "$VERSION_AFTER_COMMAND_ID" \
              --query 'CommandInvocations[0].CommandPlugins[0].Output' \
              --output text)
      
            # Verify instance health in Jira cluster
            INSTANCE_ALIVE=$(echo "$AFTER_STATUS" | jq --arg ip "$INSTANCE_PRIVATE_IP" '.[] | select(.nodeId == $ip and .state == "ACTIVE")')
      
            if [[ -n "$INSTANCE_ALIVE" ]]; then
              echo "Instance $INSTANCE_ID is alive and healthy."
              HEALTH_STATUS="HEALTHY"
            else
              echo "Error: Instance $INSTANCE_ID is NOT healthy. Sending SNS notification."  
              aws sns publish \
                --topic-arn ${{ env.SNS_TOPIC }} \
                --subject "${{ env.SUBJECT_PREFIX }} Failed on Node $INSTANCE_PRIVATE_IP" \
                --message "Patching of instance $INSTANCE_ID ($INSTANCE_PRIVATE_IP) failed. Please investigate."
              PATCH_SUCCESS=false  
              break  
            fi
      
            # Sanitize BEFORE/AFTER status JSON for SES
            CLEAN_BEFORE=$(echo "$BEFORE_STATUS" | jq -c '.' | sed 's/"/\\"/g')
            CLEAN_AFTER=$(echo "$AFTER_STATUS" | jq -c '.' | sed 's/"/\\"/g')
      
            # Build SES email JSON payload
            cat > email.json <<EOF
      {
        "Source": "v3atlassianops@vitechinc.com",
        "Destination": {
          "ToAddresses": ["v3atlassianops@vitechinc.com"]
        },
        "Message": {
          "Subject": {
            "Data": "${ENVIRONMENT} - Node Patching Completed - ${INSTANCE_ID}"
          },
          "Body": {
            "Html": {
              "Data": "<html><body>
                <h3>${ENVIRONMENT} Node Patching Completed</h3>
                <table border='1' cellpadding='5' cellspacing='0'>
                  <tr><th>Instance ID</th><th>Instance IP</th><th>Before Version</th><th>After Version</th><th>Before Status</th><th>After Status</th><th>Health</th></tr>
                  <tr>
                    <td>${INSTANCE_ID}</td>
                    <td>${INSTANCE_PRIVATE_IP}</td>
                    <td>${VERSION_BEFORE}</td>
                    <td>${VERSION_AFTER}</td>
                    <td>${CLEAN_BEFORE}</td>
                    <td>${CLEAN_AFTER}</td>
                    <td>${HEALTH_STATUS}</td>
                  </tr>
                </table>
              </body></html>"
            }
          }
        }
      }
      EOF
      
            # Send SES email
            aws ses send-email --cli-input-json file://email.json
      
            echo "========================================================="
            echo "Patching completed for: $INSTANCE_ID"
            echo "========================================================="
          done
      
          # Stop patching if any node failed
          if [[ "$PATCH_SUCCESS" == "false" ]]; then
            echo "One or more instances failed patching. Exiting workflow."
            exit 1
          fi


      - name: Set Auto Scaling Group to 2 instances
        run: |
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${{ env.ASG_NAME }}" \
            --min-size 2 
            
      - name: Enable Jira Plugins
        run: |
          IFS=',' read -ra PLUGIN_ARRAY <<< "$PLUGIN_KEYS"
          for PLUGIN_KEY in "${PLUGIN_ARRAY[@]}"; do
            echo "Enabling plugin: $PLUGIN_KEY"
            curl --request PUT "${{ env.URL }}/rest/plugins/1.0/${PLUGIN_KEY}-key" \
                 --header "Authorization: Bearer ${{ env.TOKEN }}" \
                 --header "Content-Type: application/vnd.atl.plugins.plugin+json" \
                 --data '{"enabled": true}'
          done

      - name: Check URL Status Code
        id: check_status
        run: |
          STATUS_CODE=$(curl --write-out "%{http_code}" --silent --output /dev/null "${{ env.URL }}/status")
          echo "URL Status Code: $STATUS_CODE"
          if [[ "$STATUS_CODE" -eq 200 ]]; then
            echo "URL is up and running with status code 200"
            echo "status_code=200" >> $GITHUB_ENV
          else
            echo "Error: URL did not return status code 200. Status Code: $STATUS_CODE"
            echo "status_code=$STATUS_CODE" >> $GITHUB_ENV
            aws sns publish \
              --topic-arn ${{ env.SNS_TOPIC }} \
              --subject "$ENVIRONMENT App Down Alert - Status Code: $STATUS_CODE" \
              --message "The app at ${{ env.URL }} is down. Status code: $STATUS_CODE. Please investigate."
            exit 3
          fi
         
      - name: Send post-patching notification via SNS
        if: env.status_code == '200'
        run: |
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-name "${{ env.ASG_NAME }}" \
            --query 'AutoScalingGroups[0].Instances[*].InstanceId' \
            --output text)
          aws sns publish \
            --topic-arn ${{ env.SNS_TOPIC }} \
            --subject "Rolling ${{ env.SUBJECT_PREFIX }} Completed" \
            --message "$(printf "${{ env.BODY_PREFIX }} The patching has been completed successfully.\n\n **Patched Instance IDs:**\n\n "$INSTANCE_IDS" \n Please reach out to v3atlassianops@vitechinc.com for any issues.")"
