name: Jira server Patching

on:
  workflow_dispatch:

jobs:
  update-instance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get Auto Scaling Group Instances
        id: get-instances
        run: |
          ASG_NAME="JIRAUPG-JIRAAWSUPGADScalingGroup-mAS5ealzU5Lc"
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-name $ASG_NAME \
            --query "AutoScalingGroups[0].Instances[].[InstanceId]" \
            --output text)
          echo "INSTANCE_IDS=$INSTANCE_IDS" >> $GITHUB_ENV
          echo "Instance IDs: $INSTANCE_IDS"

      - name: Set Auto Scaling Group to 1-2 instances
        run: |
          ASG_NAME="JIRAUPG-JIRAAWSUPGADScalingGroup-mAS5ealzU5Lc"
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name $ASG_NAME \
            --min-size 1 \
            --max-size 2 

      - name: Patch Instance 1
        id: patch-instance-1
        run: |
          INSTANCE_IDS_ARRAY=(${{ env.INSTANCE_IDS }})
          INSTANCE_TO_PATCH=${INSTANCE_IDS_ARRAY[0]}
          echo "Patching instance: $INSTANCE_TO_PATCH"

          aws autoscaling enter-standby \
            --auto-scaling-group-name "JIRAUPG-JIRAAWSUPGADScalingGroup-mAS5ealzU5Lc" \
            --instance-ids $INSTANCE_TO_PATCH \
            --should-decrement-desired-capacity \
            --no-should-replace-instances

          aws ssm send-command \
            --instance-ids $INSTANCE_TO_PATCH \
            --document-name "AWS-RunShellScript" \
            --comment "Upgrade to latest Amazon Linux release" \
            --parameters 'commands=["LATEST_VERSION=$(curl -s https://docs.aws.amazon.com/linux/al2023/release-notes/ | grep -oP \"Version \K[0-9\.]+(?=:)\") && sudo dnf upgrade --releasever=$LATEST_VERSION -y"]'

          aws ssm send-command \
            --instance-ids $INSTANCE_TO_PATCH \
            --document-name "AWS-RunShellScript" \
            --comment "Restart instance" \
            --parameters 'commands=["sudo reboot"]'

          sleep 120

          aws ssm send-command \
            --instance-ids $INSTANCE_TO_PATCH \
            --document-name "AWS-RunShellScript" \
            --comment "Restart Jira service" \
            --parameters 'commands=["sudo systemctl restart jira"]'

          echo "Jira health check passed on instance $INSTANCE_TO_PATCH"

          aws autoscaling exit-standby \
            --auto-scaling-group-name "JIRAUPG-JIRAAWSUPGADScalingGroup-mAS5ealzU5Lc" \
            --instance-ids $INSTANCE_TO_PATCH

      - name: Patch Instance 2
        id: patch-instance-2
        run: |
          INSTANCE_IDS_ARRAY=(${{ env.INSTANCE_IDS }})
          INSTANCE_TO_PATCH=${INSTANCE_IDS_ARRAY[1]}
          echo "Patching instance: $INSTANCE_TO_PATCH"
          # ... (rest of the patching steps - same as for instance 1, just using INSTANCE_TO_PATCH)
          aws autoscaling enter-standby \
            --auto-scaling-group-name "JIRAUPG-JIRAAWSUPGADScalingGroup-mAS5ealzU5Lc" \
            --instance-ids $INSTANCE_TO_PATCH \
            --should-decrement-desired-capacity \
            --no-should-replace-instances

          aws ssm send-command \
            --instance-ids $INSTANCE_TO_PATCH \
            --document-name "AWS-RunShellScript" \
            --comment "Upgrade to latest Amazon Linux release" \
            --parameters 'commands=["LATEST_VERSION=$(curl -s https://docs.aws.amazon.com/linux/al2023/release-notes/ | grep -oP \"Version \K[0-9\.]+(?=:)\") && sudo dnf upgrade --releasever=$LATEST_VERSION -y"]'

          aws ssm send-command \
            --instance-ids $INSTANCE_TO_PATCH \
            --document-name "AWS-RunShellScript" \
            --comment "Restart instance" \
            --parameters 'commands=["sudo reboot"]'

          sleep 120

          aws ssm send-command \
            --instance-ids $INSTANCE_TO_PATCH \
            --document-name "AWS-RunShellScript" \
            --comment "Restart Jira service" \
            --parameters 'commands=["sudo systemctl restart jira"]'

          echo "Jira health check passed on instance $INSTANCE_TO_PATCH"

          aws autoscaling exit-standby \
            --auto-scaling-group-name "JIRAUPG-JIRAAWSUPGADScalingGroup-mAS5ealzU5Lc" \
            --instance-ids $INSTANCE_TO_PATCH


      - name: Set Auto Scaling Group to 2-2
        run: |
          ASG_NAME="JIRAUPG-JIRAAWSUPGADScalingGroup-mAS5ealzU5Lc"
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name $ASG_NAME \
            --min-size 2 \
            --max-size 2 
