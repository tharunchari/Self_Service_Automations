name: Confluence Server Patching

permissions:
  contents: read
  id-token: write
  actions: read
  pull-requests: read
  security-events: write

on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        description: 'The environment to patch (confluence or confluencedr)'   

  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      CORP_CLD_AWS_ACCESS_KEY_ID:
        required: true
      CORP_CLD_AWS_SECRET_ACCESS_KEY:
        required: true
      VITECH_LINUX_ZOIO_PASSWORD:
        required: false
      CONFLUENCEDR_ACCESS_TOKEN:
        required: false
      CONFLUENCE_ACCESS_TOKEN:
        required: false      

jobs:
  Confluence-Patching:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write     
  
    steps:
      - name: Set strict shell options
        run: |
          set -euo pipefail

      - name: Set input variables
        id: input_resolver
        run: |
          echo "ENVIRONMENT=${{ inputs.environment }}" >> $GITHUB_ENV

      - name: Set environment-specific variables
        run: |
          set -euo pipefail
          echo "Using environment: $ENVIRONMENT"  

      - name: Set environment-specific variables
        run: |
          if [ "$ENVIRONMENT" == "confluencedr" ]; then
            echo "Using confluencedr configuration"
            echo "ASG_NAME=CONFLUENCEAWSDR-ConfluenceAWSDRScalingGroup-d5JOrSpgKbJr" >> $GITHUB_ENV
            echo "URL=https://confluencedr.vitechinc.com/confluencedr" >> $GITHUB_ENV
            echo "TOKEN=${{ secrets.CONFLUENCEDR_ACCESS_TOKEN }}" >> $GITHUB_ENV
            echo "SNS_TOPIC=arn:aws:sns:us-west-2:389180911583:Internal-Tools_Patching" >> $GITHUB_ENV
            echo "SUBJECT_PREFIX=Restart of ConfluenceDR Nodes for Scheduled Patching" >> $GITHUB_ENV
            echo "BODY_PREFIX=ConfluenceDR patching is scheduled." >> $GITHUB_ENV
            echo "AWS_REGION=us-west-2" >> $GITHUB_ENV
          elif [ "$ENVIRONMENT" == "confluence" ]; then
            if [ -z "${{ secrets.VITECH_LINUX_ZOIO_PASSWORD }}" ]; then
              echo "ERROR: Secret VITECH_LINUX_ZOIO_PASSWORD not set for JIRAPROD environment."
              exit 1
            fi
            echo "Using confluence configuration"
            echo "ASG_NAME=CONFLUENCEPROD-ConfluenceAWSPRODDScalingGroup-zAmOVDq6H2v8" >> $GITHUB_ENV
            echo "URL=https://confluence.vitechinc.com/confluence" >> $GITHUB_ENV
            echo "TOKEN=${{ secrets.CONFLUENCE_ACCESS_TOKEN }}" >> $GITHUB_ENV
            echo "SNS_TOPIC=arn:aws:sns:us-east-1:389180911583:Internal-Tools_Patching" >> $GITHUB_ENV
            echo "SUBJECT_PREFIX=Restart of Confluence Nodes for Scheduled Patching" >> $GITHUB_ENV
            echo "BODY_PREFIX=Confluence patching is scheduled." >> $GITHUB_ENV  
            echo "AWS_REGION=us-east-1" >> $GITHUB_ENV
          else
            echo "Invalid environment specified. Please choose either 'ConfluenceDR', or 'Confluence'."
            exit 1
          fi

      - name: Set AWS region
        run: |
          #echo "AWS_REGION=${{ github.event.inputs.environment == 'confluence' && 'us-east-1' || 'us-west-2' }}" >> $GITHUB_ENV
          
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Send pre-patching notification via SNS
        run: |
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-name "${{ env.ASG_NAME }}" \
            --query 'AutoScalingGroups[0].Instances[*].InstanceId' \
            --output text)
          if [[ -z "$INSTANCE_IDS" ]]; then
            echo "ERROR: No instances found in ASG. Exiting."
            exit 1
          fi
          # Compose HTML email content by echoing to a file (avoids here-doc issues)
      - name: Generate HTML email body
        run: |
          echo "<html>" > email_body.html
          echo "<head><style>" >> email_body.html
          echo "  body { font-family: Arial, sans-serif; background-color: #f9f9f9; color: #333; padding: 20px; }" >> email_body.html
          echo "  table { border-collapse: collapse; width: 100%; background-color: #fff; }" >> email_body.html
          echo "  th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }" >> email_body.html
          echo "  th { background-color: #0073e6; color: white; }" >> email_body.html
          echo "  tr:nth-child(even) { background-color: #f2f2f2; }" >> email_body.html
          echo "</style></head>" >> email_body.html
          echo "<body>" >> email_body.html
          echo "<h2>${BODY_PREFIX}</h2>" >> email_body.html
          echo "<p>Please be aware of any disruptions during this process.</p>" >> email_body.html
          echo "<h3>Impacted EC2 Instances</h3>" >> email_body.html
          echo "<table>" >> email_body.html
          echo "<tr><th>Instance ID</th></tr>" >> email_body.html
          while IFS= read -r line; do
            echo "<tr><td>$line</td></tr>" >> email_body.html
          done <<< "$INSTANCE_IDS"
          echo "</table>" >> email_body.html
          echo "<p style='margin-top: 30px; font-size: 12px; color: #888;'>Sent by GitHub Actions via AWS SES</p>" >> email_body.html
          echo "</body></html>" >> email_body.html

      - name: Send SES email
        run: |
          HTML_BODY=$(jq -Rs . < email_body.html)
          aws ses send-email \
            --from "v3atlassianops@vitechinc.com" \
            --destination "ToAddresses=v3atlassianops@vitechinc.com" \
            --message "Subject={Data='${SUBJECT_PREFIX}'},Body={Html={Data=${HTML_BODY}}}"

      - name: Get Auto Scaling Group Instances
        id: get-instances
        run: |
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-name "${{ env.ASG_NAME }}" \
            --query 'AutoScalingGroups[0].Instances[*].InstanceId' \
            --output text | tr -s '\n' ' ')
          echo "INSTANCE_IDS=$INSTANCE_IDS" >> $GITHUB_ENV
          echo "Instance IDs: $INSTANCE_IDS"

      - name: Set Auto Scaling Group to 1 instance
        run: |
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${{ env.ASG_NAME }}" \
            --min-size 1  
            
      - name: Patch Each Instance
        run: |
          set -euo pipefail
          INSTANCE_IDS_ARRAY=($INSTANCE_IDS)
          PATCH_SUCCESS=true  
      
          for INSTANCE_ID in "${INSTANCE_IDS_ARRAY[@]}"
          do
            echo "==============================="
            echo "Patching instance: $INSTANCE_ID"
      
            # Get BEFORE_VERSION
            aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=["cat /etc/system-release"]' \
              --query 'Command.CommandId' --output text > before-version-command-id.txt
            BEFORE_COMMAND_ID=$(cat before-version-command-id.txt)
            sleep 10
            BEFORE_VERSION=$(aws ssm get-command-invocation \
              --command-id "$BEFORE_COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'StandardOutputContent' \
              --output text | head -n 1)
      
            aws autoscaling enter-standby \
              --auto-scaling-group-name "${{ env.ASG_NAME }}" \
              --instance-ids "$INSTANCE_ID" \
              --should-decrement-desired-capacity
      
            aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Stop confluence and HTTPD services" \
              --parameters 'commands=["sudo service httpd stop", "sudo service confluence stop"]'
      
            aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Upgrade to latest Amazon Linux release" \
              --parameters 'commands=["dnf -y --releasever=latest update"]' \
              --query 'Command.CommandId' --output text > command-id.txt
            COMMAND_ID=$(cat command-id.txt)
            echo "Waiting for upgrade command to complete..."
            for i in {1..30}; do
                COMMAND_STATUS=$(aws ssm list-commands --command-id "$COMMAND_ID" --query 'Commands[0].Status' --output text)
                echo "Current command status: $COMMAND_STATUS"     
                if [[ "$COMMAND_STATUS" == "Success" ]]; then
                    echo "Command completed successfully."
                    break
                elif [[ "$COMMAND_STATUS" == "Failed" ]]; then
                    echo "Command failed. Exiting..."
                    exit 1
                fi
                sleep 30  
            done              
            if [[ "$COMMAND_STATUS" != "Success" ]]; then
                echo "Max attempts exceeded. Command did not complete."
                exit 1
            fi
      
            echo "Stop the instance"
            aws ec2 stop-instances --instance-ids "$INSTANCE_ID"
            echo "Wait for the instance to stop"
            aws ec2 wait instance-stopped --instance-ids "$INSTANCE_ID"
            echo "Start the instance"
            aws ec2 start-instances --instance-ids "$INSTANCE_ID"
            echo "Wait for the instance to fully start"
            aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
            
            echo "Waiting for SSM agent to be ready..."
            SSM_READY=false
            for i in {1..30}; do
              STATUS=$(aws ssm describe-instance-information --filters "Key=InstanceIds,Values=$INSTANCE_ID" --query 'InstanceInformationList[0].PingStatus' --output text)
              if [[ "$STATUS" == "Online" ]]; then
                SSM_READY=true
                break
              fi
              echo "SSM not ready yet... waiting (attempt $i)"
              sleep 15
            done
      
            if [[ "$SSM_READY" == "false" ]]; then
              echo "SSM agent is not ready. Triggering SNS notification."
              aws sns publish \
                --topic-arn $SNS_TOPIC \
                --subject "SSM Not Ready for Instance $INSTANCE_ID" \
                --message "SSM agent did not become ready after EC2 start in $ENVIRONMENT. Please investigate."
              exit 1
            fi
      
            # Check instance status, fail and trigger SNS if not running
            INSTANCE_STATE=$(aws ec2 describe-instance-status --instance-ids "$INSTANCE_ID" --query 'InstanceStatuses[0].InstanceState.Name' --output text)
            if [[ "$INSTANCE_STATE" != "running" ]]; then
              echo "Instance $INSTANCE_ID failed to start. Triggering SNS notification."
              aws sns publish \
                --topic-arn $SNS_TOPIC \
                --subject "EC2 Start Failure for Instance $INSTANCE_ID" \
                --message "Instance $INSTANCE_ID failed to start after $ENVIRONMENT patching. Please investigate."
              exit 1
            fi
      
            echo "ds_agent tasks"
            aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Stop ds_agent, remove dsa_filt, and start ds_agent" \
              --parameters 'commands=["service ds_agent stop", "sleep 240", "sudo rmmod dsa_filter", "service ds_agent start"]' \
              --query 'Command.CommandId' --output text > command-id.txt
            COMMAND_ID=$(cat command-id.txt)
            echo "Waiting for command to complete..."
            for i in {1..30}; do
              COMMAND_STATUS=$(aws ssm list-commands --command-id "$COMMAND_ID" --query 'Commands[0].Status' --output text)
              echo "Current command status: $COMMAND_STATUS"
              if [[ "$COMMAND_STATUS" == "Success" ]]; then
                echo "Command completed successfully."
                break
              elif [[ "$COMMAND_STATUS" == "Failed" ]]; then
                echo "Command failed. Exiting..."
                exit 1
              fi
              sleep 30  
            done  
      
            aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Backup /etc/httpd/conf.d, then restart confluence and HTTPD services" \
              --parameters 'commands=["sudo cp -r /etc/httpd/conf.d /etc/httpd/conf.d.bak-$(date +%Y%m%d-%H%M%S)", "sudo mv /etc/httpd/conf.d/ssl.conf /etc/httpd/conf.d/ssl.conf-bkp ", "sudo service httpd restart", "sudo service confluence restart"]'
      
            aws autoscaling exit-standby \
              --auto-scaling-group-name "${{ env.ASG_NAME }}" \
              --instance-ids "$INSTANCE_ID"
      
            echo "Waiting 600 seconds to allow services and cluster to stabilize..."
            for i in {1..10}; do
              echo "  ... waiting $((i*60)) seconds elapsed"
              sleep 60
            done
      
            echo "Check node status using the API"
            NODE_STATUS=$(curl -X GET \
              -H "Authorization: Bearer ${{ env.TOKEN }}" \
              -H "Content-Type: application/json" \
              "${{ env.URL }}/rest/zdu/cluster" | jq .)
            
            echo "Raw API Response: $NODE_STATUS"
            echo "$NODE_STATUS" | jq .
      
            INSTANCE_PRIVATE_IP=$(aws ec2 describe-instances \
              --instance-ids "$INSTANCE_ID" \
              --query 'Reservations[].Instances[].PrivateIpAddress' \
              --output text)
            
            INSTANCE_ALIVE=$(echo "$NODE_STATUS" | jq --arg ip "$INSTANCE_PRIVATE_IP" '.nodes[] | select(.ipAddress == $ip and .state == "ACTIVE")')
      
            # Get AFTER_VERSION
            aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=["cat /etc/system-release"]' \
              --query 'Command.CommandId' --output text > after-version-command-id.txt
            AFTER_COMMAND_ID=$(cat after-version-command-id.txt)
            sleep 10
            AFTER_VERSION=$(aws ssm get-command-invocation \
              --command-id "$AFTER_COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'StandardOutputContent' \
              --output text | head -n 1)
      
            if [[ -n "$INSTANCE_ALIVE" ]]; then
              echo "Instance $INSTANCE_ID is alive and healthy."
      
              # Compose HTML email content by echoing to a file (avoids here-doc issues)
              echo "<html>" > email_body.html
              echo "<head><style>" >> email_body.html
              echo "  body { font-family: Arial, sans-serif; background-color: #f9f9f9; color: #333; padding: 20px; }" >> email_body.html
              echo "  table { border-collapse: collapse; width: 100%; background-color: #fff; }" >> email_body.html
              echo "  th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }" >> email_body.html
              echo "  th { background-color: #0073e6; color: white; }" >> email_body.html
              echo "  tr:nth-child(even) { background-color: #f2f2f2; }" >> email_body.html
              echo "  .status-alive { color: green; font-weight: bold; }" >> email_body.html
              echo "</style></head>" >> email_body.html
              
              echo "<body>" >> email_body.html
              echo "<p>The following Jira node was successfully patched in <b>${ENVIRONMENT}</b>:</p>" >> email_body.html
              echo "<table>" >> email_body.html
              echo "  <tr><th>Instance ID</th><th>Instance IP</th><th>Before Patching Version</th><th>After Patching Version</th><th>Alive Status</th></tr>" >> email_body.html
              
              # ✅ Make Instance ID cell green
              echo "  <tr>" >> email_body.html
              echo "    <td>${INSTANCE_ID}</td>" >> email_body.html
              echo "    <td style='background-color: #d4edda;'>${INSTANCE_PRIVATE_IP}</td>" >> email_body.html
              echo "    <td style='background-color: #d4edda;'>${BEFORE_VERSION}</td>" >> email_body.html
              echo "    <td style='background-color: #d4edda;'>${AFTER_VERSION}</td>" >> email_body.html
              echo "    <td class='status-alive' style='background-color: #d4edda;'>✅ ALIVE</td>" >> email_body.html
              echo "  </tr>" >> email_body.html

              
              echo "</table>" >> email_body.html
              echo "<p style='margin-top: 30px; font-size: 12px; color: #888;'>Sent by GitHub Actions via AWS SES</p>" >> email_body.html
              echo "</body></html>" >> email_body.html


              EMAIL_BODY=$(cat email_body.html | jq -Rs .)
      
              # Send email using AWS SES
              aws ses send-email \
              --from "v3atlassianops@vitechinc.com" \
              --destination "ToAddresses=v3atlassianops@vitechinc.com" \
              --message "Subject={Data='[${ENVIRONMENT}] Confluence Node Successfully Patched - ${INSTANCE_ID} (${INSTANCE_PRIVATE_IP})'},Body={Html={Data=${EMAIL_BODY}}}"
              echo "Email sent via SES for $INSTANCE_ID"
              echo "========================================================="
            else
              echo "Error: Instance $INSTANCE_ID is NOT healthy. Sending notification."
              aws sns publish \
                --topic-arn ${{ env.SNS_TOPIC }} \
                --subject "${{ env.SUBJECT_PREFIX }} Failed on Node $INSTANCE_PRIVATE_IP" \
                --message "Patching of instance $INSTANCE_ID ($INSTANCE_PRIVATE_IP) failed. Please investigate."
              PATCH_SUCCESS=false  
              break  
            fi
          done
      
          # Stop further patching if any instance failed
          if [[ "$PATCH_SUCCESS" == "false" ]]; then
            echo "Instances $INSTANCE_ID ($INSTANCE_PRIVATE_IP) failed the patching process. Exiting workflow."
            exit 1
          fi
          
      - name: Set Auto Scaling Group to 2-2
        run: |
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${{ env.ASG_NAME }}" \
            --min-size 2 

      - name: Check URL Status Code
        id: check_status
        run: |
          STATUS_CODE=$(curl --write-out "%{http_code}" --silent --output /dev/null "${{ env.URL }}/status")
          echo "URL Status Code: $STATUS_CODE"
          if [[ "$STATUS_CODE" -eq 200 ]]; then
            echo "URL is up and running with status code 200"
            echo "status_code=200" >> $GITHUB_ENV
          else
            echo "Error: URL did not return status code 200. Status Code: $STATUS_CODE"
            echo "status_code=$STATUS_CODE" >> $GITHUB_ENV
            
            aws sns publish \
              --topic-arn ${{ env.SNS_TOPIC }} \
              --subject "${{ github.event.inputs.environment }} App Down Alert - Status Code: $STATUS_CODE" \
              --message "The app at ${{ env.URL }} is down. Status code: $STATUS_CODE. Please investigate."
            exit 3

          fi
         
      - name: Send post-patching notification via SNS
        if: env.status_code == '200'
        run: |
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-name "${{ env.ASG_NAME }}" \
            --query 'AutoScalingGroups[0].Instances[*].InstanceId' \
            --output text)
          aws sns publish \
            --topic-arn ${{ env.SNS_TOPIC }} \
            --subject "Rolling ${{ env.SUBJECT_PREFIX }} Completed" \
            --message "$(printf "${{ env.BODY_PREFIX }} The patching has been completed successfully ${{ env.URL }}.Please reach out to v3atlassianops@vitechinc.com for any issues.\n\n **Instance IDs:**\n%s\n" "$INSTANCE_IDS")"
