name: List Org Repos and Permissions

on:
  workflow_dispatch:  # Trigger manually

jobs:
  list-org-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Create repos.txt
        env:
          GH_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
          ORG_NAME: vitechsystems
        run: |
          echo "Fetching repositories for organization: $ORG_NAME"
          page=1
          per_page=100
          has_more=true
          > repos.txt

          while $has_more; do
            echo "Fetching page $page..."
            RESPONSE=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/orgs/$ORG_NAME/repos?per_page=$per_page&page=$page")

            if echo "$RESPONSE" | jq -e 'type == "array"' > /dev/null; then
              COUNT=$(echo "$RESPONSE" | jq 'length')
              if [ "$COUNT" -eq 0 ]; then
                has_more=false
              else
                echo "$RESPONSE" | jq -r \
                  '.[] | "\(.full_name) - Admin: \(.permissions.admin) | Push: \(.permissions.push) | Pull: \(.permissions.pull)"' \
                  >> repos.txt
                page=$((page + 1))
              fi
            else
              echo "Unexpected response:"
              echo "$RESPONSE"
              exit 1
            fi
          done

          echo "✅ Saved to repos.txt"
          cat repos.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: org-repo-list
          path: repos.txt
