name: List Org Repo Access

on:
  workflow_dispatch:

jobs:
  list-access:
    runs-on: ubuntu-latest
    steps:
      - name: Setup
        env:
          GH_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
          ORG: vitechsystems
        run: |
          echo "🔍 Starting repo access audit for organization: $ORG"
          > repo-access.txt

          # Get list of all repos
          echo "📦 Fetching all repositories..."
          page=1
          per_page=100
          has_more=true

          while $has_more; do
            REPOS=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/orgs/$ORG/repos?per_page=$per_page&page=$page")

            COUNT=$(echo "$REPOS" | jq 'length')
            if [ "$COUNT" -eq 0 ]; then
              has_more=false
            else
              echo "$REPOS" | jq -r '.[].name' | while read repo; do
                echo "🔹 Repo: $ORG/$repo" >> repo-access.txt
                echo "  Teams:" >> repo-access.txt
                TEAMS=$(curl -s -H "Authorization: token $GH_TOKEN" \
                  "https://api.github.com/repos/$ORG/$repo/teams")

                echo "$TEAMS" | jq -r '.[] | "    - \(.name): \(.permission)"' >> repo-access.txt || echo "    (no team access)" >> repo-access.txt

                echo "  Collaborators:" >> repo-access.txt
                COLLABS=$(curl -s -H "Authorization: token $GH_TOKEN" \
                  "https://api.github.com/repos/$ORG/$repo/collaborators?affiliation=all")

                echo "$COLLABS" | jq -r '.[] | "    - \(.login): \(.permissions | to_entries[] | select(.value == true) | .key)"' >> repo-access.txt || echo "    (no collaborators)" >> repo-access.txt

                echo "" >> repo-access.txt
              done
              page=$((page + 1))
            fi
          done

          echo "✅ Completed. Output written to repo-access.txt"
          cat repo-access.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-access
          path: repo-access.txt
