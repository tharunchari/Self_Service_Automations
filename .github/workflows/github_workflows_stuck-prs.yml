name: Stuck PRs Email Report (Self-Hosted, Robust, Universal Trigger)

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    outputs:
      should_proceed: ${{ steps.check.outputs.should_proceed }}
    steps:
      - id: check
        run: |
          # Always proceed for both manual and scheduled runs.
          echo "should_proceed=true" >> $GITHUB_OUTPUT

  start-runner:
    needs: check-schedule
    if: needs.check-schedule.outputs.should_proceed == 'true'
    uses: vitechsystems/Internal-Tools_sub_workflows/.github/workflows/start_runner.yml@main
    with:
      runner_name: "Internal_Tools_Automation_Server"
    secrets: inherit

  execute-job:
    needs: [check-schedule, start-runner]
    if: needs.check-schedule.outputs.should_proceed == 'true'
    runs-on: [self-hosted, Internal_Tools_Automation_Server]
    env:
      ORG_NAME: vitechsystems
      SES_FROM: v3atlassianops@vitechinc.com
      SES_TO: v3atlassianops@vitechinc.com
      SES_SUBJECT: 'Vitechsystems Org PRs Detected With Stuck Status Checks'
    steps:
      - name: Install jq and gh (Amazon Linux)
        run: |
          # Install jq from default repo
          if ! command -v jq > /dev/null 2>&1; then
            sudo yum install -y jq
          fi

          # Install gh (GitHub CLI) if not present
          if ! command -v gh > /dev/null 2>&1; then
            # For Amazon Linux 2 and AL2023
            ARCH=$(uname -m)
            GH_VERSION="2.48.0"
            if [ "$ARCH" = "x86_64" ]; then
              GH_ARCH="amd64"
            elif [ "$ARCH" = "aarch64" ]; then
              GH_ARCH="arm64"
            else
              echo "Unknown architecture $ARCH for gh CLI, exiting."
              exit 1
            fi

            curl -LO https://github.com/cli/cli/releases/download/v$GH_VERSION/gh_${GH_VERSION}_linux_${GH_ARCH}.rpm
            sudo yum localinstall -y gh_${GH_VERSION}_linux_${GH_ARCH}.rpm
            rm -f gh_${GH_VERSION}_linux_${GH_ARCH}.rpm
          fi

          jq --version
          gh --version

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get all repos in org
        env:
          GH_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          gh repo list "$ORG_NAME" --limit 1000 --json name -q '.[] | .name' > repos.txt
          echo "Repositories collected for org $ORG_NAME:"
          cat repos.txt

      - name: Check PRs and build report (retry, robust reviewers, debug)
        env:
          GH_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          set -e

          retry_gh() {
            local n=0
            local max=5
            local delay=10
            while [ $n -lt $max ]; do
              "$@" && break || {
                n=$((n+1))
                echo "Command failed. Attempt $n/$max:"
                sleep $delay;
              }
            done
            if [ $n -eq $max ]; then
              echo "Command failed after $max attempts."
              return 1
            fi
          }

          NOW=$(date -u +%s)
          DELIM=$'\x1e'
          declare -a STUCK_PRS
          AGE_LIMIT=$((90 * 60))

          while read repo; do
            echo "==== Checking repository: $repo ===="

            prs=""
            if ! prs=$(retry_gh gh pr list --repo "$ORG_NAME/$repo" --state open --json number,createdAt,title); then
              echo "::warning:: Could not fetch PR list for $repo"
              continue
            fi
            echo "---- Raw gh pr list output ----"
            echo "$prs"
            if [ -z "$prs" ] || ! jq empty <<< "$prs" > /dev/null 2>&1; then
              echo "::warning:: Not valid JSON from gh pr list for $repo"
              continue
            fi
            pr_count=$(jq 'length' <<< "$prs")
            for i in $(seq 0 $((pr_count - 1))); do
              pr=$(jq ".[$i]" <<< "$prs")
              number=$(jq -r '.number' <<< "$pr")
              title=$(jq -r '.title' <<< "$pr")
              created=$(jq -r '.createdAt' <<< "$pr")
              created_ts=$(date -d "$created" +%s)
              age_secs=$(( NOW - created_ts ))
              pr_url="https://github.com/$ORG_NAME/$repo/pull/$number"

              echo "PR #$number created at $created ($created_ts), age: $age_secs seconds"

              if [ $age_secs -lt $AGE_LIMIT ]; then
                echo "PR #$number is not old enough (age $age_secs < $AGE_LIMIT), skipping."
                continue
              fi

              pr_json=""
              if ! pr_json=$(retry_gh gh pr view $number --repo "$ORG_NAME/$repo" --json number,title,author,createdAt,state,reviewRequests,commits); then
                echo "::warning:: Could not fetch PR view for $repo PR #$number"
                continue
              fi
              echo "---- Raw gh pr view output for PR #$number ----"
              echo "$pr_json"
              if [ -z "$pr_json" ] || ! jq empty <<< "$pr_json" > /dev/null 2>&1; then
                echo "::warning:: Not valid JSON from gh pr view for $repo PR #$number"
                continue
              fi

              author=$(jq -r '.author.login // "unknown"' <<< "$pr_json")
              state=$(jq -r '.state' <<< "$pr_json")
              reviewers=$(jq -r 'if has("reviewRequests") then (try [.reviewRequests.nodes[].requestedReviewer.login // .reviewRequests.nodes[].requestedReviewer.name // ""] | map(select(length > 0)) | join(", ")) else "" end' <<< "$pr_json")
              pending_names=$(jq -r '
                try .commits[-1].commit.statusCheckRollup // []
                | map(select(.state == "PENDING") | .name)
                | join(", ")
              ' <<< "$pr_json")

              if [ -z "$pending_names" ]; then
                echo "PR #$number has no pending checks (besides approval), skipping."
                continue
              fi

              echo "PR #$number pending checks: $pending_names"

              STUCK_PRS+=( "${repo}${DELIM}${number}${DELIM}${pr_url}${DELIM}${title}${DELIM}${author}${DELIM}${created}${DELIM}${pending_names}${DELIM}${state}${DELIM}${reviewers}" )
            done
          done < repos.txt

          {
            echo "<html>"
            echo "<head>"
            echo "  <style>"
            echo "    body { background: #f4f6fb; color: #222; font-family: 'Segoe UI', Arial, sans-serif; }"
            echo "    table { border-collapse: separate; border-spacing: 0; width: 100%; margin-top: 16px; }"
            echo "    th, td { border: 1px solid #e1e4ea; padding: 12px 10px; }"
            echo "    th { background: linear-gradient(90deg, #4f8cff 0%, #3f51b5 100%); color: #fff; font-weight: bold; }"
            echo "    tr:nth-child(even) { background: #e3eafc; }"
            echo "    tr:nth-child(odd) { background: #f4f6fb; }"
            echo "    td { font-size: 15px; }"
            echo "  </style>"
            echo "</head>"
            echo "<body>"
            echo "<p>The following PRs were detected as stuck (open over 1.5 hours with pending status checks):</p>"
            echo "<table>"
            echo "  <tr>"
            echo "    <th>Repo Name</th>"
            echo "    <th>PR</th>"
            echo "    <th>Title</th>"
            echo "    <th>Author</th>"
            echo "    <th>Created At</th>"
            echo "    <th>Pending Checks</th>"
            echo "    <th>Status</th>"
            echo "    <th>Requested Reviewers</th>"
            echo "  </tr>"
            for pr in "${STUCK_PRS[@]}"; do
              IFS="$DELIM" read -r repo number pr_url title author created pending_names state reviewers <<< "$pr"
              echo "  <tr>"
              echo "    <td>${repo}</td>"
              echo "    <td><a href=\"${pr_url}\">#${number}</a></td>"
              echo "    <td>${title}</td>"
              echo "    <td>${author}</td>"
              echo "    <td>${created}</td>"
              echo "    <td>${pending_names}</td>"
              echo "    <td>${state}</td>"
              echo "    <td>${reviewers}</td>"
              echo "  </tr>"
            done
            echo "</table></body></html>"
          } > email_body.html

          EMAIL_BODY=$(cat email_body.html)

          if [ ${#STUCK_PRS[@]} -gt 0 ]; then
            aws ses send-email \
              --from "$SES_FROM" \
              --destination "ToAddresses=$SES_TO" \
              --message "Subject={Data='$SES_SUBJECT'},Body={Html={Data=\"$EMAIL_BODY\"}}"
            echo "Email sent via SES for stuck PRs"
          else
            echo "No stuck PRs found, no email sent."
          fi

  stop-runner:
    needs: [execute-job]
    if: always()
    uses: vitechsystems/Internal-Tools_sub_workflows/.github/workflows/stop_runner.yml@main
    with:
      runner_name: "Internal_Tools_Automation_Server"
    secrets: inherit
