name: Open PRs >1hr Status Report (Stable Table)

on:
  workflow_dispatch:

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    outputs:
      should_proceed: ${{ steps.check.outputs.should_proceed }}
    steps:
      - id: check
        run: echo "should_proceed=true" >> $GITHUB_OUTPUT

  start-runner:
    needs: check-schedule
    if: needs.check-schedule.outputs.should_proceed == 'true'
    uses: vitechsystems/Internal-Tools_sub_workflows/.github/workflows/start_runner.yml@main
    with:
      runner_name: "Internal_Tools_Automation_Server"
    secrets: inherit

  pr-status-report:
    needs: [check-schedule, start-runner]
    if: needs.check-schedule.outputs.should_proceed == 'true'
    runs-on: [self-hosted, Internal_Tools_Automation_Server]
    env:
      ORG_NAME: vitechsystems
      SES_FROM: v3atlassianops@vitechinc.com
      SES_TO: v3atlassianops@vitechinc.com
      SES_SUBJECT: 'Vitechsystems Org Open PRs >1hr Status Report'
      GH_TOKEN: PROD_FINE_GRAINED_PAT # Use the standard runner token for all GH CLI usage
    steps:
      - name: Install jq and gh
        run: |
          set -euo pipefail
          if ! command -v jq > /dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y jq || sudo yum install -y jq
          fi
          if ! command -v gh > /dev/null 2>&1; then
            ARCH=$(uname -m)
            GH_VERSION="2.48.0"
            GH_ARCH="amd64"; [ "$ARCH" = "aarch64" ] && GH_ARCH="arm64"
            if command -v yum > /dev/null 2>&1; then
              curl -LO https://github.com/cli/cli/releases/download/v$GH_VERSION/gh_${GH_VERSION}_linux_${GH_ARCH}.rpm
              sudo yum localinstall -y gh_${GH_VERSION}_linux_${GH_ARCH}.rpm
              rm -f gh_${GH_VERSION}_linux_${GH_ARCH}.rpm
            else
              curl -LO https://github.com/cli/cli/releases/download/v$GH_VERSION/gh_${GH_VERSION}_linux_${GH_ARCH}.deb
              sudo dpkg -i gh_${GH_VERSION}_linux_${GH_ARCH}.deb
              rm -f gh_${GH_VERSION}_linux_${GH_ARCH}.deb
            fi
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.CORP_CLD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CORP_CLD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get all repos in org
        run: |
          set -euo pipefail
          gh repo list "$ORG_NAME" --limit 1000 --json name -q '.[] | .name' > repos.txt

      - name: Check PRs and build status report
        run: |
          set -xo pipefail
          trap 'echo "ERROR: Job failed at line $LINENO"; exit 1' ERR

          NOW=$(date -u +%s)
          DELIM=$'\x1e'
          declare -a PRS_STATUS
          AGE_LIMIT=$((60 * 60)) # 1 hour

          while read repo; do
            echo "Processing repo: $repo"
            prs=$(gh pr list --repo "$ORG_NAME/$repo" --state open --json number,createdAt,title 2>&1)
            if ! jq empty <<< "$prs" > /dev/null 2>&1; then
              echo "WARNING: Failed to parse PR list for $repo"
              continue
            fi
            pr_count=$(jq 'length' <<< "$prs")
            for i in $(seq 0 $((pr_count - 1))); do
              pr=$(jq ".[$i]" <<< "$prs")
              number=$(jq -r '.number // empty' <<< "$pr")
              title=$(jq -r '.title // empty' <<< "$pr")
              created=$(jq -r '.createdAt // empty' <<< "$pr")
              if [ -z "$created" ] || [ -z "$number" ]; then
                echo "WARNING: Missing created date or PR number for $repo PR index $i"
                continue
              fi
              created_ts=$(date -d "$created" +%s 2>/dev/null || echo 0)
              if [ "$created_ts" -eq 0 ]; then
                echo "WARNING: Failed to parse date '$created' for $repo PR #$number"
                continue
              fi
              age_secs=$(( NOW - created_ts ))
              pr_url="https://github.com/$ORG_NAME/$repo/pull/$number"

              if [ $age_secs -lt $AGE_LIMIT ]; then
                continue
              fi

              # Get latest commit SHA
              pr_commits=$(gh pr view "$number" --repo "$ORG_NAME/$repo" --json commits 2>&1)
              commit_sha=$(jq -r '.commits[-1].oid // empty' <<< "$pr_commits" || echo "")
              if [ -z "$commit_sha" ]; then
                echo "WARNING: No commit SHA found for $repo PR #$number"
                continue
              fi

              # Get PR review status and checks
              pr_details=$(gh pr view "$number" --repo "$ORG_NAME/$repo" --json state,reviewDecision,reviewRequests,author,mergeable,mergeStateStatus 2>&1)
              if ! jq empty <<< "$pr_details" > /dev/null 2>&1; then
                echo "WARNING: Failed to get PR details for $repo PR #$number"
                review_label="Unknown"
                merge_state="Unknown"
              else
                review_status=$(jq -r '.reviewDecision // "unknown"' <<< "$pr_details")
                merge_state=$(jq -r '.mergeStateStatus // "unknown"' <<< "$pr_details")

                if [ "$review_status" = "REVIEW_REQUIRED" ]; then
                  review_label="Review required"
                elif [ "$review_status" = "APPROVED" ]; then
                  review_label="Approved"
                elif [ "$review_status" = "CHANGES_REQUESTED" ]; then
                  review_label="Changes requested"
                else
                  review_label="Unknown"
                fi
              fi

              # Get check runs (robust version)
              checks_json=$(gh api repos/$ORG_NAME/$repo/commits/$commit_sha/check-runs -H "Accept: application/vnd.github.v3+json" 2>&1)
              if echo "$checks_json" | grep -q "Resource not accessible by personal access token"; then
                echo "WARNING: Checks API not accessible for $repo PR #$number"
                pending_names="Checks unavailable"
                all_checks="Checks unavailable"
                checks_icon="❓"
              elif ! jq empty <<< "$checks_json" > /dev/null 2>&1; then
                echo "WARNING: Invalid JSON from checks API for $repo PR #$number"
                pending_names="Checks unavailable"
                all_checks="Checks unavailable"
                checks_icon="❓"
              else
                total_checks=$(jq '.check_runs | length' <<< "$checks_json")
                pending_checks=$(jq '[.check_runs[] | select(.status == "queued" or .status == "in_progress")] | length' <<< "$checks_json")
                failed_checks=$(jq '[.check_runs[] | select(.conclusion == "failure")] | length' <<< "$checks_json")
                passed_checks=$(jq '[.check_runs[] | select(.conclusion == "success")] | length' <<< "$checks_json")
                all_checks=$(jq -r '[.check_runs[].name] | join(", ")' <<< "$checks_json")
                pending_names=$(jq -r '[.check_runs[] | select(.status == "queued" or .status == "in_progress") | .name] | join(", ")' <<< "$checks_json")
                if [ "$pending_checks" -gt 0 ]; then
                  checks_icon="⏳"
                elif [ "$failed_checks" -gt 0 ]; then
                  checks_icon="❌"
                elif [ "$passed_checks" -eq "$total_checks" ] && [ "$total_checks" -gt 0 ]; then
                  checks_icon="✅"
                else
                  checks_icon="❓"
                fi
              fi

              PRS_STATUS+=( "${repo}${DELIM}${number}${DELIM}${pr_url}${DELIM}${title}${DELIM}${review_label}${DELIM}${merge_state}${DELIM}${checks_icon}${DELIM}${pending_names}" )
            done
          done < repos.txt

          {
            echo "<html><head><style>"
            echo "body { font-family: sans-serif; background: #f4f6fb; }"
            echo "table { border-collapse: collapse; width: 100%; }"
            echo "th, td { border: 1px solid #ccc; padding: 10px; }"
            echo "th { background: #3f51b5; color: white; }"
            echo "tr:nth-child(even) { background: #e9eaf6; }"
            echo "</style></head><body>"
            echo "<p>The following PRs are open >1 hour. Status icons: ⏳=pending, ✅=all passed, ❌=failed, ❓=unknown/unavailable</p>"
            echo "<table><tr><th>Repo</th><th>PR #</th><th>Title</th><th>Review Status</th><th>Merging</th><th>Checks</th><th>Pending Checks</th></tr>"
            for pr in "${PRS_STATUS[@]}"; do
              IFS="$DELIM" read -r repo number pr_url title review_label merge_state checks_icon pending_names <<< "$pr"
              echo "<tr>"
              echo "<td>$repo</td>"
              echo "<td><a href=\"$pr_url\">#$number</a></td>"
              echo "<td>$title</td>"
              echo "<td>$review_label</td>"
              echo "<td>$merge_state</td>"
              echo "<td style=\"text-align:center;font-size:1.5em;\">$checks_icon</td>"
              echo "<td>$pending_names</td>"
              echo "</tr>"
            done
            echo "</table></body></html>"
          } > email_body.html

          if [ ${#PRS_STATUS[@]} -gt 0 ]; then
            aws ses send-email \
              --from "$SES_FROM" \
              --destination "ToAddresses=$SES_TO" \
              --message "Subject={Data='$SES_SUBJECT'},Body={Html={Data=\"$(cat email_body.html)\"}}"
            echo "Email sent via SES for open PRs >1hr"
          else
            echo "No open PRs >1hr found. Email not sent."
          fi

  stop-runner:
    needs: [pr-status-report]
    if: always()
    uses: vitechsystems/Internal-Tools_sub_workflows/.github/workflows/stop_runner.yml@main
    with:
      runner_name: "Internal_Tools_Automation_Server"
    secrets: inherit
