name: Use GitHub Secret in Python
 
on:
  push:
    branches:
      - main  # or your working branch
 
jobs:
  use-secret:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Run Python script using secret
        run: python3 script.py
        env:
          MY_SECRET: ${{ secrets.SECRET_CODE_GITHUB }}
