name: Print GitHub Secret in Python
 
on:
  push:
    branches:
      - main  # Or your working branch
 
jobs:
  print-secret:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Run Python script with secret
        run: python3 script.py
        env:
          SECRET_CODE_GITHUB: ${{ secrets.SECRET_CODE_GITHUB }}
