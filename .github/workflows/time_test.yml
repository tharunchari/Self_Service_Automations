name: Time Test
on:
  workflow_dispatch:
  schedule:
    - cron: "50 13 * * 1"  # Runs every Saturday at 03:00 AM UTC (10:00 PM EST Of FRIDAY)
 
env:
  RUNNER_NAME: "Internal_Tools_Automation_Server"
  INSTANCE_ID: "i-020530b54ac86537b"
 
jobs:
  run_on_last_saturday: 
    if: github.event_name == 'schedule'  # Only runs for scheduled trigger 
    uses: vitechsystems/github-runner-testing/.github/workflows/time_test.yml@main 
    with: 
      run_type: 2nd_last_saturday 
    secrets: inherit 
 
  start-runner: 
    # Run directly for workflow_dispatch, or after run_on_last_saturday with success condition 
    if: | 
      github.event_name == 'workflow_dispatch' ||  
      (github.event_name == 'schedule' && needs.run_on_last_saturday.outputs.should_proceed == 'true') 
    needs: [run_on_last_saturday]  # Still dependent, but conditional logic handles skipping 
    uses: vitechsystems/service_workflows/.github/workflows/start_runner.yml@main 
    secrets: inherit
