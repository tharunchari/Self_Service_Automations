name: Time Test
on:
  workflow_dispatch:
  schedule:
    - cron: "50 13 * * 1"  # Runs every Saturday at 03:00 AM UTC (10:00 PM EST Of FRIDAY)
 
env:
  RUNNER_NAME: "Internal_Tools_Automation_Server"
  INSTANCE_ID: "i-020530b54ac86537b"
 
jobs:
  run_on_last_saturday:
    # Only run this job if triggered manually (workflow_dispatch)
    if: ${{ github.event_name == 'workflow_dispatch' }}
    uses: vitechsystems/github-runner-testing/.github/workflows/time_test.yml@main
    with:
      run_type: 2nd_last_saturday
    secrets: inherit
 
  start-runner:
    # Always list the dependency, but control execution with 'if'
    needs: run_on_last_saturday
    # Run unconditionally for schedule, or after success for workflow_dispatch
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && success()) }}
    uses: vitechsystems/service_workflows/.github/workflows/start_runner.yml@main
    secrets: inherit
