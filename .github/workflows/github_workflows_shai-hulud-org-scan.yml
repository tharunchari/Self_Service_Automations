name: Shai-Hulud NPM Supply Chain IoC Scanner (Multi-Org, Org-Specific PATs, API-Only)

on:
  workflow_dispatch:

jobs:
  scan-multi-org-npm-ioc:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout scanning repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: Debug tool versions
        run: |
          gh --version
          jq --version

      - name: Use wiz_results.txt as IoC list
        run: |
          cp wiz_results.txt ioc_packages.txt

      - name: Scan all orgs and all branches of all repos with org-specific PATs (API-only)
        env:
          PROD_FINE_GRAINED_PAT: ${{ secrets.PROD_FINE_GRAINED_PAT }}
          QA_FINE_GRAINED_PAT: ${{ secrets.QA_FINE_GRAINED_PAT }}
          INFRA_FINE_GRAINED_PAT: ${{ secrets.INFRA_FINE_GRAINED_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ORGS="vitechsystems VitechQA VitechInfra VitechOps"
          mkdir -p results

          get_pat_for_org() {
            case "$1" in
              vitechsystems)
                echo "$PROD_FINE_GRAINED_PAT"
                ;;
              VitechQA)
                echo "$QA_FINE_GRAINED_PAT"
                ;;
              VitechInfra)
                echo "$INFRA_FINE_GRAINED_PAT"
                ;;
              *)
                echo "${GITHUB_TOKEN:-}"
                ;;
            esac
          }

          # Regexes for IoC detection
          IOCs='@ctrl/tinycolor:4\.1\.[012]|@ctrl/deluge:1\.2\.0|angulartics2:14\.1\.2|koa2-swagger-ui:5\.11\.[12]'
          IOCs_LOCK='@ctrl/tinycolor@4\.1\.[012]|@ctrl/deluge@1\.2\.0|angulartics2@14\.1\.2|koa2-swagger-ui@5\.11\.[12]'
          SUSP_DOMAINS='webhook\.site|npmjs\.help'
          SUSP_WALLET='0xFc4a4858bafef54D1b1d7697bfb5c52F4c166976|javascript-obfuscator'
          SUSP_POSTINSTALL='curl|wget|node -e|eval'
          SUSP_TRUFFLEHOG='trufflehog'

          for ORG in $ORGS; do
            echo "== Scanning organization: $ORG =="
            GH_TOKEN="$(get_pat_for_org "$ORG")"
            if [[ -z "$GH_TOKEN" ]]; then
              echo "[WARN] No token for $ORG, skipping organization."
              continue
            fi
            export GH_TOKEN

            if ! gh repo list "$ORG" --limit 1000 --json name,description -q '.[] | .name + "|" + (.description // "")' > "${ORG}_repos_and_desc.txt"; then
              echo "[WARN] gh repo list failed for org: $ORG. Skipping organization."
              continue
            fi

            cut -d"|" -f1 "${ORG}_repos_and_desc.txt" | grep -v '^$' > "${ORG}_repos.txt"

            # Org-wide repo name/desc checks
            while IFS='|' read -r repo desc; do
              [ -z "$repo" ] && continue
              if [[ "$repo" =~ [Ss]hai[-]?Hulud ]]; then
                echo "!!! Repo $ORG/$repo flagged: name contains Shai-Hulud" >> results/${ORG}__org-wide-repo-check.txt
              fi
              if [[ "$repo" =~ -migration$ ]] && [[ "$desc" == *Shai-Hulud*Migration* ]]; then
                echo "!!! Repo $ORG/$repo flagged: migration repo with Shai-Hulud description" >> results/${ORG}__org-wide-repo-check.txt
              fi
            done < "${ORG}_repos_and_desc.txt"

            while IFS= read -r repo; do
              [ -z "$repo" ] && continue
              echo "Scanning repo: $ORG/$repo"
              gh api "repos/$ORG/$repo/branches" --paginate | jq -r '.[].name' | grep -v '^$' > branches.txt

              while IFS= read -r branch; do
                [ -z "$branch" ] && continue
                echo "  Scanning branch: $branch"
                SAFE_REPO=$(echo "$repo" | tr '/' '_')
                SAFE_BRANCH=$(echo "$branch" | tr '/' '_')
                RESULT_FILE="results/${ORG}__${SAFE_REPO}__${SAFE_BRANCH}.txt"
                echo "## Results for $ORG/$repo@$branch" > "$RESULT_FILE"
                FOUND=0

                # 1. Check package.json for IoCs
                if gh api repos/$ORG/$repo/contents/package.json?ref=$branch --jq .content 2>/dev/null | base64 -d > pkg.json 2>/dev/null; then
                  jq -r '.dependencies,.devDependencies,.peerDependencies // {} | to_entries[] | "\(.key):\(.value)"' pkg.json > deps.txt || true
                  if grep -E "$IOCs" deps.txt; then
                    echo "!!! Compromised NPM package found in package.json" >> "$RESULT_FILE"
                    FOUND=1
                  fi
                  if grep -A 3 '"postinstall"' pkg.json | grep -E "$SUSP_POSTINSTALL"; then
                    echo "!!! Suspicious postinstall script found" >> "$RESULT_FILE"
                    FOUND=1
                  fi
                fi

                # 2. Check lock files for IoCs
                for lockf in package-lock.json yarn.lock pnpm-lock.yaml; do
                  if gh api repos/$ORG/$repo/contents/$lockf?ref=$branch --jq .content 2>/dev/null | base64 -d > lockfile 2>/dev/null; then
                    if grep -E "$IOCs_LOCK" lockfile; then
                      echo "!!! Compromised NPM package found in lock file ($lockf)" >> "$RESULT_FILE"
                      FOUND=1
                    fi
                  fi
                done

                # 3. Check workflow files for suspicious content
                if gh api repos/$ORG/$repo/contents/.github/workflows?ref=$branch --jq '.[] | select(.type=="file") | .name' 2>/dev/null | grep -E '\.ya?ml$' > workflows.txt 2>/dev/null; then
                  while read wfile; do
                    if gh api repos/$ORG/$repo/contents/.github/workflows/$wfile?ref=$branch --jq .content 2>/dev/null | base64 -d > wf.yml 2>/dev/null; then
                      if grep -E "$SUSP_DOMAINS" wf.yml; then
                        echo "!!! Suspicious domain found in workflow file $wfile" >> "$RESULT_FILE"
                        FOUND=1
                      fi
                      if grep -E "$SUSP_WALLET" wf.yml; then
                        echo "!!! Suspect wallet or obfuscation detected in workflow $wfile" >> "$RESULT_FILE"
                        FOUND=1
                      fi
                      if grep -E "$SUSP_TRUFFLEHOG" wf.yml; then
                        echo "!!! Trufflehog/secret scanning activity detected in workflow $wfile" >> "$RESULT_FILE"
                        FOUND=1
                      fi
                    fi
                  done < workflows.txt
                fi

                # 4. Check for suspicious data.json (top-level)
                if gh api repos/$ORG/$repo/contents/data.json?ref=$branch --jq .content 2>/dev/null | base64 -d > dt.json 2>/dev/null; then
                  if head -c 100 dt.json | grep -Eq '^[A-Za-z0-9+/=]{20,}$'; then
                    echo "!!! data.json found, contents look like base64. Possible exfiltrated secrets." >> "$RESULT_FILE"
                    FOUND=1
                  fi
                fi

                # Always write a summary if nothing found
                if [ $FOUND -eq 0 ]; then
                  echo "No Shai-Hulud IoCs or suspicious activity found in this branch (API-only scan)." >> "$RESULT_FILE"
                fi
                rm -f pkg.json deps.txt lockfile workflows.txt wf.yml dt.json
              done < branches.txt
            done < "${ORG}_repos.txt"
          done

      - name: Upload scan results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: shai-hulud-scan-results
          path: results/

      - name: Clean working directory
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          rm -rf *
