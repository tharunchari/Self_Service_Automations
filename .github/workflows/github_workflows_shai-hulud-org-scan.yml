name: Shai-Hulud NPM IoC Scanner (API Only, Fast, Top-Level Files)

on:
  workflow_dispatch:

jobs:
  scan-org-npm-ioc-api-only:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: Prepare IoC list
        run: cp wiz_results.txt ioc_packages.txt

      - name: Fast API-only scan
        env:
          GH_TOKEN: ${{ secrets.PROD_FINE_GRAINED_PAT }}
        run: |
          set -euo pipefail
          ORG="vitechsystems"
          mkdir -p results
          MALICIOUS_HASHES="46faab8ab153fae6e80e7cca38eab363075bb524edd79e42269217a083628f09"

          # List repos
          gh repo list "$ORG" --limit 1000 --json name -q '.[].name' > repos.txt

          # For each repo...
          while read repo; do
            echo "Scanning repo: $repo"
            gh api repos/$ORG/$repo/branches --paginate | jq -r '.[].name' > branches.txt

            while read branch; do
              echo "  Scanning branch: $branch"
              SAFE_BRANCH=$(echo "$branch" | tr '/' '_')
              RESULT_FILE="results/${repo}__${SAFE_BRANCH}_api.txt"
              echo "## Results for $repo@$branch" > "$RESULT_FILE"
              FOUND=0

              # 1. Top-level package.json
              if gh api repos/$ORG/$repo/contents/package.json?ref=$branch --jq .content 2>/dev/null | base64 -d > pkg.json 2>/dev/null; then
                jq -r '.dependencies,.devDependencies,.peerDependencies // {} | to_entries[] | "\(.key),\(.value)"' pkg.json > deps.txt
                while IFS=, read -r pkg ver; do
                  if grep -q "^$pkg,$ver$" deps.txt; then
                    echo "!!! Compromised NPM package found: $pkg,$ver" >> "$RESULT_FILE"
                    FOUND=1
                  fi
                done < ioc_packages.txt
                # Suspicious postinstall
                if grep -A 3 '"postinstall"' pkg.json | grep -E 'curl|wget|node -e|eval'; then
                  echo "!!! Suspicious postinstall script found" >> "$RESULT_FILE"
                  FOUND=1
                fi
              fi
              # 2. package-lock.json, yarn.lock, pnpm-lock.yaml
              for lockf in package-lock.json yarn.lock pnpm-lock.yaml; do
                if gh api repos/$ORG/$repo/contents/$lockf?ref=$branch --jq .content 2>/dev/null | base64 -d > lockfile 2>/dev/null; then
                  while IFS=, read -r pkg ver; do
                    if grep -q "$pkg.*$ver" lockfile; then
                      echo "!!! Compromised NPM package found in lock file: $pkg,$ver" >> "$RESULT_FILE"
                      FOUND=1
                    fi
                  done < ioc_packages.txt
                fi
              done
              # 3. .github/workflows/*.yml and .yaml (API only - list dir + get files)
              if gh api repos/$ORG/$repo/contents/.github/workflows?ref=$branch --jq '.[] | select(.type=="file") | .name' 2>/dev/null | grep -E '\.ya?ml$' > workflows.txt 2>/dev/null; then
                while read wfile; do
                  if gh api repos/$ORG/$repo/contents/.github/workflows/$wfile?ref=$branch --jq .content 2>/dev/null | base64 -d > wf.yml 2>/dev/null; then
                    if grep -E 'shai-hulud|webhook\.site|npmjs\.help|0xFc4a4858bafef54D1b1d7697bfb5c52F4c166976|javascript-obfuscator|trufflehog' wf.yml; then
                      echo "!!! Suspicious content in workflow $wfile" >> "$RESULT_FILE"
                      FOUND=1
                    fi
                  fi
                done < workflows.txt
              fi
              # 4. Top-level data.json (possible exfil)
              if gh api repos/$ORG/$repo/contents/data.json?ref=$branch --jq .content 2>/dev/null | base64 -d > dt.json 2>/dev/null; then
                if head -c 100 dt.json | grep -Eq '^[A-Za-z0-9+/=]{20,}$'; then
                  echo "!!! data.json found, contents look like base64. Possible exfiltrated secrets." >> "$RESULT_FILE"
                  FOUND=1
                fi
              fi
              # Always write a summary if nothing found
              if [ $FOUND -eq 0 ]; then
                echo "No Shai-Hulud IoCs or suspicious activity found in this branch (API-only scan)." >> "$RESULT_FILE"
              fi
              rm -f pkg.json deps.txt lockfile workflows.txt wf.yml dt.json
            done < branches.txt
          done < repos.txt

      - name: Upload scan results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: shai-hulud-scan-results-api
          path: results/
