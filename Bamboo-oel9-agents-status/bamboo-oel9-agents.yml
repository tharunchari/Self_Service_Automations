---
- name: List, sort Bamboo offline agents, and send notification
  hosts: localhost
  gather_facts: false
  vars:
    ansible_python_interpreter: /usr/bin/python3  # Use system Python or other interpreter

  tasks:
    - name: Ensure boto3 and botocore are installed
      pip:
        name:
          - boto3
          - botocore
      tags: install_python_libraries

    - name: Get Bamboo offline agents list and sort
      shell: |
        curl -H "Authorization: Bearer {{ bamboo_password }}" https://bamboo.vitechinc.com/bamboo/rest/api/latest/agent?offline=true | \
        jq -r '.[] | select(.state == "Offline" and (.name | startswith("BAMBOO-OEL9") or startswith("VITECH"))) | {name: .name, state: .state}'
      register: bamboo_agents
      no_log: false
      tags: get_agents

    - name: Display Bamboo offline agents output
      debug:
        msg: "Offline Bamboo agents list: {{ bamboo_agents.stdout }}"
      tags: display_agents

    - name: Format Bamboo offline agents into table format
      set_fact:
        bamboo_table: |
          Index   Agent Name                Status
          ------  ------------------------- -------------------------
          {% for agent in bamboo_agents.stdout_lines %}
          {{ loop.index }}    {{ agent | from_json | json_query('name') }}      {{ agent | from_json | json_query('state') }}
          {% endfor %}
      tags: format_table

    - name: Display formatted Bamboo offline agents table
      debug:
        msg: "Formatted Bamboo offline agents table:\n{{ bamboo_table }}"
      tags: display_table

    - name: Send Email Notification via SNS for Offline Agents
      community.aws.sns:
        topic: "arn:aws:sns:us-east-1:389180911583:Testing"  # Replace with your SNS topic ARN
        subject: "Bamboo Offline Agents Notification"
        msg: |
          The following Bamboo agents are currently offline:
          {{ bamboo_table }}
      no_log: false  # Set no_log: false to allow logging of this task output
      tags: send_notification

    # Optional: Confirm notification sent (for debugging purposes)
    - name: Confirm Email Notification Sent
      debug:
        msg: "Notification sent to SNS with topic: arn:aws:sns:us-east-1:389180911583:Testing"
      tags: confirm_notification
