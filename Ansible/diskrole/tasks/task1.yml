---
# Task1-/root
# tasks file for diskrole

- name: Get root filesystem usage
  shell: df -hP / | tail -1
  register: disk_usage

- name: Get hostname
  command: hostname
  register: host_name

- debug: 
    msg: "{{ disk_usage }}"
    
- name: Extract disk usage percentage
  set_fact:
    root_used_percent: "{{ disk_usage.stdout.split()[4] | regex_replace('%','') }}"

- debug: 
    msg: "{{ root_used_percent }}"

  - mail:
    host: '{{ smtp_host }}'
    port: '{{ smtp_port }}'
    subject: 'Alert: {{ host_name.stdout }} - {{ inventory_hostname }} - Disk usage is high'
    body: "Disk usage alert for {{ inventory_hostname }} \n\n\n
           Host Name: {{ host_name.stdout }} \n
           Usage: {{ root_used_percent }}% \n\n\n
           Disk Space Usage Report:\n
           {{ disk_usage.stdout }}"
    from: '{{ from_mail }}'
    to: '{{ to_mail }}'
  when: disk.stdout >= root_usage
  ignore_errors: true
