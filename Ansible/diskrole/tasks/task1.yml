---
# Task1-/root
# tasks file for diskrole

- name: Get root filesystem usage
  shell: df -hP / | tail -1
  register: disk_usage

- name: Extract disk usage percentage
  set_fact:
    root_used_percent: "{{ disk_usage.stdout.split()[4] | regex_replace('%','') }}"

- name: Send disk usage alert via AWS SNS
  command: >
    aws sns publish
    --topic-arn {{ sns_topic_arn }}
    --subject "Alert: {{ host_name.stdout }} - {{ inventory_hostname }} - Disk usage is high"
    --message "{{ sns_message }}"
  vars:
    sns_message: |
      Disk usage alert for {{ inventory_hostname }}

      Host Name: {{ host_name.stdout }}
      Mount Point: {{ disk_usage.stdout.split()[5] }}
      Usage: {{ root_used_percent }}%

      Disk Space Usage Report:
      {{ disk_usage.stdout }}
  when: (root_used_percent | int) >= (root_usage | int)
  ignore_errors: true
