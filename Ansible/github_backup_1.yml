---
- hosts: Internal_Server
  gather_facts: yes
  tasks:
    - name: print starting date and time
      shell: date
      register: date_1

    - debug:
        msg: "{{ date_1.stdout }}"

    - shell: "{{ lookup('env',  'path_00') }}/github_repo_names.sh"
      register: script_output
      environment:
        TOKEN: "{{ lookup('env',  'github_password') }}"
        ORG_NAME: "{{ lookup('env',  'organization') }}"
      become: false
