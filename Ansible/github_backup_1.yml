---
- hosts: Internal_Server
  gather_facts: yes
  tasks:
    - name: print starting date and time
      shell: date
      register: date_1

    - debug:
        msg: "{{ date_1.stdout }}"

    - name: Make github_repo_names.sh executable
      file:
        path: "../shell_scripts/github_repo_names_both.sh"
        mode: '0755'
        state: file

    - shell: "../shell_scripts/github_repo_names.sh"
      register: script_output
      environment:
        token_1: "{{ github_password_1 }}" 
        token_2: "{{ github_password_2 }}" 
        org_name_1: "{{ organization_1 }}"
        org_name_2: "{{ organization_2 }}"
      become: false

    - name: Parse JSON output from repo comparison script
      set_fact:
        repo_data: "{{ script_output.stdout | from_json }}"
 
    - name: Print repos in {{ organization_1 }}
      debug:
        msg: "{{ repo_data.vitechsystems_repos }}"
 
    - name: Print repos in {{ organization_2 }}
      debug:
       msg: "{{ repo_data.vitechinfra_repos }}"
 
    - name: Print common repos (in both orgs)
      debug:
        msg: "{{ repo_data.common_repos }}"
 
    - name: Print unique repos in {{ organization_2 }} (not in {{ organization_1 }})
      debug:
        msg: "{{ repo_data.filtered_repos }}"

    - name: filtering Nextgen and CoreAdmin from list
      set_fact: 
        filtered_github_repos: "{{ repo_data.vitechsystems_repos | difference(['CoreAdmin', 'Nextgen']) }}"

    - debug:
        msg: "{{ filtered_github_repos }}"


