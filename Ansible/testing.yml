Request:

{
  "grantType": "PASSWORD",
  "username": "johndoe",
  "password": "s3cr3t!",
  "scope": "LOB"
}
Field	Required	Notes
grantType	✅	"PASSWORD" for direct login
username	✅	SecurityUsers.userName value
password	✅	Plain-text password (HTTPS only)
scope	✅	Application name — see scope table below
Scope values:

Value	Application
LOB	Line of Business (internal admin)
ESS	Employee Self-Service
MSS	Manager Self-Service
PSS	Producer Self-Service
MEMBER	Member portal
Response (200 OK):

{
  "token": "a4c2e7f0-1234-5678-abcd-ef0123456789",
  "tokenType": "BEARER",
  "refreshToken": "b7d3f8e1-abcd-ef01-2345-678901234567",
  "expiresIn": 30.0,
  "username": "johndoe",
  "individualId": "99001",
  "serverTimeZone": "America/New_York",
  "language": "en",
  "lastLoginDate": "2026-05-18T08:00:00.000+0000",
  "eulaRequired": false,
  "passwordResetRequired": false
}
Field	Notes
token	UUID — use as the Token header on all subsequent calls
tokenType	Always "BEARER"
refreshToken	UUID for session renewal
expiresIn	Session lifetime in minutes
eulaRequired	If true, EULA acceptance step is needed before using other endpoints
passwordResetRequired	If true, password must be changed before use
2. Using the Token
