---
- hosts: Internal_Server
  gather_facts: no
  vars:
    region: "us-west-2"
    path_00: "/u02/github_to_codecommit"
    sns_topic_arn: "arn:aws:sns:us-east-1:389180911583:VitechToolsNVAProd"
 
  tasks:
    - name: Make github_repo_names.sh executable
      file:
        path: "../shell_scripts/github_repo_names_both.sh"
        mode: '0755'
        state: file
 
    - name: Run script to fetch repos from both orgs
      shell: "../shell_scripts/github_repo_names_both.sh"
      register: script_output
      environment:
        token_1: "{{ github_password_1 }}" 
        token_2: "{{ github_password_2 }}" 
        org_name_1: "{{ organization_1 }}"   # vitechsystems
        org_name_2: "{{ organization_2 }}"   # vitechinfra
      become: false
 
    - name: Parse JSON output from script
      set_fact:
        repo_data: "{{ script_output.stdout | from_json }}"
 
    - name: Filter unwanted repos from vitechsystems
      set_fact:
        vitechsystems_repos: "{{ repo_data.vitechsystems_repos }}"
 
    - name: Final list of vitechinfra repos (exclude duplicates)
      set_fact:
        filtered_vitechinfra_repos: "{{ repo_data.filtered_repos }}"

    - name: Print repos in {{ organization_1 }}
      debug:
        msg: "{{ vitechsystems_repos }}"

    - name: Print repos in {{ organization_2 }}
      debug:
        msg: "{{ filtered_vitechinfra_repos }}"

    # ---- Get latest commits for vitechsystems ----
    - name: GitHub commits (vitechsystems)
      shell: git ls-remote https://{{ github_username }}:{{ github_password_1 }}@github.com/{{ organization_1 }}/{{ item }}.git | awk '{print $1}' | head -n 1
      register: github_commits_vitechsystems
      with_items: "{{ vitechsystems_repos }}"
      ignore_errors: yes

    - name: CodeCommit commits (vitechsystems)
      shell: git ls-remote https://{{ codecommit_username }}:{{ codecommit_password }}@git-codecommit.{{ region }}.amazonaws.com/v1/repos/{{ item }} | awk '{print $1}' | head -n 1
      register: codecommit_commits_vitechsystems
      with_items: "{{ vitechsystems_repos }}"
      ignore_errors: yes

    - name: Compare commits (vitechsystems)
      set_fact:
        diff_commits_vitechsystems: "{{ diff_commits_vitechsystems | default({}) | combine({item.0.item: {'github': item.0.stdout, 'codecommit': item.1.stdout}}) }}"
      loop: "{{ github_commits_vitechsystems.results | zip(codecommit_commits_vitechsystems.results) }}"

    # ---- Prepare mail body ----
    - name: Build report body for vitechsystems
      set_fact:
        report_vitechsystems: |
          Vitechsystems Repositories Commit Comparison:

          | Repository | GitHub Commit | CodeCommit Commit |
          |------------|---------------|-------------------|
          {% for repo, ids in diff_commits_vitechsystems.items() %}
          | {{ repo }} | {{ ids.github }} | {{ ids.codecommit }} |
          {% endfor %}

    - name: Print repos in {{ organization_1 }}
      debug:
        msg: "{{ report_vitechsystems }}"
