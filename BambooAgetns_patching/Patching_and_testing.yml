---
- name: Update and reboot 
  hosts: all
  become: true
  become_user: root
  vars:
    ansible_python_interpreter: /usr/bin/python3.9
    sns_topic_arn: "arn:aws:sns:us-east-1:389180911583:Testing"  # Replace with your SNS Topic ARN
  tasks:
    - name: Check the kernel version before webserver patching
      shell: uname -r
      register: kversion

    - name: Get hostname
      shell: hostname
      register: hostname

    - name: Debug kernel version, hostname, and IP address
      debug:
        msg: |
          Hostname: {{ hostname.stdout }}
          IP Address: {{ ansible_default_ipv4.address }}
          Kernel Version: {{ kversion.stdout }}

    - name: Send email with kernel version details using SNS
      run_once: true
      delegate_to: localhost
      community.aws.sns:
        region: "us-east-1"  # Replace with your AWS region
        topic: "{{ sns_topic_arn }}"  # Correct argument for SNS topic ARN
        msg: |
          <!DOCTYPE html>
          <html>
          <head>
            <style>
              table {
                border-collapse: collapse;
                width: 100%;
                text-align: left;
              }
              th, td {
                border: 1px solid black;
                padding: 8px;
              }
              th {
                background-color: #f2f2f2;
              }
              td {
                text-align: center;
              }
            </style>
          </head>
          <body>
            <h2>Kernel Version Details Before Patching</h2>
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>IP Address</th>
                  <th>Hostname</th>
                  <th>Kernel Version</th>
                </tr>
              </thead>
              <tbody>
                {% set serial_no = 1 %}
                {% for host in play_hosts %}
                <tr>
                  <td>{{ serial_no }}</td>
                  <td>{{ hostvars[host].ansible_default_ipv4.address }}</td>
                  <td>{{ hostvars[host].hostname.stdout }}</td>
                  <td>{{ hostvars[host].kversion.stdout }}</td>
                </tr>
                {% set serial_no = serial_no + 1 %}
                {% endfor %}
              </tbody>
            </table>
          </body>
          </html>
        subject: "Before Patching Kernel Version Report"
      ignore_errors: yes

    - name: Pause for 180 seconds after upgrading packages
      pause:
        seconds: 360
